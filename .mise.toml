[env]
_.python.venv = { path = "{{config_root}}/.venv", create = true }
KUBECONFIG = "{{config_root}}/kubeconfig"
SOPS_AGE_KEY_FILE = "~/.config/sops/age/age-key.txt"
TALOSCONFIG = "{{config_root}}/clusters/talos/bootstrap/os/clusterconfig/talosconfig"

[tasks.deps]
description = "Install Helm dependencies"
run = [
  "helm plugin list | grep -q 'secrets' && helm plugin update secrets || helm plugin install https://github.com/jkroepke/helm-secrets",
  "helm plugin list | grep -q 'diff' && helm plugin update diff || helm plugin install https://github.com/databus23/helm-diff"
]

[tools]
"python" = "3.14.6"
"aqua:argoproj/argo-cd" = "3.4.4"
"aqua:budimanjojo/talhelper" = "3.1.13"
"aqua:cli/cli" = "2.96.0"
"aqua:cloudflare/cloudflared" = "2026.6.1"
"aqua:FiloSottile/age" = "1.3.1"
"aqua:go-task/task" = "3.52.0"
"aqua:getsops/sops" = "3.13.2"
"aqua:helm/helm" = "4.2.3"
"aqua:helmfile/helmfile" = "1.7.0"
"aqua:jqlang/jq" = "1.7.1"
"aqua:kubernetes-sigs/kustomize" = "5.6.0"
"aqua:kubernetes/kubectl" = "1.33.1"
"aqua:mikefarah/yq" = "4.53.3"
"aqua:siderolabs/talos" = "1.13.6"
"aqua:yannh/kubeconform" = "0.8.0"
"asdf:janpieper/asdf-ksops" = "4.3.3"
