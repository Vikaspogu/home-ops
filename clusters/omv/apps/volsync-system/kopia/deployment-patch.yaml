---
# OMV-specific deployment patch for Kopia
# Adds hostPath volume for repository storage
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia
spec:
  template:
    spec:
      volumes:
        - name: repository
          hostPath:
            path: /srv/dev-disk-by-uuid-9d2e4cb9-8825-4168-8153-e020ee524474/storage0/VolsyncKopia
            type: DirectoryOrCreate
      initContainers:
        - name: copy-config
          volumeMounts:
            - name: repository
              mountPath: /repository
        - name: chown-repo
          image: public.ecr.aws/docker/library/busybox:1.37.0
          command: ["chown", "-R", "1000:1000", "/repository"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "DAC_READ_SEARCH"]
          volumeMounts:
            - name: repository
              mountPath: /repository
      containers:
        - name: app
          volumeMounts:
            - name: repository
              mountPath: /repository
