applications:
  argo-cd:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: argo-system
    source:
      path: clusters/omv/apps/argo-system/argo-cd

  garage-app:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/garage-app

  bytestash:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/bytestash

  homepage:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: clusters/omv/apps/default/homepage

  syncthing:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/syncthing

  jellyfin:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/jellyfin
      plugin:
        env:
          - name: STORAGE_CLASS
            value: longhorn-volsync
          - name: VOLUME_SNAPSHOT_CLASS
            value: longhorn
          - name: VOLSYNC_CAPACITY
            value: 10Gi
          - name: VOLSYNC_CACHE_CAPACITY
            value: 15Gi

  gitea:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
      # The gitea PVC was restored by volsync, so Kubernetes rewrote its
      # immutable dataSource to the restore VolumeSnapshot. ArgoCD's
      # server-side diff dry-run fails on that immutable field, so use
      # client-side diff for this app (ignoreDifferences then applies).
      argocd.argoproj.io/compare-options: ServerSideDiff=false
    ignoreDifferences:
      - group: ""
        kind: PersistentVolumeClaim
        name: gitea
        jsonPointers:
          - /spec/dataSource
          - /spec/dataSourceRef
    destination:
      namespace: default
    source:
      path: components/default/gitea
      plugin:
        env:
          - name: STORAGE_CLASS
            value: longhorn-volsync
          - name: VOLUME_SNAPSHOT_CLASS
            value: longhorn
          - name: VOLSYNC_CAPACITY
            value: 20Gi
          - name: VOLSYNC_CACHE_CAPACITY
            value: 30Gi
          - name: VOLSYNC_SCHEDULE
            value: "20 */6 * * *"

  gitea-runner:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/gitea-runner
      plugin:
        env:
          - name: STORAGE_CLASS
            value: longhorn-volsync
          - name: VOLUME_SNAPSHOT_CLASS
            value: longhorn
          - name: VOLSYNC_CAPACITY
            value: 2Gi
          - name: VOLSYNC_CACHE_CAPACITY
            value: 8Gi
          - name: VOLSYNC_SCHEDULE
            value: "40 */6 * * *"

  renovate:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/renovate

  holmesgpt:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: ai
    source:
      path: components/ai/holmesgpt

  rancher:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: cattle-system
    source:
      path: components/cattle-system/rancher

  valkey:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/valkey
