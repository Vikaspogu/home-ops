# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/postgresql.cnpg.io/cluster_v1.json
---
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: pgvector17
  annotations:
    cnpg.io/skipEmptyWalArchiveCheck: enabled
spec:
  instances: 3
  imageName: ghcr.io/cloudnative-pg/postgresql:17.6-standard-trixie
  primaryUpdateStrategy: unsupervised
  storage:
    size: 30Gi
  superuserSecret:
    name: cloudnative-pg-secret
  enableSuperuserAccess: true
  postgresql:
    parameters:
      max_connections: "400"
      dynamic_shared_memory_type: sysv
      shared_buffers: 256MB
  resources:
    requests:
      cpu: 50m
    limits:
      memory: 2Gi
  monitoring:
    enablePodMonitor: true
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: pgvector17-backup
        serverName: &currentCluster pgvector17-talos-1
---
# yaml-language-server: $schema=https://github.com/datreeio/CRDs-catalog/raw/refs/heads/main/barmancloud.cnpg.io/objectstore_v1.json
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: pgvector17-backup
spec:
  configuration:
    destinationPath: s3://postgres/
    endpointURL: http://garage-s3.default.svc.cluster.local:3900
    s3Credentials:
      accessKeyId:
        name: garage-access-keys
        key: ACCESS_KEY_ID
      secretAccessKey:
        name: garage-access-keys
        key: ACCESS_SECRET_KEY
      region:
        name: garage-access-keys
        key: REGION
---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/postgresql.cnpg.io/scheduledbackup_v1.json
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: pgvector17
spec:
  backupOwnerReference: self
  cluster:
    name: pgvector17
  schedule: "@daily"
  immediate: true
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
