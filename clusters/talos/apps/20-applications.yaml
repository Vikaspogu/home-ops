applications:

  argo-cd:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: argo-system
    source:
      path: components/argo-system/argo-cd

  actual:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
    destination:
      namespace: default
    source:
      path: components/default/actual
      plugin:
        env:
          - name: STORAGE_CLASS
            value: ceph-block
          - name: VOLUME_SNAPSHOT_CLASS
            value: csi-ceph-blockpool
          - name: VOLSYNC_CAPACITY
            value: 5Gi
          - name: VOLSYNC_CACHE_CAPACITY
            value: 8Gi

  actual-http-api:
    annotations:
      argocd.argoproj.io/sync-wave: "20"
