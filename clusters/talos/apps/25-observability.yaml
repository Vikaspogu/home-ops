applications:

  coroot-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "23"
    destination:
      namespace: observability
    source:
      path: components/observability/coroot-operator

  grafana:
    annotations:
      argocd.argoproj.io/sync-wave: "25"
    destination:
      namespace: observability
    source:
      path: components/observability/grafana

  kube-prometheus-stack:
    annotations:
      argocd.argoproj.io/sync-wave: "25"
    destination:
      namespace: observability
    source:
      path: components/observability/kube-prometheus-stack
      plugin:
        env:
          - name: STORAGE_CLASS
            value: ceph-block

  loki:
