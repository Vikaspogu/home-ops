applications:

  cloudflare-tunnel:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: network
    source:
      path: components/network/cloudflare-tunnel

  kubechecks:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: argo-system
    source:
      path: components/argo-system/kubechecks

  reflector:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: kube-system
    source:
      path: components/kube-system/reflector

  argocd-image-updater:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: argo-system
    source:
      path: components/argo-system/argocd-image-updater

  nvidia-gpu-operator:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: kube-system
    source:
      path: components/kube-system/nvidia-gpu-operator

  system-upgrade:
    annotations:
      argocd.argoproj.io/sync-wave: "30"
    destination:
      namespace: system-upgrade
    source:
      path: components/system-upgrade/namespace

  tuppr:
    annotations:
      argocd.argoproj.io/sync-wave: "35"
    destination:
      namespace: system-upgrade
    source:
      path: components/system-upgrade/tuppr

  talos-upgrade:
    annotations:
      argocd.argoproj.io/sync-wave: "40"
    destination:
      namespace: system-upgrade
    source:
      path: components/system-upgrade/talos-upgrade

  nvidia-gpu-cluster-policy:
    annotations:
      # Sync wave 31 — after nvidia-gpu-operator (wave 30) registers the
      # ClusterPolicy CRD and brings up the operator manager.
      argocd.argoproj.io/sync-wave: "31"
    destination:
      namespace: kube-system
    source:
      path: components/kube-system/nvidia-gpu-cluster-policy

  # Disabled 2026-06-10: virt-handler exercising VMX on old microcode is the
  # likely trigger of the k8s-4-dell reboot loop. Kept components/kubevirt/ for
  # future re-enable once BIOS/microcode are updated.
