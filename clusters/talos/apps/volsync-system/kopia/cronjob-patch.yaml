---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-maintenance
spec:
  jobTemplate:
    spec:
      template:
        spec:
          nodeSelector:
            kubernetes.io/hostname: k8s-4-dell
          initContainers:
            - name: chown-repo
              image: public.ecr.aws/docker/library/busybox:1.38.0
              command: ["chown", "-R", "1000:1000", "/repository"]
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "DAC_READ_SEARCH"]
              volumeMounts:
                - name: repository
                  mountPath: /repository
          containers:
            - name: maintenance
              volumeMounts:
                - name: repository
                  mountPath: /repository
          volumes:
            - name: repository
              hostPath:
                path: /var/mnt/media/.kopia
                type: Directory
