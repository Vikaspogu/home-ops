---
# Cluster-specific deployment patch for Kopia
# Mounts the repository from local XFS on k8s-4-dell (hostPath), interim home
# under the media volume. Pinned to k8s-4-dell because hostPath data is node-local.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kopia
spec:
  template:
    spec:
      nodeSelector:
        kubernetes.io/hostname: k8s-4-dell
      volumes:
        - name: repository
          hostPath:
            path: /var/mnt/media/.kopia
            type: Directory
      initContainers:
        - name: copy-config
          volumeMounts:
            - name: repository
              mountPath: /repository
        - name: chown-repo
          image: public.ecr.aws/docker/library/busybox:1.37.0
          command: ["chown", "-R", "1000:1000", "/repository"]
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "DAC_READ_SEARCH"]
          volumeMounts:
            - name: repository
              mountPath: /repository
      containers:
        - name: app
          volumeMounts:
            - name: repository
              mountPath: /repository
