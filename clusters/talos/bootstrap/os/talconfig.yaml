# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

clusterName: "home-kubernetes"
endpoint: https://10.30.30.150:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - "10.30.30.150"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: k8s-1-nab9
    ipAddress: "10.30.30.21"
    installDisk: /dev/sda
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:35:11"
        dhcp: false
        addresses:
          - "10.30.30.21/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
        vip:
          ip: "10.30.30.150"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
  - hostname: "k8s-2-ser"
    ipAddress: "10.30.30.22"
    installDisk: /dev/sda
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:41:6f:0c:00:07"
        dhcp: false
        addresses:
          - "10.30.30.22/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
        vip:
          ip: "10.30.30.150"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
  - hostname: "k8s-3-4u"
    ipAddress: "10.30.30.23"
    installDiskSelector:
      wwid: "naa.5002538d00000000"
    talosImageURL: factory.talos.dev/installer/398cb142982a474381a3601ea2551e89aadb2ab6e88b9c6c02bf9642ec399eed
    controlPlane: true
    # patches:
    #   - "@./patches/k8s-3-4u/storage-volumes.yaml"
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "0c:c4:7a:d3:fd:25"
        dhcp: false
        addresses:
          - "10.30.30.23/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
        vip:
          ip: "10.30.30.150"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/intel-ucode
            - siderolabs/nfsrahead
  - hostname: "k8s-4-dell"
    ipAddress: "10.30.30.24"
    installDiskSelector:
      model: "Samsung SSD 970 EVO 250GB"
    talosImageURL: factory.talos.dev/installer/26f113405d8f80e8a9ce2d8c92d5114f7ee0b44589570568cfd3aa72f3dcef75
    controlPlane: false
    patches:
      - "@./patches/k8s-4-dell/user-volumes.yaml"
    kernelModules:
      - name: nvidia
      - name: nvidia_uvm
      - name: nvidia_drm
      - name: nvidia_modeset
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nfsrahead
            - siderolabs/nonfree-kmod-nvidia-lts
            - siderolabs/nvidia-container-toolkit-lts
            - siderolabs/intel-ucode
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "d8:9e:f3:3c:9b:81"
        dhcp: false
        addresses:
          - "10.30.30.24/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
  - hostname: "k8s-5-1u"
    ipAddress: "10.30.30.25"
    installDiskSelector:
      model: "SAMSUNG MZ7TE128"
    talosImageURL: factory.talos.dev/installer/4b3cd373a192c8469e859b7a0cfbed3ecc3577c4a2d346a37b0aeff9cd17cdb0
    controlPlane: false
    patches:
      - "@./patches/k8s-5-1u/garage-storage.yaml"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/i915
            - siderolabs/intel-ucode
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "00:1e:67:e9:a6:1b"
        dhcp: false
        addresses:
          - "10.30.30.25/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
