# yaml-language-server: $schema=https://raw.githubusercontent.com/budimanjojo/talhelper/master/pkg/config/schemas/talconfig.json
---
talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

clusterName: "home-kubernetes"
endpoint: https://10.30.30.150:6443
clusterPodNets:
  - "10.69.0.0/16"
clusterSvcNets:
  - "10.96.0.0/16"

additionalApiServerCertSans: &sans
  - "10.30.30.150"
  - 127.0.0.1 # KubePrism
additionalMachineCertSans: *sans

# Disable built-in Flannel to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: k8s-1-nab9
    ipAddress: "10.30.30.21"
    installDisk: /dev/sda
    talosImageURL: factory.talos.dev/installer/ed036d0640097a4e7af413ee089851a12963cd2e2e1715f8866d551d17c2ec62
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:35:11"
        dhcp: false
        addresses:
          - "10.30.30.21/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
        vip:
          ip: "10.30.30.150"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nfsrahead
  - hostname: "k8s-2-ser"
    ipAddress: "10.30.30.22"
    installDisk: /dev/sda
    talosImageURL: factory.talos.dev/installer/ed036d0640097a4e7af413ee089851a12963cd2e2e1715f8866d551d17c2ec62
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "b0:41:6f:0c:00:07"
        dhcp: false
        addresses:
          - "10.30.30.22/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
        vip:
          ip: "10.30.30.150"
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/nfsrahead
  - hostname: "k8s-3-pxm"
    ipAddress: "10.30.30.23"
    installDiskSelector:
      model: "QEMU HARDDISK"
    talosImageURL: factory.talos.dev/nocloud-installer/8a18364f394e7a07980b1397eb5c2946b2674a52dd6a8dee8d242683718a8623
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "52:50:56:11:33:11"
        dhcp: false
        addresses:
          - "10.30.30.23/24"
        routes:
          - network: 0.0.0.0/0
            gateway: "10.30.30.1"
        mtu: 1500
    schematic:
      customization:
        systemExtensions:
          officialExtensions:
            - siderolabs/qemu-guest-agent
            - siderolabs/nfsrahead

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/admission-controller-patch.yaml"
    - "@./patches/controller/cluster.yaml"
