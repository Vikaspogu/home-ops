---
# Garage S3 storage volumes for k8s-5-1u
# Uses 8x 900GB SAS drives for multi-HDD Garage deployment
# Drives: sdc, sdd, sde, sdf, sdg, sdh, sdi, sdj
apiVersion: v1alpha1
kind: UserVolumeConfig
name: garage-hdd1
provisioning:
  diskSelector:
    match: "disk.device == '/dev/sdc'"
  minSize: 800GB
  grow: true
filesystem:
  type: xfs
---
