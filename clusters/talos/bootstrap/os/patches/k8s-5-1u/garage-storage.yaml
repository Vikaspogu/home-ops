---
# Garage S3 storage volumes for k8s-5-1u
# Uses 8x 900GB SAS drives for multi-HDD Garage deployment
#
# IMPORTANT: These disks are ALREADY formatted with XFS and contain data.
# We mount them WITHOUT provisioning to prevent Talos from reformatting on boot.
machine:
  disks:
    # Garage HDD 1 - contains metadata + data
    - device: /dev/disk/by-id/wwn-0x5000cca02278736c
      partitions:
        - mountpoint: /var/mnt/garage-hdd1
    # Garage HDD 2
    - device: /dev/disk/by-id/wwn-0x5000cca07194d828
      partitions:
        - mountpoint: /var/mnt/garage-hdd2
    # Garage HDD 3
    - device: /dev/disk/by-id/wwn-0x5000cca0576b90f0
      partitions:
        - mountpoint: /var/mnt/garage-hdd3
    # Garage HDD 4
    - device: /dev/disk/by-id/wwn-0x5000cca0430361b0
      partitions:
        - mountpoint: /var/mnt/garage-hdd4
    # Garage HDD 5
    - device: /dev/disk/by-id/wwn-0x5000cca07111a7cc
      partitions:
        - mountpoint: /var/mnt/garage-hdd5
    # Garage HDD 6
    - device: /dev/disk/by-id/wwn-0x5000cca0719b81d8
      partitions:
        - mountpoint: /var/mnt/garage-hdd6
    # Garage HDD 7
    - device: /dev/disk/by-id/wwn-0x5000cca071478cf0
      partitions:
        - mountpoint: /var/mnt/garage-hdd7
    # Garage HDD 8
    - device: /dev/disk/by-id/wwn-0x5000cca07147a3c0
      partitions:
        - mountpoint: /var/mnt/garage-hdd8
