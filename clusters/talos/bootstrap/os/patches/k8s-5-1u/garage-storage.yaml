---
# Garage S3 storage volumes for k8s-5-1u
# Uses 8x 900GB SAS drives for multi-HDD Garage deployment
apiVersion: v1alpha1
kind: UserVolumeConfig
name: garage-hdd1
provisioning:
  diskSelector:
    match: "'/dev/disk/by-id/wwn-0x5000cca02278736c' in disk.symlinks"
  minSize: 800GB
  grow: true
filesystem:
  type: xfs
