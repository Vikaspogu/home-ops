---
# Separate volume for Garage metadata (LMDB)
# Uses system disk to keep metadata on faster storage
apiVersion: v1alpha1
kind: UserVolumeConfig
name: garage-meta
provisioning:
  diskSelector:
    match: "disk.device == '/dev/sda'"
  minSize: 50GB
  grow: false
filesystem:
  type: xfs
