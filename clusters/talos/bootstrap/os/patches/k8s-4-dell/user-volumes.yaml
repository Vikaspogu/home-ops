---
# Local storage user volumes for k8s-4-dell.
#
# Intentionally excluded:
# - nvme2n1 / Samsung SSD 970 EVO 250GB: current Talos system disk
# - sdb / MARSHAL MAL38000: failed SMART evidence (do not use)
# - nvme0n1 / KINGSTON SNV3S1000G: reserved as future raw Rook/Ceph OSD
#
# IMPORTANT: disks are already formatted with data; mount without provisioning to prevent Talos reformatting on boot.
machine:
  disks:
    # Media storage (3TB+ HDD)
    - device: /dev/disk/by-id/wwn-0x50014ee214f03cdb
      partitions:
        - mountpoint: /var/mnt/media
    # Downloads storage (NVMe)
    - device: /dev/disk/by-id/nvme-eui.00000000000000000026b7382439f6f5
      partitions:
        - mountpoint: /var/mnt/downloads
