---
# Local storage user volumes for k8s-4-dell.
#
# Intentionally excluded:
# - nvme2n1 / Samsung SSD 970 EVO 250GB: current Talos system disk
# - sdb / MARSHAL MAL38000: failed SMART evidence (do not use)
# - nvme0n1 / KINGSTON SNV3S1000G: reserved as future raw Rook/Ceph OSD
apiVersion: v1alpha1
kind: UserVolumeConfig
name: media
provisioning:
  diskSelector:
    match: "'/dev/disk/by-id/wwn-0x50014ee214f03cdb' in disk.symlinks"
  minSize: 3TB
  grow: true
filesystem:
  type: xfs
---
apiVersion: v1alpha1
kind: UserVolumeConfig
name: downloads
provisioning:
  diskSelector:
    match: "'/dev/disk/by-id/nvme-eui.00000000000000000026b7382439f6f5' in disk.symlinks"
  minSize: 400GB
  grow: true
filesystem:
  type: xfs
