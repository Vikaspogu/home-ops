controllers:
  system-upgrade-controller:
    strategy: RollingUpdate
    containers:
      app:
        image:
          repository: docker.io/rancher/system-upgrade-controller
          tag: v0.19.2@sha256:34fa058fe453da2e1d6cf9052d2961976d5c7294921f8a6a6fb75098a27b0e89
        env:
          SYSTEM_UPGRADE_CONTROLLER_LEADER_ELECT: true
          SYSTEM_UPGRADE_CONTROLLER_NAME: "system-upgrade-controller"
          SYSTEM_UPGRADE_CONTROLLER_NAMESPACE: "system-upgrade"
          SYSTEM_UPGRADE_CONTROLLER_NODE_NAME:
            valueFrom:
              fieldRef:
                fieldPath: spec.nodeName
          SYSTEM_UPGRADE_JOB_BACKOFF_LIMIT: "99"
          SYSTEM_UPGRADE_JOB_PRIVILEGED: false
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: {drop: ["ALL"]}
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000

rbac:
  bindings:
    system-upgrade-controller:
      type: ClusterRoleBinding
      roleRef:
        kind: ClusterRole
        name: cluster-admin
      subjects:
        - identifier: system-upgrade-controller
serviceAccount:
  system-upgrade-controller: {}
