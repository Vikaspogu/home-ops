---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-sync-to-s3
  namespace: volsync-system
  labels:
    app.kubernetes.io/name: kopia
    app.kubernetes.io/component: sync
spec:
  schedule: "0 3 * * *"  # Daily at 3 AM
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: k8s-4-dell
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            fsGroupChangePolicy: "OnRootMismatch"
            supplementalGroups:
              - 100
          initContainers:
            - name: chown-repo
              image: public.ecr.aws/docker/library/busybox:1.38.0
              command: ["chown", "-R", "1000:1000", "/repository"]
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "DAC_READ_SEARCH"]
              volumeMounts:
                - name: repository
                  mountPath: /repository
          containers:
            - name: sync-to-s3
              image: ghcr.io/home-operations/kopia:0.23.1@sha256:27da0a33b44e1b902150a6c963514237217464bb13118a95bb056667be93cda5
              command:
                - sh
                - -c
                - |
                  set -e
                  echo "Starting Kopia repository sync to S3 at $(date)"
                  
                  # Prepare Kopia config
                  mkdir -p /tmp/kopia/cache /tmp/kopia/logs
                  cp /config-ro/repository.config /tmp/kopia/repository.config
                  
                  # Sync repository to S3
                  kopia --config-file=/tmp/kopia/repository.config repository sync-to s3 \
                    --bucket="${S3_BUCKET}" \
                    --endpoint="${S3_ENDPOINT}" \
                    --access-key="${AWS_ACCESS_KEY_ID}" \
                    --secret-access-key="${AWS_SECRET_ACCESS_KEY}" \
                    --disable-tls \
                    --delete \
                    --no-progress
                  
                  echo "Sync completed successfully at $(date)"
              env:
                - name: KOPIA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kopia-secret
                      key: KOPIA_PASSWORD
                - name: AWS_ACCESS_KEY_ID
                  valueFrom:
                    secretKeyRef:
                      name: kopia-s3-secret
                      key: AWS_ACCESS_KEY_ID
                - name: AWS_SECRET_ACCESS_KEY
                  valueFrom:
                    secretKeyRef:
                      name: kopia-s3-secret
                      key: AWS_SECRET_ACCESS_KEY
                - name: S3_ENDPOINT
                  valueFrom:
                    secretKeyRef:
                      name: kopia-s3-secret
                      key: S3_ENDPOINT
                - name: S3_BUCKET
                  valueFrom:
                    secretKeyRef:
                      name: kopia-s3-secret
                      key: S3_BUCKET
                - name: KOPIA_CACHE_DIRECTORY
                  value: /tmp/kopia/cache
                - name: KOPIA_LOG_DIR
                  value: /tmp/kopia/logs
                - name: TZ
                  value: "America/New_York"
              resources:
                requests:
                  cpu: 100m
                  memory: 512Mi
                limits:
                  memory: 2Gi
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              volumeMounts:
                - name: config-ro
                  mountPath: /config-ro
                  readOnly: true
                - name: repository
                  mountPath: /repository
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config-ro
              configMap:
                name: kopia-repository-configmap
            - name: repository
              hostPath:
                path: /var/mnt/media/.kopia
                type: Directory
            - name: tmp
              emptyDir:
                sizeLimit: 4Gi
