---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-maintenance
  namespace: volsync-system
spec:
  schedule: "37 1-23/2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          nodeSelector:
            kubernetes.io/hostname: k8s-4-dell
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            supplementalGroups:
              - 100
          initContainers:
            - name: chown-repo
              image: public.ecr.aws/docker/library/busybox:1.38.0
              command: ["chown", "-R", "1000:1000", "/repository"]
              securityContext:
                runAsUser: 0
                runAsGroup: 0
                readOnlyRootFilesystem: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                  add: ["CHOWN", "FOWNER", "DAC_OVERRIDE", "DAC_READ_SEARCH"]
              volumeMounts:
                - name: repository
                  mountPath: /repository
          containers:
            - name: maintenance
              image: ghcr.io/home-operations/kopia:0.23.1@sha256:27da0a33b44e1b902150a6c963514237217464bb13118a95bb056667be93cda5
              command:
                - sh
                - -c
                - |
                  mkdir -p /tmp/kopia/cache /tmp/kopia/logs
                  cp /config-ro/repository.config /tmp/kopia/repository.config
                  kopia --config-file=/tmp/kopia/repository.config maintenance run --full
              env:
                - name: KOPIA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kopia-secret
                      key: KOPIA_PASSWORD
                - name: KOPIA_CACHE_DIRECTORY
                  value: /tmp/kopia/cache
                - name: KOPIA_LOG_DIR
                  value: /tmp/kopia/logs
              resources:
                requests:
                  cpu: 50m
                  memory: 512Mi
                limits:
                  memory: 4Gi
              volumeMounts:
                - name: config-ro
                  mountPath: /config-ro
                  readOnly: true
                - name: repository
                  mountPath: /repository
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config-ro
              configMap:
                name: kopia-repository-configmap
            - name: repository
              hostPath:
                path: /var/mnt/media/.kopia
                type: Directory
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
