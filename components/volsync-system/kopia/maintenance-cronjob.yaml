---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: kopia-maintenance
  namespace: volsync-system
spec:
  schedule: "37 1-23/2 * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 1
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
            fsGroup: 1000
            supplementalGroups:
              - 100
          containers:
            - name: maintenance
              image: ghcr.io/home-operations/kopia:0.23.0@sha256:76865b421548b1d7bb26a8268f0f0bc828be4eec3f8d8b9c8ece991c99878f94
              command:
                - sh
                - -c
                - |
                  mkdir -p /tmp/kopia/cache /tmp/kopia/logs
                  cp /config-ro/repository.config /tmp/kopia/repository.config
                  kopia --config-file=/tmp/kopia/repository.config maintenance run --full
              env:
                - name: KOPIA_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: kopia-secret
                      key: KOPIA_PASSWORD
                - name: KOPIA_CACHE_DIRECTORY
                  value: /tmp/kopia/cache
                - name: KOPIA_LOG_DIR
                  value: /tmp/kopia/logs
              resources:
                requests:
                  cpu: 50m
                  memory: 512Mi
                limits:
                  memory: 4Gi
              volumeMounts:
                - name: config-ro
                  mountPath: /config-ro
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
          volumes:
            - name: config-ro
              configMap:
                name: kopia-repository-configmap
            - name: tmp
              emptyDir:
                sizeLimit: 2Gi
