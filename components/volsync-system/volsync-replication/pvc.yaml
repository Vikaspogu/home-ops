---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${ARGOCD_APP_NAME}
  annotations:
    # dataSource/dataSourceRef become immutable once the PVC is bound, and
    # Kubernetes rewrites dataSource to the restore VolumeSnapshot. ArgoCD's
    # server-side apply dry-run then fails on the immutable field. Scope
    # client-side diff/apply to THIS PVC only (not the whole app) so the
    # ignoreDifferences applies here while other resources (ExternalSecret,
    # HTTPRoute) keep server-side diff and don't churn on webhook defaults.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
    argocd.argoproj.io/sync-options: ServerSideApply=false
spec:
  accessModes:
    - ReadWriteOnce
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: ${ARGOCD_APP_NAME}-dst
  resources:
    requests:
      storage: ${ARGOCD_ENV_VOLSYNC_CAPACITY}
  storageClassName: ${ARGOCD_ENV_STORAGE_CLASS}
