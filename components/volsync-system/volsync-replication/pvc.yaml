---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ${ARGOCD_APP_NAME}
  annotations:
    # dataSource/dataSourceRef become immutable once the PVC is bound, and
    # Kubernetes rewrites dataSource to the VolumeSnapshot that volsync used
    # to restore. ArgoCD's server-side diff dry-run then fails on the
    # immutable field. Force client-side diff so ignoreDifferences applies.
    argocd.argoproj.io/compare-options: ServerSideDiff=false
spec:
  accessModes:
    - ReadWriteOnce
  dataSourceRef:
    kind: ReplicationDestination
    apiGroup: volsync.backube
    name: ${ARGOCD_APP_NAME}-dst
  resources:
    requests:
      storage: ${ARGOCD_ENV_VOLSYNC_CAPACITY}
  storageClassName: ${ARGOCD_ENV_STORAGE_CLASS}
