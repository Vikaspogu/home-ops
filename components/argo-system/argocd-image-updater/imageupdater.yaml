---
apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: gitea-apps
  namespace: argo-system
spec:
  commonUpdateSettings:
    updateStrategy: latest
    ignoreTags:
      - latest
  writeBackConfig:
    method: "git:secret:argo-system/git-creds"
    gitConfig:
      branch: main
  applicationRefs:
    - namePattern: "ivan-dashboard"
      writeBackConfig:
        method: "git:secret:argo-system/git-creds"
        gitConfig:
          branch: main
          writeBackTarget: "helmvalues:./values.yaml"
      images:
        - alias: ivan-personal-dashboard
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/ivan-personal-dashboard-v2"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.containers.app.image.repository
              tag: controllers.app.containers.app.image.tag
    - namePattern: "ivan-personal-service"
      writeBackConfig:
        method: "git:secret:argo-system/git-creds"
        gitConfig:
          branch: main
          writeBackTarget: "helmvalues:./values.yaml"
      images:
        - alias: ivan-personal-service
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/ivan-personal-service"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.containers.app.image.repository
              tag: controllers.app.containers.app.image.tag
    - namePattern: "forge-orchestrator"
      writeBackConfig:
        method: "git:secret:argo-system/git-creds"
        gitConfig:
          branch: main
          writeBackTarget: "helmvalues:./values.yaml"
      images:
        - alias: forge
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/forge"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}$'
          manifestTargets:
            helm:
              name: controllers.app.containers.app.image.repository
              tag: controllers.app.containers.app.image.tag
    - namePattern: "hermes-agent"
      writeBackConfig:
        method: "git:secret:argo-system/git-creds"
        gitConfig:
          branch: main
          writeBackTarget: "helmvalues:./values.yaml"
      images:
        - alias: agent-platform-hermes-agent
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/agent-platform-hermes-agent"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.containers.app.image.repository
              tag: controllers.app.containers.app.image.tag
        - alias: agent-platform-hermes-agent-seed
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/agent-platform-hermes-agent"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.initContainers.seed-config.image.repository
              tag: controllers.app.initContainers.seed-config.image.tag
        - alias: agent-platform-hermes-agent-bootstrap
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/agent-platform-hermes-agent"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.initContainers.hermes-bootstrap.image.repository
              tag: controllers.app.initContainers.hermes-bootstrap.image.tag
        - alias: ivan-personal-plugin
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/ivan-personal-plugin"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.app.initContainers.install-ivan-personal-plugin.image.repository
              tag: controllers.app.initContainers.install-ivan-personal-plugin.image.tag
    - namePattern: "agentmemory"
      writeBackConfig:
        method: "git:secret:argo-system/git-creds"
        gitConfig:
          branch: main
          writeBackTarget: "helmvalues:./values.yaml"
      images:
        - alias: agentmemory
          imageName: "gitea.${CLUSTER_DOMAIN}/vpogu/agentmemory"
          commonUpdateSettings:
            allowTags: 'regexp:^[0-9]{14}-[a-f0-9]{7}-oci$'
          manifestTargets:
            helm:
              name: controllers.agentmemory.containers.app.image.repository
              tag: controllers.agentmemory.containers.app.image.tag
