controllers:
  app:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom: &envFrom
        - secretRef:
            name: ivan-personal-service-secret
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/ivan-personal-service
          tag: 20260608200511-f4522ab-oci
          pullPolicy: Always
        env:
          TZ: America/New_York
          CORS_ORIGINS: "https://ivan.${CLUSTER_DOMAIN}"
          HOME_ASSISTANT_URL: "http://home-assistant-app.default.svc.cluster.local:8123"
          ACTUAL_BUDGET_URL: "http://actual-http-api.default.svc.cluster.local:5007"
          PAPERLESS_URL: "http://paperless-ngx.default.svc.cluster.local:8000"
          SYNOLOGY_URL: "https://nas.${CLUSTER_DOMAIN}"
          OBSIDIAN_S3_BUCKET: obsidian-notes
          VALKEY_URL: "redis://valkey.default.svc.cluster.local:6379/6"
          WORKOUT_PLAN_GENERATOR: openai_compatible
          WORKOUT_PLAN_MODEL: openai/openai/gpt-5.4
          WORKOUT_PLAN_TEMPERATURE: "0.2"
          WORKOUT_PLAN_MAX_REPAIR_ATTEMPTS: "2"
          WORKOUT_VIDEO_RERANKER: openai_compatible
          WORKOUT_VIDEO_RERANK_MODEL: openai/openai/gpt-5-mini
          IMAGE_SEARCH_USER_AGENT: "IvanPersonal/1.0 (https://ivan.${CLUSTER_DOMAIN}; journal image enrichment)"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: &httpPort 8080
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
service:
  app:
    controller: app
    ports:
      http:
        port: *httpPort
