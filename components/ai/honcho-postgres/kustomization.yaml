---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - ./configmap.yaml
  - ./externalsecret.yaml
components:
  - ../../volsync-system/volsync-replication

helmCharts:
  - name: app-template
    releaseName: honcho-postgres
    namespace: ai
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: "5.0.1"
    valuesFile: values.yaml
