---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: honcho-postgres
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: honcho-postgres-secret
    template:
      engineVersion: v2
      data:
        POSTGRES_DB: honcho
        POSTGRES_USER: honcho
        POSTGRES_PASSWORD: "{{ .HONCHO_POSTGRES_PASSWORD }}"
  dataFrom:
    - extract:
        key: honcho
