---
defaultPodOptions:
  securityContext:
    runAsNonRoot: true
    runAsUser: 100
    runAsGroup: 101
    seccompProfile:
      type: RuntimeDefault

controllers:
  api:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/plastic-labs/honcho
          tag: latest@sha256:5d9d2c53bcc0297de497634a3611728f81d171cc428cc93d74c1f07c405c2d33
        command:
          - sh
          - -ec
        args:
          - |
            for attempt in $(seq 1 30); do
              echo "Running database migrations... attempt ${attempt}/30"
              if /app/.venv/bin/python scripts/provision_db.py; then
                echo "Database migrations completed"
                exec /app/.venv/bin/fastapi run --host 0.0.0.0 src/main.py
              fi

              echo "Database migrations failed; retrying in 10 seconds"
              sleep 10
            done

            echo "Database migrations failed after 30 attempts"
            exit 1
        envFrom: &envFrom
          - secretRef:
              name: honcho-secret
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: &httpPort 8000
              initialDelaySeconds: 20
              periodSeconds: 10
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *httpPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *httpPort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
  deriver:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: ghcr.io/plastic-labs/honcho
          tag: latest@sha256:5d9d2c53bcc0297de497634a3611728f81d171cc428cc93d74c1f07c405c2d33
        command:
          - /app/.venv/bin/python
          - -m
          - src.deriver
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

service:
  app:
    controller: api
    ports:
      http:
        port: 8000
