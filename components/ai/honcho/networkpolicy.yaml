---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: honcho-api
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/instance: honcho
      app.kubernetes.io/controller: api
  policyTypes:
    - Ingress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/instance: hermes-agent
              app.kubernetes.io/name: hermes-agent
      ports:
        - protocol: TCP
          port: 8000
