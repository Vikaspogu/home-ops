---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-secret
    template:
      engineVersion: v2
      data:
        INFERENCE_HUB_MODEL: "{{ .LITELLM_MODEL }}"
        INFERENCE_HUB_BASE_URL: "{{ .LITELLM_BASE_URL }}:4000"
        WHISPER_URL: "{{ .LITELLM_BASE_URL }}:8300"
        API_KEY: "{{ .LITELLM_MASTER_KEY }}"
        EMBEDDING_MODEL: "{{.EMBEDDING_MODEL}}"
        SLACK_BOT_TOKEN: "{{.IVAN_BOT_TOKEN}}"
        SLACK_APP_TOKEN: "{{.IVAN_APP_TOKEN}}"
        GH_TOKEN: "{{.K8S_TOKEN}}"
        NEXTCLOUD_URL: "{{.CAL_DAV_URL}}"
        NEXTCLOUD_USER: "{{.NC_USER}}"
        NEXTCLOUD_PASSWORD: "{{.NC_PASSWORD}}"
        DIGEST_CHANNEL_ID: "{{.DIGEST_CHANNEL_ID}}"
        GITEA_TOKEN: "{{.IVAN_TOKEN}}"
        GITEA_URL: "https://gitea.omv.${CLUSTER_DOMAIN}"
        ALERTS_CHANNEL_ID: "{{.ALERTS_CHANNEL_ID}}"
        NETWORK_AUDIT_CHANNEL_ID: "{{.DIGEST_CHANNEL_ID}}"
        UNIFI_HOST: "{{.UNIFI_HOST}}"
        UNIFI_API_KEY: "{{.IVAN_AGENT_API_KEY}}"
        HOME_ASSISTANT_URL: "https://hass.${CLUSTER_DOMAIN}"
        HOME_ASSISTANT_TOKEN: "{{.IVAN_HASS_TOKEN}}"
        OBSIDIAN_S3_BUCKET: "obsidian-notes"
        AWS_ACCESS_KEY_ID: "{{.MAIN_ACCESS_KEY}}"
        AWS_SECRET_ACCESS_KEY: "{{.MAIN_SECRET_KEY}}"
        AWS_DEFAULT_REGION: "{{.REGION}}"
        AWS_ENDPOINT_URL: "https://s3.omv.${CLUSTER_DOMAIN}"
        ACTUAL_API_KEY: "{{.ACTUAL_API_KEY}}"
        ACTUAL_BUDGET_SYNC_ID: "{{.SYNC_ID}}"
        ACTUAL_API_URL: "http://actual-http-api.default.svc.cluster.local:5007"
        CHROMA_URL: "http://chromadb.ai.svc.cluster.local:8000"
        GOG_KEYRING_PASSWORD: "{{.GOG_KEYRING_PASSWORD}}"
        GOG_KEYRING_BACKEND: "file"
        GOG_ACCOUNT: "{{.GOG_DEFAULT_ACCOUNT}}"
        GOG_BUNDLE: "{{.GOG_BUNDLE}}"
        RECALL_SECRET_KEY: "{{ .RECALL_SECRET_KEY }}"
        RECALL_API_URL: "http://recall.ai.svc.cluster.local:8000/api"
        VIKUNJA_API_URL: "http://vikunja.default.svc.cluster.local:3456"
        VIKUNJA_API_TOKEN: "{{.VIKUNJA_API_TOKEN}}"
        SPARK_SSH_KEY: "{{ .ssh_privatekey }}"
        SPARK_SSH_KNOWN_HOSTS: "{{ .known_hosts }}"
        PROXMOX_API_URL: "https://pxm-baymx.a113.internal:8006"
        PROXMOX_API_TOKEN_ID: "{{.IVAN_API_TOKEN_ID}}"
        PROXMOX_API_TOKEN_SECRET: "{{.IVAN_API_TOKEN_SECRET}}"
        PROXMOX_DEFAULT_NODE: "pxm-baymx"
        SYNOLOGY_URL: "https://synology.a113.internal:5001"
        SYNOLOGY_USERNAME: "{{ .SYNOLOGY_USERNAME }}"
        SYNOLOGY_PASSWORD: "{{ .SYNOLOGY_PASSWORD }}"
        PAPERLESS_API_URL: "https://paperless.${CLUSTER_DOMAIN}/api"
        PAPERLESS_API_TOKEN: "{{ .PAPERLESS_API_KEY }}"
        DATABASE_URL: |-
          postgres://{{ .IVAN_POSTGRES_USER }}:{{ .IVAN_POSTGRES_PASS }}@postgres17-rw.default.svc.cluster.local/ivan
        # Postgres Init
        INIT_POSTGRES_DBNAME: ivan
        INIT_POSTGRES_HOST: postgres17-rw.default.svc.cluster.local
        INIT_POSTGRES_USER: "{{ .IVAN_POSTGRES_USER }}"
        INIT_POSTGRES_PASS: "{{ .IVAN_POSTGRES_PASS }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: inference-hub
    - extract:
        key: ivan
    - extract:
        key: cloudnative-pg
    - extract:
        key: Slack
    - extract:
        key: nextcloud
    - extract:
        key: Github
    - extract:
        key: gitea
    - extract:
        key: unifi
    - extract:
        key: home-assistant
    - extract:
        key: garage
    - extract:
        key: actual
    - extract:
        key: recall
    - extract:
        key: vikunja
    - extract:
        key: proxmox
    - extract:
        key: nas-admin
    - extract:
        key: paperless
