controllers:
  app:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
        envFrom: &envFrom
        - secretRef:
            name: ivan-secret
    containers:
      main:
        image:
          repository: gitea.omv.a113.casa/vpogu/ivan-agent-v3
          tag: 20260419152611-0a934f1
          pullPolicy: IfNotPresent
        command: ["python", "-m", "main"]
        env:
          TZ: America/New_York
          PYTHONPATH: /app/src
          DASHBOARD_MCP_URL: "http://ivan-dashboard-api.ai.svc.cluster.local:8001/mcp/"
          KUBECONFIG: /etc/kube/talos
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: false
          liveness:
            enabled: false
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
persistence:
  kubeconfigs:
    type: secret
    name: ivan-kubeconfigs
    globalMounts:
    - path: /etc/kube
      readOnly: true
