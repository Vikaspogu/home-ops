controllers:
  app:
    replicas: 0
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom: &envFrom
        - secretRef:
            name: ivan-secret
      init-gog:
        image:
          repository: busybox
          tag: 1.37.0
        command: ["sh", "-c"]
        args:
        - |
          if [ -n "$GOG_BUNDLE" ]; then
            echo "$GOG_BUNDLE" | base64 -d | tar -xzf - -C /root/.config/gogcli/
            echo "gogcli config unpacked"
          else
            echo "GOG_BUNDLE not set, skipping"
          fi
        envFrom: *envFrom
    containers:
      main:
        image:
          repository: gitea.omv.a113.casa/vpogu/ivan-agent-v3
          tag: 20260504004005-d593867
          pullPolicy: IfNotPresent
        command: ["python", "-m", "main"]
        env:
          TZ: America/New_York
          PYTHONPATH: /app/src
          DASHBOARD_MCP_URL: "http://ivan-dashboard-api.ai.svc.cluster.local:8001/mcp/"
          KUBECONFIG: /etc/kube/talos
          KUBECONFIG_DIR: /etc/kube
          LOG_ANALYZER_NAMESPACES: "ai"
          LOG_ANALYZER_CLUSTER: "talos"
          PROMETHEUS_URL: "http://prometheus-operated.observability.svc.cluster.local:9090"
          VALKEY_URL: "redis://valkey.default.svc.cluster.local:6379/0"
          COST_RATES: "claude-opus-4:15.0/75.0,gpt-5.2:2.5/10.0"
          GITHUB_USER: "vikaspogu"
          REPO_WORKER_IMAGE_REPOSITORY: "gitea.omv.a113.casa/vpogu/ivan-repo-worker"
          REPO_WORKER_IMAGE_TAG: ""
          REPO_WORKER_NAMESPACE: ai
          REPO_WORKER_SECRET_NAME: ivan-repo-worker-secret
          REPO_WORKER_IMAGE_PULL_SECRET: gitea-registry-secret
          REPO_WORKER_TTL_SECONDS_AFTER_FINISHED: "300"
          LOG_MONITOR_DEFAULT_NAMESPACES: "ai,default"
          LABEL_DOMAIN: "${CLUSTER_DOMAIN}"
          WEATHER_LATITUDE: "40.1717"
          WEATHER_LONGITUDE: "-83.0841"
          GITEA_USER: "vpogu"
          SCHEDULED_PROACTIVE_TASKS_V2_ENABLED: "true"
          LOCAL_MODEL: "gpt-oss:20b"
          OLLAMA_BASE_URL: "http://spark.a113.internal:11434"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              initialDelaySeconds: 15
              periodSeconds: 10
              failureThreshold: 30
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: 8080
              periodSeconds: 30
              failureThreshold: 3
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
service:
  app:
    controller: app
    ports:
      http:
        port: 8080
persistence:
  kubeconfigs:
    type: secret
    name: ivan-kubeconfigs
    globalMounts:
    - path: /etc/kube
      readOnly: true
  gog-config:
    type: emptyDir
    advancedMounts:
      app:
        init-gog:
        - path: /root/.config/gogcli
        main:
        - path: /root/.config/gogcli
