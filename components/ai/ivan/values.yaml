controllers:
  app:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.3.0@sha256:6fa1f331cddd2eb0b6afa7b8d3685c864127a81ab01c3d9400bc3ff5263a51cf
        envFrom: &envFrom
        - secretRef:
            name: ivan-secret
      init-gog:
        image:
          repository: busybox
          tag: 1.37.0
        command: ["sh", "-c"]
        args:
        - |
          if [ -n "$GOG_BUNDLE" ]; then
            echo "$GOG_BUNDLE" | base64 -d | tar -xzf - -C /root/.config/gogcli/
            echo "gogcli config unpacked"
          else
            echo "GOG_BUNDLE not set, skipping"
          fi
        envFrom: *envFrom
    containers:
      main:
        image:
          repository: gitea.omv.a113.casa/vpogu/ivan-agent
          tag: 20260414203111-db1ed83
          pullPolicy: Always
        env:
          TZ: America/New_York
          DIGEST_HOUR: "9"
          DIGEST_MINUTE: "00"
          DASHBOARD_API_URL: "http://ivan-dashboard-api.ai.svc.cluster.local:8001"
          GITEA_DOMAIN: "gitea.omv.${CLUSTER_DOMAIN}"
          GITEA_OWNER: "vpogu"
          GITHUB_OWNER: "Vikaspogu"
          GIT_NAME: "I.V.A.N."
          GIT_EMAIL: "ivan@${CLUSTER_DOMAIN}"
          GITOPS_REPO: "Vikaspogu/home-ops"
          LOG_HEALER_CLUSTER: "talos"
          LOG_HEALER_NAMESPACE: "ai"
          LOG_HEALER_DEPLOYMENTS: "ivan,ivan-dashboard-api,ivan-dashboard-ui"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: false
            custom: true
            spec:
              exec:
                command:
                - pgrep
                - -f
                - ivan.main
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          liveness:
            enabled: false
            custom: true
            spec:
              exec:
                command:
                - pgrep
                - -f
                - ivan.main
              periodSeconds: 30
              failureThreshold: 3
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
persistence:
  kubeconfigs:
    type: secret
    name: ivan-kubeconfigs
    globalMounts:
    - path: /etc/kube
      readOnly: true
  gog-config:
    type: emptyDir
    advancedMounts:
      app:
        init-gog:
        - path: /root/.config/gogcli
        main:
        - path: /root/.config/gogcli
