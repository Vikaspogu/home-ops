---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ivan-infra
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["ivan-infra.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: ivan-app
          port: 8080
