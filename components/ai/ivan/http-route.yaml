---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ivan-agent
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["ivan-agent.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: ivan
          port: 8080
