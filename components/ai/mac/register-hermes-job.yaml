---
# mac-register-hermes — declarative identity bootstrap.
#
# Runs as an ArgoCD Sync hook: on every sync of the mac app, this Job is
# recreated and POSTs the desired tenant / persona / hermes_instance to
# mac-api with EXPLICIT deterministic ids. Because mac's identity layer
# is idempotent (looks up by (parent, name); ON CONFLICT(id) DO UPDATE),
# re-runs are no-ops once the rows exist.
#
# To register additional personas/instances, edit the IDENTITIES JSON in
# the env below — one object per Hermes runtime you want mac to know
# about. Apply, ArgoCD re-syncs, the Job re-runs.
apiVersion: batch/v1
kind: Job
metadata:
  name: mac-register-hermes
  namespace: ai
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "1"
  labels:
    app.kubernetes.io/name: mac-register-hermes
    app.kubernetes.io/component: bootstrap
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mac-register-hermes
        app.kubernetes.io/component: bootstrap
    spec:
      restartPolicy: OnFailure
      serviceAccountName: mac-task-runner    # no K8s API access needed
      automountServiceAccountToken: false
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: register
          image: gitea.omv.a113.casa/vpogu/mac:2316d057d3ed
          imagePullPolicy: IfNotPresent
          env:
            - name: MAC_URL
              value: "http://mac-api.ai.svc.cluster.local:8000"
            - name: MAC_WORKER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: mac-secret
                  key: MAC_WORKER_TOKEN
            - name: PYTHONUNBUFFERED
              value: "1"
            # The list of identities to register. JSON array. Each entry
            # is a complete (tenant + persona + hermes_instance) graph
            # using deterministic ids — the same id you put into
            # MAC_HERMES_INSTANCE_ID on the hermes-agent side.
            #
            # tenant_id    keep short, lowercase; this is what task rows
            #              will FK to.
            # persona_id   uniquely names the soul.
            # instance_id  THE value used as MAC_HERMES_INSTANCE_ID by
            #              the corresponding hermes-agent runtime.
            - name: IDENTITIES
              value: |
                [
                  {
                    "tenant_id": "personal",
                    "tenant_name": "personal",
                    "persona_id": "persona_hermes_ai",
                    "persona_name": "AssistantOne",
                    "soul_ref": "hermes://personal/AssistantOne/SOUL.md",
                    "memory_scope": "hermes://personal/AssistantOne/memory",
                    "instance_id": "hermes_ai",
                    "instance_name": "hermes-ai",
                    "home_ref": "k8s://ai/hermes-agent"
                  }
                ]
          command: ["python", "-c"]
          args:
            - |
              import json, os, sys, time
              from urllib.request import Request, urlopen
              from urllib.error import HTTPError, URLError

              URL = os.environ["MAC_URL"].rstrip("/")
              TOK = os.environ["MAC_WORKER_TOKEN"]
              HEADERS = {
                  "Authorization": f"Bearer {TOK}",
                  "Content-Type": "application/json",
              }

              def call(method, path, body=None):
                  data = json.dumps(body).encode() if body is not None else None
                  req = Request(URL + path, data=data, headers=HEADERS, method=method)
                  try:
                      with urlopen(req, timeout=15) as r:
                          payload = r.read()
                          return r.status, (json.loads(payload) if payload else {})
                  except HTTPError as e:
                      body = e.read().decode("utf-8", "replace")
                      return e.code, body

              # 1. Wait for mac-api /health to be 200 (sync waves can race).
              for attempt in range(60):
                  try:
                      with urlopen(URL + "/health", timeout=3) as r:
                          if r.status == 200:
                              break
                  except (HTTPError, URLError, TimeoutError):
                      pass
                  print(f"[wait] mac-api /health not ready, retrying ({attempt+1}/60)...")
                  time.sleep(2)
              else:
                  print("FAIL: mac-api /health never became ready", file=sys.stderr)
                  sys.exit(1)
              print(f"[ok] mac-api reachable at {URL}")

              # 2. Walk the IDENTITIES list, POSTing each level with an
              #    explicit id. The endpoints are idempotent on (parent, name)
              #    + ON CONFLICT(id), so re-runs are safe no-ops.
              identities = json.loads(os.environ["IDENTITIES"])
              for ident in identities:
                  print(f"\n--- {ident['instance_id']} ---")

                  status, t = call("POST", "/tenants", {
                      "name": ident["tenant_name"],
                      "tenant_id": ident["tenant_id"],
                  })
                  if status >= 400:
                      print(f"FAIL tenant: HTTP {status} {t}", file=sys.stderr); sys.exit(2)
                  print(f"[ok] tenant   id={t.get('id')} name={t.get('name')}")

                  status, p = call("POST", "/personas", {
                      "tenant_id": ident["tenant_id"],
                      "name": ident["persona_name"],
                      "persona_id": ident["persona_id"],
                      "soul_ref": ident["soul_ref"],
                      "memory_scope": ident["memory_scope"],
                  })
                  if status >= 400:
                      print(f"FAIL persona: HTTP {status} {p}", file=sys.stderr); sys.exit(3)
                  print(f"[ok] persona  id={p.get('id')} name={p.get('name')}")

                  status, h = call("POST", "/hermes-instances", {
                      "tenant_id": ident["tenant_id"],
                      "name": ident["instance_name"],
                      "instance_id": ident["instance_id"],
                      "persona_id": ident["persona_id"],
                      "home_ref": ident.get("home_ref", ""),
                  })
                  if status >= 400:
                      print(f"FAIL instance: HTTP {status} {h}", file=sys.stderr); sys.exit(4)
                  print(f"[ok] instance id={h.get('id')} name={h.get('name')} tenant={h.get('tenant_id')}")

              print("\n✓ registration complete")
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
