---

mac_url: http://mac-api.ai.svc.cluster.local:8000

# Fleet record for the UI Map (Fleet → Map view). Membership is derived by
# mac-k8s-bootstrap from the dispatcher agent + every role agent below; no
# agent_ids list to keep in sync. Create-or-update on every bootstrap.
fleet:
  name: ai-k8s
  description: K8s-native MAC fleet (ai namespace)
  status: active

dispatcher:
  machine:
    machine_id: mac-runner
    hostname: mac-runner.ai.svc.cluster.local
    labels:
      kind: k8s-deployment
      namespace: ai
  agent:
    agent_id: mac-runner
    name: mac-runner
    capabilities: [ops, python, hermes]

role_machines:
  - machine_id: mac-worker-machine
    hostname: mac-worker.ai.svc.cluster.local
    labels:
      kind: virtual
      owner: mac-k8s-bootstrap

roles:
  python-coder:
    agent_id: mac-worker-python-coder
    name: mac-worker-python-coder
    machine_id: mac-worker-machine
    capabilities: [python, ops]
    image: gitea.${CLUSTER_DOMAIN}/vpogu/mac-codex-runner:ebb5917-codex-test
    executor: /usr/local/bin/mac-task-executor-codex
    attestation_key_secret:
      name: mac-agent-attestation-keys
      key: python-coder
  python-reviewer:
    agent_id: mac-worker-python-reviewer
    name: mac-worker-python-reviewer
    machine_id: mac-worker-machine
    capabilities: [review, python]
    image: gitea.${CLUSTER_DOMAIN}/vpogu/mac-codex-runner:ebb5917-codex-test
    executor: /usr/local/bin/mac-task-executor-codex-review
    attestation_key_secret:
      name: mac-agent-attestation-keys
      key: python-reviewer
  python-coder-opencode:
    agent_id: mac-worker-python-coder-opencode
    name: mac-worker-python-coder-opencode
    machine_id: mac-worker-machine
    capabilities: [python, ops]
    image: gitea.${CLUSTER_DOMAIN}/vpogu/mac-codex-runner:ebb5917-codex-test
    executor: /usr/local/bin/mac-task-executor-opencode-build
    attestation_key_secret:
      name: mac-agent-attestation-keys
      key: python-coder-opencode
  python-reviewer-opencode:
    agent_id: mac-worker-python-reviewer-opencode
    name: mac-worker-python-reviewer-opencode
    machine_id: mac-worker-machine
    capabilities: [review, python]
    image: gitea.${CLUSTER_DOMAIN}/vpogu/mac-codex-runner:ebb5917-codex-test
    executor: /usr/local/bin/mac-task-executor-opencode-review
    attestation_key_secret:
      name: mac-agent-attestation-keys
      key: python-reviewer-opencode

capability_role_aliases:
  python: python-coder
  review: python-reviewer

# Notifier channels bootstrapped on every deploy.
# POST /notifier/channels uses INSERT ... ON CONFLICT(name) DO UPDATE
# so this is fully idempotent — safe to run on every orchestrator restart.
notifier_channels:
  - name: hermes-ai
    channel_type: hermes
    # Deliver task lifecycle events and fleet/project changes to the
    # hermes_ai instance (IVAN), which routes them to Telegram.
    event_types:
      - task.*
      - fleet.*
      - project.*
    target:
      hermes_instance_id: hermes_ai
    metadata:
      description: "Deliver MAC notifications to IVAN via Telegram"
    enabled: true

attestation_keys:
  namespace: ai
  secret_name: mac-agent-attestation-keys

projects:
  - name: ivan-plugin
    description: Ivan personal Hermes plugin
    status: active
    metadata:
      repository: https://gitea.a113.casa/vpogu/ivan-plugin.git
      default_branch: main
      # Non-git target: completion = reviewed + MR opened. publish_task
      # records this and transitions the task to COMPLETED without merging
      # (git:// targets would auto-merge to main — not wanted for the
      # human-merge MR flow). The agent's branch/MR stays open for review.
      publication_target: gitea://merge-request
      task_defaults:
        role: python-coder-opencode
        allowed_capabilities:
          - python
          - ops
  - name: mac
    description: Mac control plane + Hermes plugin source
    status: active
    metadata:
      repository: https://github.com/jordanhubbard/mac.git
      default_branch: main
      publication_target: gitea://merge-request
      task_defaults:
        role: python-coder-opencode
        allowed_capabilities:
          - python
          - ops
