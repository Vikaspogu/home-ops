---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mac-task-runner
  namespace: ai
  labels:
    app.kubernetes.io/name: mac-task-runner
    app.kubernetes.io/component: task-executor
automountServiceAccountToken: false
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mac-k8s-orchestrator
  namespace: ai
  labels:
    app.kubernetes.io/name: mac
    app.kubernetes.io/component: orchestrator
automountServiceAccountToken: true
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mac-k8s-orchestrator
  namespace: ai
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["mac-agent-attestation-keys"]
    verbs: ["get", "update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mac-k8s-orchestrator
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mac-k8s-orchestrator
subjects:
  - kind: ServiceAccount
    name: mac-k8s-orchestrator
    namespace: ai
