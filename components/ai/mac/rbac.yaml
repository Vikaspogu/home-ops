---
# ServiceAccount that task Jobs run AS. Intentionally bare: task Jobs
# never need K8s API access — they authenticate to mac-api via the
# MAC_WORKER_TOKEN env var injected from a Secret.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: mac-task-runner
  namespace: ai
  labels:
    app.kubernetes.io/name: mac-task-runner
    app.kubernetes.io/component: task-executor
automountServiceAccountToken: false
---
# Permissions for mac-k8s-runner: create + read + delete batch/v1 Jobs
# in the `ai` namespace. The runner pod itself gets these via its own
# ServiceAccount (created by app-template from values.yaml).
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mac-k8s-runner
  namespace: ai
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mac-k8s-runner
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mac-k8s-runner
subjects:
  - kind: ServiceAccount
    name: mac-k8s-runner
    namespace: ai
---
# Permissions for mac-k8s-controller (Phase 5):
#   - list/watch/delete batch/v1 Jobs   (reconcile stuck Jobs)
#   - read/scale apps/v1 Deployments    (provisioning fan-out)
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: mac-k8s-controller
  namespace: ai
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments/scale"]
    verbs: ["get", "patch", "update"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: mac-k8s-controller
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: mac-k8s-controller
subjects:
  - kind: ServiceAccount
    name: mac-k8s-controller
    namespace: ai
