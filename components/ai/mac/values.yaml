defaultPodOptions:
  imagePullSecrets:
  - name: gitea-registry-secret
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    fsGroup: 1000
    seccompProfile:
      type: RuntimeDefault
controllers:
  api:
    replicas: 2
    strategy: RollingUpdate
    rollingUpdate:
      surge: 1
      unavailable: "0%"
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      automountServiceAccountToken: false
    initContainers:
      init-01-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom: &envFrom
        - secretRef:
            name: mac-secret
        securityContext: &containerSecurityContext
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
    containers:
      app:
        image: &macImage
          repository: gitea.a113.casa/vpogu/mac
          tag: "20260621000925-40f7238"
        command: ["uvicorn"]
        args:
        - mac.api:create_app
        - --factory
        - --host
        - "0.0.0.0"
        - --port
        - "8000"
        - --workers
        - "1"
        - --log-level
        - info
        env:
          TZ: America/New_York
          PYTHONUNBUFFERED: "1"
          MAC_BIND_HOST: "0.0.0.0"
          MAC_DEFAULT_REVIEWER_STALE_AFTER_SECONDS: "86400"
          MAC_ROUTER_BACKEND: inproc
          MAC_ROUTER_PROVIDERS: "nvidia=https://inference-api.nvidia.com/v1,0,key=INFERENCE_HUB_API_KEY"
          MAC_ROUTER_DEFAULT_MODEL: "aws/anthropic/bedrock-claude-opus-4-8"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: &apiPort 8000
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              periodSeconds: 30
        securityContext: *containerSecurityContext
  orchestrator:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    serviceAccount:
      name: mac-k8s-orchestrator
    pod:
      automountServiceAccountToken: true
      topologySpreadConstraints:
      - maxSkew: 1
        topologyKey: kubernetes.io/hostname
        whenUnsatisfiable: ScheduleAnyway
        labelSelector:
          matchLabels:
            app.kubernetes.io/name: mac
            app.kubernetes.io/component: orchestrator
    initContainers:
      mac-bootstrap:
        image: *macImage
        command: ["mac-k8s-bootstrap"]
        envFrom: *envFrom
        env:
          PYTHONUNBUFFERED: "1"
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 1000
          runAsGroup: 1000
          capabilities: {drop: ["ALL"]}
    containers:
      app:
        image: *macImage
        command: ["mac-k8s-orchestrator"]
        env:
          TZ: America/New_York
          PYTHONUNBUFFERED: "1"
          MAC_URL: http://mac-api.ai.svc.cluster.local:8000
          MAC_RUNNER_NAMESPACE: ai
          MAC_RUNNER_TASK_SERVICE_ACCOUNT: mac-task-runner
          MAC_RUNNER_DEFAULT_IMAGE: gitea.${CLUSTER_DOMAIN}/vpogu/mac:bc710bad79a7
          MAC_RUNNER_TASK_SECRET_NAME: mac-secret
          MAC_RUNNER_POLL_INTERVAL_SECONDS: "5"
          MAC_RUNNER_ACTIVE_DEADLINE_SECONDS: "3000"
          MAC_TASK_EXECUTOR_TIMEOUT_SECONDS: "2700"
          MAC_AGENT_ID: mac-runner
          MAC_CONTROLLER_INTERVAL_SECONDS: "30"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              exec:
                command: ["pgrep", "-f", "mac-k8s-orchestrator"]
              initialDelaySeconds: 15
              periodSeconds: 30
              failureThreshold: 3
        securityContext: *containerSecurityContext
service:
  app:
    forceRename: mac-api
    primary: true
    controller: api
    ports:
      http:
        port: 8000
persistence:
  mac-config:
    type: configMap
    name: mac-config
    advancedMounts:
      orchestrator:
        mac-bootstrap:
        - path: /etc/mac/config.yaml
          subPath: config.yaml
          readOnly: true
        app:
        - path: /etc/mac/config.yaml
          subPath: config.yaml
          readOnly: true
