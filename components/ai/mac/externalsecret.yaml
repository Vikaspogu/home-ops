---
# yaml-language-server: $schema=https://raw.githubusercontent.com/datreeio/CRDs-catalog/refs/heads/main/external-secrets.io/externalsecret_v1.json
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mac
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mac-secret
    template:
      engineVersion: v2
      data:
        # ---- mac-api runtime ----
        # PostgresStore connects here. mac-api auto-applies the bundled
        # schema (src/mac/data/postgres/schema.sql) on startup; all
        # statements are IF NOT EXISTS / OR REPLACE so re-runs are
        # safe.
        MAC_DATABASE_URL: "postgresql://mac:{{ .MAC_POSTGRES_PASSWORD }}@pg17-omv-rw.default.svc.cluster.local:5432/mac"
        MAC_PG_POOL_SIZE: "20"
        # 32+ char HKDF input for the Fernet key that encrypts secret
        # values. mac-api refuses to start without it.
        MAC_SECRET_KEY: "{{ .MAC_SECRET_KEY }}"
        # Bearer token used by mac-k8s-runner -> mac-api and by every
        # in-Job mac-task-runner -> mac-api call. One token is fine for
        # the homelab tier; production deployments should mint per-Job
        # tokens via a future /tokens/mint endpoint.
        MAC_WORKER_TOKEN: "{{ .MAC_WORKER_TOKEN }}"
        MAC_API_TOKENS: '{"{{ .MAC_WORKER_TOKEN }}": ["admin"]}'
        # ---- postgres-init initContainer (creates db + role) ----
        # Same image and env-schema mem0 uses, so the existing 1Password
        # `cloudnative-pg` item (POSTGRES_SUPER_PASS) is reused.
        INIT_POSTGRES_HOST: pg17-omv-rw.default.svc.cluster.local
        INIT_POSTGRES_DBNAME: mac
        INIT_POSTGRES_USER: mac
        INIT_POSTGRES_PASS: "{{ .MAC_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: mac
    - extract:
        key: cloudnative-pg
