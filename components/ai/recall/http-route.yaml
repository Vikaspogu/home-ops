---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: recall
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["recall.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: recall-app
          port: 8000
