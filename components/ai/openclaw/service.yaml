---
# Headless Service + Endpoints pointing to DGX Spark's OpenClaw gateway.
# OpenClaw runs outside K8s on bare metal (spark.a113.internal:18789).
apiVersion: v1
kind: Service
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/instance: openclaw
    app.kubernetes.io/name: openclaw
spec:
  ports:
    - name: http
      port: 18789
      targetPort: 18789
      protocol: TCP
  clusterIP: None
---
apiVersion: v1
kind: Endpoints
metadata:
  name: openclaw
  labels:
    app.kubernetes.io/instance: openclaw
    app.kubernetes.io/name: openclaw
subsets:
  - addresses:
      - ip: 10.30.10.86
    ports:
      - name: http
        port: 18789
        protocol: TCP
