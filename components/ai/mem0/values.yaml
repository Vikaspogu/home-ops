---
controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      imagePullSecrets:
        - name: gitea-registry-secret
    initContainers:
      init-01-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        envFrom: &envFrom
          - secretRef:
              name: mem0-secret
      init-02-app-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
        env:
          INIT_POSTGRES_DBNAME: mem0_app
        envFrom: *envFrom
      init-03-vector:
        image:
          repository: ghcr.io/cloudnative-pg/postgresql
          tag: 17.10-standard-trixie
        command:
          - sh
          - -ec
        args:
          - |
            export PGPASSWORD="${INIT_POSTGRES_SUPER_PASS}"
            for db in "${POSTGRES_DB}" "${APP_DB_NAME}"; do
              psql \
                --host "${INIT_POSTGRES_HOST}" \
                --username postgres \
                --dbname "${db}" \
                --command 'CREATE EXTENSION IF NOT EXISTS vector;'
            done
        env:
          POSTGRES_DB: mem0
          APP_DB_NAME: mem0_app
        envFrom: *envFrom
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
    containers:
      app:
        image:
          repository: gitea.${CLUSTER_DOMAIN}/vpogu/mem0-api-server
          tag: 20260608200944-cc10473-oci
        command:
          - sh
          - -ec
        args:
          - |
            for attempt in $(seq 1 30); do
              echo "Running database migrations... attempt ${attempt}/30"
              if alembic upgrade head; then
                echo "Database migrations completed"
                exec uvicorn main:app --host 0.0.0.0 --port 8000
              fi

              echo "Database migrations failed; retrying in 10 seconds"
              sleep 10
            done

            echo "Database migrations failed after 30 attempts"
            exit 1
        env:
          TZ: America/New_York
          PYTHONUNBUFFERED: "1"
          PYTHON_DOTENV_DISABLED: "1"
          POSTGRES_HOST: pgvector17-rw.default.svc.cluster.local
          POSTGRES_PORT: "5432"
          POSTGRES_DB: mem0
          POSTGRES_USER: mem0
          POSTGRES_COLLECTION_NAME: memories
          APP_DB_NAME: mem0_app
          HISTORY_DB_PATH: /data/history.db
          DASHBOARD_URL: "https://mem0.${CLUSTER_DOMAIN}"
          AUTH_DISABLED: "false"
          MEM0_TELEMETRY: "false"
          MEM0_DEFAULT_LLM_MODEL: openai/openai/gpt-5.4-mini
          MEM0_DEFAULT_EMBEDDER_MODEL: azure/openai/text-embedding-3-small
        envFrom: *envFrom
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /docs
                port: &httpPort 8000
              initialDelaySeconds: 20
              periodSeconds: 10
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /docs
                port: *httpPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /docs
                port: *httpPort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL
  dashboard:
    replicas: 1
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      imagePullSecrets:
        - name: gitea-registry-secret
    containers:
      app:
        image:
          repository: gitea.${CLUSTER_DOMAIN}/vpogu/mem0-dashboard
          tag: 20260608200944-cc10473-oci
        env:
          TZ: America/New_York
          NEXT_PUBLIC_API_URL: "https://mem0.${CLUSTER_DOMAIN}"
          API_INTERNAL_URL: "http://mem0.ai.svc.cluster.local:8000"
          NEXT_PUBLIC_INSTANCE_NAME: Mem0
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 512Mi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: &dashboardPort 3000
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: *dashboardPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/health
                port: *dashboardPort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
              - ALL

service:
  app:
    forceRename: mem0
    primary: true
    controller: app
    ports:
      http:
        port: 8000
  dashboard:
    controller: dashboard
    ports:
      http:
        port: *dashboardPort

persistence:
  data:
    existingClaim: mem0
    globalMounts:
      - path: /data
