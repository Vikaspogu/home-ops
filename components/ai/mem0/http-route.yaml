---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app mem0
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["mem0.${CLUSTER_DOMAIN}"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /auth
        - path:
            type: PathPrefix
            value: /api-keys
        - path:
            type: PathPrefix
            value: /requests
        - path:
            type: PathPrefix
            value: /entities
        - path:
            type: PathPrefix
            value: /configure
        - path:
            type: PathPrefix
            value: /generate-instructions
        - path:
            type: PathPrefix
            value: /memories
        - path:
            type: PathPrefix
            value: /search
        - path:
            type: PathPrefix
            value: /reset
        - path:
            type: PathPrefix
            value: /docs
        - path:
            type: PathPrefix
            value: /redoc
        - path:
            type: PathPrefix
            value: /openapi.json
      backendRefs:
        - name: *app
          port: 8000
    - backendRefs:
        - name: mem0-dashboard
          port: 3000
