---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: mem0
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: mem0-secret
    template:
      engineVersion: v2
      data:
        OPENAI_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        OPENAI_BASE_URL: '{{ trimSuffix "/" .INFERENCE_HUB_BASE_URL }}/v1'
        POSTGRES_PASSWORD: "{{ .MEM0_POSTGRES_PASSWORD }}"
        JWT_SECRET: "{{ .MEM0_JWT_SECRET }}"
        ADMIN_API_KEY: "{{ .MEM0_ADMIN_API_KEY }}"
        INIT_POSTGRES_DBNAME: mem0
        INIT_POSTGRES_HOST: pgvector17-rw.default.svc.cluster.local
        INIT_POSTGRES_USER: mem0
        INIT_POSTGRES_PASS: "{{ .MEM0_POSTGRES_PASSWORD }}"
        INIT_POSTGRES_SUPER_PASS: "{{ .POSTGRES_SUPER_PASS }}"
  dataFrom:
    - extract:
        key: inference-hub
    - extract:
        key: hermes
    - extract:
        key: mem0
    - extract:
        key: cloudnative-pg
