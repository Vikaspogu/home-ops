# Reflects openshell-client-tls into the sandbox namespace.
# The certgen helm hook creates openshell-client-tls in ns ai only, but the
# gateway mounts it by name into every sandbox pod in openshell-sandboxes, so
# without this the pods hang Init:0/2 on FailedMount. certgen has only secrets
# get,create (no update), so it never overwrites the existing secret and these
# reflector annotations survive upgrades. A PostSync hook job adds the
# annotations after the certgen secret exists; emberstack reflector mirrors it.
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: openshell-reflect-client-tls
  namespace: ai
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: openshell-reflect-client-tls
  namespace: ai
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["openshell-client-tls"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: openshell-reflect-client-tls
  namespace: ai
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: openshell-reflect-client-tls
subjects:
  - kind: ServiceAccount
    name: openshell-reflect-client-tls
    namespace: ai
---
apiVersion: batch/v1
kind: Job
metadata:
  name: openshell-reflect-client-tls
  namespace: ai
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: HookSucceeded
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
spec:
  backoffLimit: 6
  template:
    spec:
      serviceAccountName: openshell-reflect-client-tls
      restartPolicy: OnFailure
      containers:
        - name: kubectl
          image: registry.k8s.io/kubectl:v1.36.3@sha256:6e4fce3c83651edb91b74bc67701c5cd263dd8aa3cd4254b1798d6425a5ab789
          command:
            - kubectl
            - annotate
            - secret
            - openshell-client-tls
            - -n
            - ai
            - --overwrite
            - reflector.v1.k8s.emberstack.com/reflection-allowed=true
            - reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces=openshell-sandboxes
            - reflector.v1.k8s.emberstack.com/reflection-auto-enabled=true
            - reflector.v1.k8s.emberstack.com/reflection-auto-namespaces=openshell-sandboxes
