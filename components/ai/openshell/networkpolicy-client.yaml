# Restricts ingress on the gateway client API (8080) to the Forge orchestrator
# and managed sandbox agents (which dial back for policy fetch + log push).
# The chart's built-in NetworkPolicy only covers sandbox SSH (2222), leaving the
# client API open. With allowUnauthenticatedUsers=true this is the auth boundary
# until iteration 2 moves to OIDC via Authelia.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openshell-gateway-client-api
  namespace: ai
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openshell
      app.kubernetes.io/instance: openshell
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ai
          podSelector:
            matchLabels:
              app.kubernetes.io/name: forge-orchestrator
        # Sandbox pods carry only agents.x-k8s.io/sandbox-name-hash (unique per pod),
        # not openshell.ai/managed-by, so gate on the dedicated namespace alone.
        - namespaceSelector:
            matchLabels:
              openshell.io/sandbox-namespace: "true"
      ports:
        - protocol: TCP
          port: 8080
