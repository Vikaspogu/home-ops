replicaCount: 1

workload:
  kind: Deployment

server:
  sandboxNamespace: openshell-sandboxes
  sandboxImage: gitea.a113.casa/vpogu/openshell-sandbox:opencode-1.17.11
  appArmorProfile: Unconfined
  externalDbSecret: openshell-db-secret
  auth:
    allowUnauthenticatedUsers: true
  disableTls: false
  logLevel: debug
  # ttlSecs=86400: kustomize configmap patch overrides this to the literal value anyway (Helm
  # default filter treats 0 as falsy). Large TTL tests whether the supervisor refresh timer is
  # TTL-relative (3600/360=10s crash, 86400/360=240s would be ~4min before crash).
  sandboxJwt:
    ttlSecs: 86400

image:
  repository: ghcr.io/nvidia/openshell/gateway
  tag: latest
  pullPolicy: IfNotPresent

# Supervisor tag defaults to chart appVersion (dev); pin to latest to match gateway:latest or the bootstrap handshake fails (version skew).
# pullPolicy Always so the floating latest supervisor build is re-pulled instead of a stale node cache.
supervisor:
  image:
    tag: "0.0.72"
    pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080

# Pin server cert SANs to ns ai; default SANs hardcode ns openshell so sandbox agents fail TLS to openshell.ai.svc.cluster.local.
pkiInitJob:
  serverDnsNames:
    - openshell
    - openshell.ai.svc
    - openshell.ai.svc.cluster.local
    - localhost
