replicaCount: 1

workload:
  kind: Deployment

server:
  sandboxNamespace: openshell-sandboxes
  appArmorProfile: Unconfined
  externalDbSecret: openshell-db-secret
  auth:
    allowUnauthenticatedUsers: true
  disableTls: false
  logLevel: info
  sandboxImage: gitea.a113.casa/vpogu/openshell-sandbox:opencode-1.17.11
  sandboxImagePullPolicy: Always
  sandboxImagePullSecrets:
    - name: gitea-registry-secret

image:
  repository: ghcr.io/nvidia/openshell/gateway
  tag: "0.0.89"
  pullPolicy: Always

# Pin supervisor and gateway to the same release; version skew breaks bootstrap.
supervisor:
  image:
    repository: ghcr.io/nvidia/openshell/supervisor
    tag: "0.0.89"
    pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080

# Pin server cert SANs to ns ai; default SANs hardcode ns openshell so sandbox agents fail TLS to openshell.ai.svc.cluster.local.
pkiInitJob:
  serverDnsNames:
    - openshell
    - openshell.ai.svc
    - openshell.ai.svc.cluster.local
    - localhost
