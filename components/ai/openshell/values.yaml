replicaCount: 1

workload:
  kind: Deployment

server:
  sandboxNamespace: openshell-sandboxes
  sandboxImage: ghcr.io/nvidia/openshell-community/sandboxes/base:latest
  appArmorProfile: Unconfined
  externalDbSecret: openshell-db-secret
  auth:
    allowUnauthenticatedUsers: true
  disableTls: false
  logLevel: debug
  # ttlSecs=0 disables JWT expiry; supervisor never calls RefreshSandboxToken, avoiding the
  # gateway v0.0.72 bug where RefreshSandboxToken returns a JWT with an invalid trailing byte.
  sandboxJwt:
    ttlSecs: 0

image:
  repository: ghcr.io/nvidia/openshell/gateway
  tag: latest
  pullPolicy: IfNotPresent

# Supervisor tag defaults to chart appVersion (dev); pin to latest to match gateway:latest or the bootstrap handshake fails (version skew).
# pullPolicy Always so the floating latest supervisor build is re-pulled instead of a stale node cache.
supervisor:
  image:
    tag: "0.0.72"
    pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080

# Pin server cert SANs to ns ai; default SANs hardcode ns openshell so sandbox agents fail TLS to openshell.ai.svc.cluster.local.
pkiInitJob:
  serverDnsNames:
    - openshell
    - openshell.ai.svc
    - openshell.ai.svc.cluster.local
    - localhost
