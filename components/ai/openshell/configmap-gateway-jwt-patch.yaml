# Patch: force ttl_secs = 86400 (24h) in the gateway TOML regardless of Helm template rendering.
# Helm `default` treats 0 as falsy so `ttlSecs: 0` in values.yaml silently falls back to 3600.
# With ttl_secs = 0 the gateway returns a trailers-only gRPC error for IssueSandboxToken (bootstrap
# fails immediately). With ttl_secs = 3600 the supervisor crashes at t+10s via RefreshSandboxToken.
# Hypothesis: supervisor refresh timer = TTL/360, so 3600/360 = 10s crash. Setting 86400 pushes
# the refresh to t+240s - verifying TTL-relative timer. Will bump to 31536000 (1yr) once confirmed.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openshell-config
data:
  gateway.toml: |
    [openshell]
    version = 1

    [openshell.gateway]
    bind_address          = "0.0.0.0:8080"
    health_bind_address   = "0.0.0.0:8081"
    metrics_bind_address  = "0.0.0.0:9090"
    log_level             = "debug"
    sandbox_namespace     = "openshell-sandboxes"
    default_image         = "gitea.a113.casa/vpogu/openshell-sandbox:opencode-1.17.11"
    supervisor_image      = "ghcr.io/nvidia/openshell/supervisor:0.0.72"
    client_tls_secret_name = "openshell-client-tls"
    enable_loopback_service_http = true
    server_sans = ["openshell", "openshell.ai.svc", "openshell.ai.svc.cluster.local", "localhost"]

    [openshell.gateway.tls]
    cert_path             = "/etc/openshell-tls/server/tls.crt"
    key_path              = "/etc/openshell-tls/server/tls.key"
    client_ca_path        = "/etc/openshell-tls/client-ca/ca.crt"

    [openshell.gateway.auth]
    allow_unauthenticated_users = true

    [openshell.gateway.gateway_jwt]
    signing_key_path = "/etc/openshell-jwt/signing.pem"
    public_key_path  = "/etc/openshell-jwt/public.pem"
    kid_path         = "/etc/openshell-jwt/kid"
    gateway_id       = "openshell"
    ttl_secs         = 86400

    [openshell.drivers.kubernetes]
    grpc_endpoint                = "https://openshell.ai.svc.cluster.local:8080"
    service_account_name         = "openshell-sandbox"
    supervisor_sideload_method   = "init-container"
    sa_token_ttl_secs            = 3600
    app_armor_profile            = "Unconfined"
    supervisor_image_pull_policy = "Always"
