# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./sandbox-namespace.yaml
  - ./externalsecret.yaml
  - ./networkpolicy-client.yaml
  - ./reflect-client-tls.yaml

patches:
  - path: configmap-gateway-jwt-patch.yaml
    target:
      kind: ConfigMap
      name: openshell-config
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openshell
      spec:
        template:
          spec:
            initContainers:
              - name: init-db
                image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
                envFrom:
                  - secretRef:
                      name: openshell-db-secret
helmCharts:
  - name: helm-chart
    releaseName: openshell
    namespace: ai
    repo: oci://ghcr.io/nvidia/openshell
    version: "0.0.0-dev"
    valuesFile: values.yaml
    includeCRDs: false
