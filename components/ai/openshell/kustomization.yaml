# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ./sandbox-namespace.yaml
  - ./externalsecret.yaml

patches:
  - patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: openshell
        namespace: ai
      spec:
        template:
          spec:
            initContainers:
              - name: init-db
                image: ghcr.io/home-operations/postgres-init:18.4.0@sha256:5086f94abc783f1147d7c2a32c01db00ab594820026e4f6a82ac2af3dbde7fc7
                envFrom:
                  - secretRef:
                      name: openshell-db-secret

helmCharts:
  - name: helm-chart
    releaseName: openshell
    namespace: ai
    repo: oci://ghcr.io/nvidia/openshell
    version: "0.0.0-dev"
    valuesFile: values.yaml
    includeCRDs: false
