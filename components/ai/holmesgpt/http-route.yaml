---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app holmesgpt
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["holmesgpt.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: holmesgpt-holmes
          port: 80
