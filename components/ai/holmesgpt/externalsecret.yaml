---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: holmesgpt-ai-provider
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: holmesgpt-ai-provider
    template:
      engineVersion: v2
      data:
        api_key: "{{ .INFERENCE_HUB_CODING_KEY }}"
        base_url: "{{ .INFERENCE_HUB_BASE_URL }}"
  dataFrom:
    - extract:
        key: inference-hub
