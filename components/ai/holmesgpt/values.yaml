---
replicas: 1
logLevel: INFO
enableTelemetry: false
sentryDSN: '""'

resources:
  requests:
    cpu: 100m
    memory: 1Gi
  limits:
    memory: 2Gi

additionalEnvVars:
  - name: NVIDIA_INFERENCE_HUB_API_KEY
    valueFrom:
      secretKeyRef:
        name: holmesgpt-ai-provider
        key: api_key
  - name: NVIDIA_INFERENCE_HUB_BASE_URL
    valueFrom:
      secretKeyRef:
        name: holmesgpt-ai-provider
        key: base_url

modelList:
  gpt-5.5:
    # LiteLLM strips the provider prefix before sending the model to the
    # OpenAI-compatible endpoint. custom_openai preserves the raw NVIDIA
    # Inference Hub model ID as openai/openai/gpt-5.5.
    model: custom_openai/openai/openai/gpt-5.5
    api_key: "{{ env.NVIDIA_INFERENCE_HUB_API_KEY }}"
    api_base: "{{ env.NVIDIA_INFERENCE_HUB_BASE_URL }}"
    temperature: 1

toolsets:
  kubernetes/core:
    enabled: true
  kubernetes/logs:
    enabled: true
  prometheus/metrics:
    enabled: true
  internet:
    enabled: false
  bash:
    enabled: false
  robusta:
    enabled: false
  runbook:
    enabled: true
  connectivity_check:
    enabled: true

crdPermissions:
  argo: true
  flux: true
  kafka: false
  keda: false
  crossplane: true
  istio: false
  gatewayApi: true
  velero: false
  externalSecrets: true

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 10001
  runAsGroup: 10001
  fsGroup: 10001
  seccompProfile:
    type: RuntimeDefault

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
