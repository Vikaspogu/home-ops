---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: holmes-alertmanager-active-alerts
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/instance: holmesgpt
    app.kubernetes.io/component: proactive-check
spec:
  schedule: "*/30 * * * *"
  enabled: true
  timeout: 300
  mode: alert
  destinations:
    - type: slack
      config:
        channel: "#homelab-alerts"
  query: |-
    Investigate active Alertmanager issues for this Kubernetes cluster.

    First, use the alertmanager-api tool to fetch:
    http://alertmanager-operated.observability.svc.cluster.local:9093/api/v2/alerts?active=true&silenced=false&inhibited=false

    If there are no active, unsilenced, uninhibited alerts, return pass.

    For each active warning or critical alert, investigate the likely root cause
    using the most relevant available data sources:
    - Kubernetes resources, events, pod status, and pod logs
    - Prometheus metrics and alerting rules
    - Loki historical logs when pod logs are not enough
    - ArgoCD Application CRDs for GitOps health, sync, and drift signals
    - Cilium core tools for network, DNS, service, or policy-related alerts

    Return fail only when at least one active alert still needs operator
    attention. Include the alert name, namespace or resource, likely root cause,
    evidence used, and the next concrete remediation step.
---
apiVersion: holmesgpt.dev/v1alpha1
kind: ScheduledHealthCheck
metadata:
  name: holmes-cluster-gitops-network-health
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/sync-options: SkipDryRunOnMissingResource=true
  labels:
    app.kubernetes.io/name: holmesgpt
    app.kubernetes.io/instance: holmesgpt
    app.kubernetes.io/component: proactive-check
spec:
  schedule: "20 */2 * * *"
  enabled: true
  timeout: 300
  mode: alert
  destinations:
    - type: slack
      config:
        channel: "#homelab-alerts"
  query: |-
    Run a proactive health sweep for high-signal cluster issues.

    Check:
    - pods in CrashLoopBackOff, ImagePullBackOff, OOMKilled, Pending, or repeated restarts
    - nodes with pressure, NotReady status, or unusual live CPU/memory pressure
    - PVCs that are Pending, lost, nearly full, or attached to failing workloads
    - ArgoCD Applications that are Degraded, Unknown, OutOfSync, or stuck syncing
    - Cilium health, endpoints, services, and policies for network-related issues
    - recent warning events and relevant Prometheus metrics

    Return pass when there are no actionable issues. Return fail only for issues
    that need operator attention, with concise evidence and next steps. Do not
    report purely informational drift or already-recovering transient states as
    failures.
