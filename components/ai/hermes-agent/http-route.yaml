---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app hermes-agent
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
  annotations:
    gethomepage.dev/href: "https://hermes.${CLUSTER_DOMAIN}"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Ingress
    gethomepage.dev/icon: https://cdn.jsdelivr.net/gh/selfhst/icons@main/png/hermes-agent.png
    gethomepage.dev/name: Hermes Agent
    gethomepage.dev/description: Hermes Agent dashboard
    gethomepage.dev/app: hermes-agent
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=hermes-agent
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["hermes.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: *app
          port: 9119
