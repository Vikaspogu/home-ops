controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      configmap.reloader.stakater.com/reload: hermes-agent-config
      secret.reloader.stakater.com/reload: hermes-agent-secret
    pod:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: Always
    initContainers:
      seed-config:
        image:
          repository: gitea.omv.a113.casa/vpogu/hermes-agent-custom
          tag: 20260524192328-7468e62-oci
        command: ["hermes-seed-config"]
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10000
          runAsGroup: 10000
          capabilities: {drop: ["ALL"]}
        envFrom:
        - secretRef:
            name: hermes-agent-secret
      install-ivan-personal-plugin:
        image:
          repository: gitea.omv.a113.casa/vpogu/ivan-personal-plugin
          tag: 20260525174405-a812260-oci
          pullPolicy: Always
        command: ["/bin/sh", "-ec"]
        args:
        - |
          rm -rf /opt/data/plugins/ivan-personal
          mkdir -p /opt/data/plugins/ivan-personal
          cp -R /plugin/. /opt/data/plugins/ivan-personal/
          test -f /opt/data/plugins/ivan-personal/plugin.yaml
          test -f /opt/data/plugins/ivan-personal/__init__.py
        resources:
          requests:
            cpu: 10m
            memory: 32Mi
          limits:
            memory: 128Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10000
          runAsGroup: 10000
          capabilities: {drop: ["ALL"]}
    containers:
      app:
        image:
          repository: gitea.omv.a113.casa/vpogu/hermes-agent-custom
          tag: 20260524192328-7468e62-oci
        args:
        - gateway
        - run
        env:
          PATH: /usr/local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          HOME: /opt/data
          HERMES_HOME: /opt/data
          XDG_CONFIG_HOME: /opt/data/.config
          XDG_DATA_HOME: /opt/data/.local/share
          XDG_CACHE_HOME: /opt/data/.cache
          CODEX_HOME: /opt/data/.codex
          CLAUDE_CONFIG_DIR: /opt/data/.claude
          AGENT_BROWSER_EXECUTABLE_PATH: /usr/bin/chromium
          PLAYWRIGHT_BROWSERS_PATH: /opt/data/.cache/ms-playwright
          PUPPETEER_CACHE_DIR: /opt/data/.cache/puppeteer
          PYTHONUNBUFFERED: "1"
          HERMES_DASHBOARD: "1"
          HERMES_DASHBOARD_HOST: "0.0.0.0"
          HERMES_DASHBOARD_PORT: &dashboardPort 9119
          API_SERVER_ENABLED: "true"
          API_SERVER_HOST: "127.0.0.1"
          API_SERVER_PORT: "8642"
          MEM0_API_URL: http://mem0.ai.svc.cluster.local:8000
          MEM0_USER_ID: vikas
          MEM0_AGENT_ID: hermes
          MEM0_PIN_USER_ID: "true"
          MEM0_TOP_K: "5"
          TZ: America/New_York
        envFrom:
        - secretRef:
            name: hermes-agent-secret
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
      workspace:
        image:
          repository: gitea.omv.a113.casa/vpogu/agent-platform-hermes-workspace
          tag: 20260525023057-a37957b-oci
          pullPolicy: IfNotPresent
        env:
          HOME: /home/workspace
          HERMES_HOME: /home/workspace/.hermes
          XDG_CONFIG_HOME: /home/workspace/.config
          XDG_DATA_HOME: /home/workspace/.local/share
          XDG_CACHE_HOME: /home/workspace/.cache
          CODEX_HOME: /home/workspace/.codex
          CLAUDE_CONFIG_DIR: /home/workspace/.claude
          PORT: &workspacePort 3000
          HERMES_WORKSPACE_DIR: /workspace
          HERMES_API_URL: http://127.0.0.1:8642
          HERMES_DASHBOARD_URL: http://127.0.0.1:9119
          HERMES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: hermes-agent-secret
                key: HERMES_WORKSPACE_PASSWORD
          COOKIE_SECURE: "1"
          TRUST_PROXY: "1"
          TMUX_BIN: /usr/bin/tmux
          HERMES_TMUX_BIN: /usr/bin/tmux
          BEADS_DOLT_SERVER_HOST: beadboard-dolt.ai.svc.cluster.local
          BEADS_DOLT_SERVER_PORT: "3307"
          BEADS_DOLT_SERVER_USER: root
          TZ: America/New_York
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 3Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *workspacePort
              initialDelaySeconds: 20
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *workspacePort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *workspacePort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10000
          runAsGroup: 10000
          capabilities: {drop: ["ALL"]}
service:
  app:
    controller: app
    ports:
      dashboard:
        port: *dashboardPort
      workspace:
        port: *workspacePort
persistence:
  app-data:
    existingClaim: hermes-agent
    advancedMounts:
      app:
        seed-config:
        - path: /opt/data
        install-ivan-personal-plugin:
        - path: /opt/data
        app:
        - path: /opt/data
        workspace:
        - path: /home/workspace
          subPath: workspace-home
        - path: /workspace
          subPath: workspace
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 512Mi
    advancedMounts:
      app:
        workspace:
        - path: /tmp
  config:
    type: configMap
    name: hermes-agent-config
    advancedMounts:
      app:
        seed-config:
        - path: /opt/bootstrap/config.yaml
          subPath: config.yaml
          readOnly: true
        - path: /opt/bootstrap/pricing-overrides.yaml
          subPath: pricing-overrides.yaml
          readOnly: true
  secret:
    type: secret
    name: hermes-agent-secret
    advancedMounts:
      app:
        app:
        - path: /opt/data/.env
          subPath: .env
          readOnly: true
