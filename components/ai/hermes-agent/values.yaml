controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      configmap.reloader.stakater.com/reload: hermes-agent-config
      secret.reloader.stakater.com/reload: hermes-agent-secret
    pod:
      securityContext:
        fsGroup: 10000
        fsGroupChangePolicy: OnRootMismatch
    initContainers:
      hermes-bootstrap:
        image:
          repository: gitea.a113.casa/vpogu/agent-platform-hermes-agent
          tag: 20260703123014-9346931-oci
        command: ["python", "/etc/hermes-bootstrap/bootstrap.py"]
        env:
          PYTHONUNBUFFERED: "1"
        envFrom:
        - secretRef:
            name: hermes-agent-secret
        resources:
          requests:
            cpu: 25m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10000
          runAsGroup: 10000
          capabilities: {drop: ["ALL"]}
      seed-config:
        image:
          tag: 20260703123014-9346931-oci
          repository: gitea.a113.casa/vpogu/agent-platform-hermes-agent
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/agent-platform-hermes-agent
          tag: 20260703123014-9346931-oci
        args:
        - gateway
        - run
        env:
          PATH: /usr/local/bin:/opt/hermes/.venv/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          HOME: /opt/data
          HERMES_HOME: /opt/data
          XDG_CONFIG_HOME: /opt/data/.config
          XDG_DATA_HOME: /opt/data/.local/share
          XDG_CACHE_HOME: /opt/data/.cache
          CODEX_HOME: /opt/data/.codex
          CLAUDE_CONFIG_DIR: /opt/data/.claude
          AGENT_BROWSER_EXECUTABLE_PATH: /usr/bin/chromium
          PLAYWRIGHT_BROWSERS_PATH: /opt/data/.cache/ms-playwright
          PUPPETEER_CACHE_DIR: /opt/data/.cache/puppeteer
          PYTHONUNBUFFERED: "1"
          HERMES_DASHBOARD: "1"
          HERMES_DASHBOARD_HOST: "0.0.0.0"
          HERMES_DASHBOARD_PORT: &dashboardPort 9119
          API_SERVER_ENABLED: "true"
          API_SERVER_HOST: "127.0.0.1"
          API_SERVER_PORT: "8642"
          AGENTMEMORY_URL: http://agentmemory.ai.svc.cluster.local:3111
          SEARXNG_URL: http://searxng.ai.svc.cluster.local:8080
          HERMES_NEMO_RELAY_PLUGINS_TOML: /opt/data/nemo-relay-plugins.toml
          TZ: America/New_York
          HEADROOM_PROXY_URL: http://headroom.ai.svc.cluster.local:8787
        envFrom:
        - secretRef:
            name: hermes-agent-secret
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
service:
  app:
    controller: app
    ports:
      dashboard:
        port: *dashboardPort
      webhook:
        port: 8644
persistence:
  app-data:
    existingClaim: hermes-agent
    advancedMounts:
      app:
        hermes-bootstrap:
        - path: /opt/data
        app:
        - path: /opt/data
  config:
    type: configMap
    name: hermes-agent-config
    advancedMounts:
      app:
        hermes-bootstrap:
        - path: /opt/bootstrap/config.yaml
          subPath: config.yaml
          readOnly: true
        - path: /opt/data/nemo-relay-plugins.toml
          subPath: nemo-relay-plugins.toml
          readOnly: true
        # The app container must see the ConfigMap content, not the PVC's
        # stale placeholder at the same path — HERMES_NEMO_RELAY_PLUGINS_TOML
        # points here and the plugin silently no-ops on an empty file.
        app:
        - path: /opt/data/nemo-relay-plugins.toml
          subPath: nemo-relay-plugins.toml
          readOnly: true
  bootstrap:
    type: configMap
    name: hermes-bootstrap
    advancedMounts:
      app:
        hermes-bootstrap:
        - path: /etc/hermes-bootstrap/bootstrap.py
          subPath: bootstrap.py
          readOnly: true
        - path: /etc/hermes-bootstrap/config.yaml
          subPath: config.yaml
          readOnly: true
  secret:
    type: secret
    name: hermes-agent-secret
    advancedMounts:
      app:
        app:
        - path: /opt/data/.env
          subPath: .env
          readOnly: true
