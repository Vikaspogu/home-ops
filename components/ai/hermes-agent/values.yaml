---
controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      configmap.reloader.stakater.com/reload: hermes-agent-config
      secret.reloader.stakater.com/reload: hermes-agent-secret
    initContainers:
      seed-config:
        image:
          repository: nousresearch/hermes-agent
          tag: v2026.5.7@sha256:bb976ccbfcb6989c04e331e0b3a4ddf959088fa6163782dc737ce6d62476905a
        command: ["/opt/hermes/.venv/bin/python", "-c"]
        args:
          - |
            import json
            import os
            from pathlib import Path

            import yaml

            data_dir = Path(os.environ.get("HERMES_DATA_DIR", "/opt/data"))
            bootstrap_dir = Path(os.environ.get("HERMES_BOOTSTRAP_DIR", "/opt/bootstrap"))
            data_dir.mkdir(parents=True, exist_ok=True)
            (data_dir / "workspace").mkdir(parents=True, exist_ok=True)

            def deep_merge(base, overlay):
                merged = dict(base)
                for key, value in overlay.items():
                    if isinstance(value, dict) and isinstance(merged.get(key), dict):
                        merged[key] = deep_merge(merged[key], value)
                    else:
                        merged[key] = value
                return merged

            def write_atomic(path, content, default_mode):
                tmp = path.with_name(f".{path.name}.tmp")
                tmp.write_text(content)
                mode = path.stat().st_mode & 0o777 if path.exists() else default_mode
                os.chmod(tmp, mode)
                os.replace(tmp, path)

            def load_yaml(path):
                if not path.exists() or path.stat().st_size == 0:
                    return {}
                data = yaml.safe_load(path.read_text())
                return data if isinstance(data, dict) else {}

            def sync_yaml(name):
                source = bootstrap_dir / name
                target = data_dir / name
                if not source.exists():
                    return
                merged = deep_merge(load_yaml(target), load_yaml(source))
                write_atomic(target, yaml.safe_dump(merged, sort_keys=False), 0o640)

            def load_json(path):
                if not path.exists() or path.stat().st_size == 0:
                    return {}
                data = json.loads(path.read_text())
                return data if isinstance(data, dict) else {}

            def sync_json(name):
                source = bootstrap_dir / name
                target = data_dir / name
                if not source.exists():
                    return
                merged = deep_merge(load_json(target), load_json(source))
                write_atomic(target, json.dumps(merged, indent=2) + "\n", 0o640)

            sync_yaml("config.yaml")
            sync_json("honcho.json")
        resources:
          requests:
            cpu: 10m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10000
          runAsGroup: 10000
          capabilities: { drop: ["ALL"] }
    containers:
      app:
        image:
          repository: nousresearch/hermes-agent
          tag: v2026.5.7@sha256:bb976ccbfcb6989c04e331e0b3a4ddf959088fa6163782dc737ce6d62476905a
        args:
          - gateway
          - run
        env:
          HERMES_HOME: /opt/data
          PYTHONUNBUFFERED: "1"
          HERMES_DASHBOARD: "1"
          HERMES_DASHBOARD_HOST: "0.0.0.0"
          HERMES_DASHBOARD_PORT: &dashboardPort 9119
          API_SERVER_ENABLED: "true"
          API_SERVER_HOST: "127.0.0.1"
          API_SERVER_PORT: "8642"
        envFrom:
          - secretRef:
              name: hermes-agent-secret
        resources:
          requests:
            cpu: 100m
            memory: 1Gi
          limits:
            memory: 4Gi
        securityContext:
          allowPrivilegeEscalation: false
      workspace:
        image:
          repository: ghcr.io/outsourc-e/hermes-workspace
          tag: latest@sha256:2d2ba9aa5b1230766267322817e8e51113541780a5797802a582a47cc34a3df3
        env:
          HERMES_HOME: /opt/data
          PORT: &workspacePort 3000
          HERMES_WORKSPACE_DIR: /workspace
          HERMES_API_URL: http://127.0.0.1:8642
          HERMES_DASHBOARD_URL: http://127.0.0.1:9119
          HERMES_PASSWORD:
            valueFrom:
              secretKeyRef:
                name: hermes-agent-secret
                key: HERMES_WORKSPACE_PASSWORD
          COOKIE_SECURE: "1"
          TRUST_PROXY: "1"
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 3Gi
        probes:
          liveness: &workspaceProbes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *workspacePort
              initialDelaySeconds: 20
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 3
          readiness: *workspaceProbes
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10010
          runAsGroup: 10010
          capabilities: { drop: ["ALL"] }

service:
  app:
    controller: app
    ports:
      dashboard:
        port: *dashboardPort
      workspace:
        port: *workspacePort

persistence:
  app-data:
    existingClaim: hermes-agent
    advancedMounts:
      app:
        seed-config:
          - path: /opt/data
        app:
          - path: /opt/data
        workspace:
          - path: /opt/data
          - path: /workspace
            subPath: workspace
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 256Mi
    advancedMounts:
      app:
        workspace:
          - path: /tmp
  config:
    type: configMap
    name: hermes-agent-config
    advancedMounts:
      app:
        seed-config:
          - path: /opt/bootstrap/config.yaml
            subPath: config.yaml
            readOnly: true
          - path: /opt/bootstrap/honcho.json
            subPath: honcho.json
            readOnly: true
  secret:
    type: secret
    name: hermes-agent-secret
    advancedMounts:
      app:
        app:
          - path: /opt/data/.env
            subPath: .env
            readOnly: true
