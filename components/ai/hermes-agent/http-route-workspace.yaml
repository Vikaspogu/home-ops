---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app hermes-workspace
  labels:
    app.kubernetes.io/instance: hermes-agent
    app.kubernetes.io/name: *app
  annotations:
    gethomepage.dev/href: "https://hermes-workspace.${CLUSTER_DOMAIN}"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/homer.png
    gethomepage.dev/name: Hermes Workspace
    gethomepage.dev/description: Hermes Agent workspace
    gethomepage.dev/app: hermes-agent
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=hermes-agent
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["hermes-workspace.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: hermes-agent
          port: 3000
