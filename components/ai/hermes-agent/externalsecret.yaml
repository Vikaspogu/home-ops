---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-agent-secret
    template:
      engineVersion: v2
      data:
        HERMES_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        HERMES_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_BOT_TOKEN_HERMES }}"
        TELEGRAM_ALLOWED_USERS: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        TELEGRAM_HOME_CHANNEL: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        TELEGRAM_HOME_CHANNEL_THREAD_ID: "1430"
        HERMES_TELEGRAM_DM_TOPICS_CHAT_ID: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        HERMES_WORKSPACE_PASSWORD: "{{ .HERMES_WORKSPACE_PASSWORD }}"
        GH_TOKEN: "{{ .K8S_TOKEN }}"
        GITHUB_PR_REVIEW_REPOS: "Vikaspogu/home-ops"
        GITHUB_AUTOMERGE_REPOS: "Vikaspogu/home-ops"
        GITEA_TOKEN: "{{ .IVAN_TOKEN }}"
        GITEA_URL: "https://gitea.omv.${CLUSTER_DOMAIN}"
        GITEA_USER: "vpogu"
        GITEA_PR_REVIEW_REPOS: "vpogu/ivan-plugin vpogu/agent-platform-custom"
        GOG_KEYRING_BACKEND: "file"
        GOG_KEYRING_PASSWORD: "{{ .GOG_KEYRING_PASSWORD }}"
        GOG_ACCOUNT: "{{ .GOG_DEFAULT_ACCOUNT }}"
        GOG_BUNDLE: "{{ .GOG_BUNDLE }}"
        TAVILY_API_KEY: "{{ .TAVILY_API_KEY }}"
        MEM0_API_KEY: "{{ .MEM0_API_KEY }}"
        IVAN_PERSONAL_SERVICE_URL: http://ivan-personal-service.ai.svc.cluster.local:8080
        IVAN_PERSONAL_API_KEY: "{{ .IVAN_PERSONAL_API_KEY }}"
        SONOS_SPEAKER_IPS: "{{ .SONOS_SPEAKER_IPS }}"
        HERMES_SPOTIFY_CLIENT_ID: "{{ .SPOTIFY_CLIENT_ID }}"
        .env: |-
          HERMES_API_KEY={{ .INFERENCE_HUB_API_KEY }}
          HERMES_BASE_URL={{ .INFERENCE_HUB_BASE_URL }}
          TELEGRAM_BOT_TOKEN={{ .TELEGRAM_BOT_TOKEN_HERMES }}
          TELEGRAM_ALLOWED_USERS={{ .TELEGRAM_ALLOWED_USER_ID }}
          TELEGRAM_HOME_CHANNEL={{ .TELEGRAM_ALLOWED_USER_ID }}
          TELEGRAM_HOME_CHANNEL_THREAD_ID=1430
          HERMES_TELEGRAM_DM_TOPICS_CHAT_ID={{ .TELEGRAM_ALLOWED_USER_ID }}
          HERMES_WORKSPACE_PASSWORD={{ .HERMES_WORKSPACE_PASSWORD }}
          HERMES_BEADS_INTAKE_ENABLED=true
          HERMES_PROJECT_REGISTRY=/etc/hermes/project-registry/projects.json
          BEADS_DOLT_SERVER_HOST=beadboard-dolt.ai.svc.cluster.local
          BEADS_DOLT_SERVER_PORT=3307
          BEADS_DOLT_SERVER_USER=root
          GITHUB_PR_REVIEW_REPOS=Vikaspogu/home-ops
          GITHUB_AUTOMERGE_REPOS=Vikaspogu/home-ops
          GITEA_TOKEN={{ .IVAN_TOKEN }}
          GITEA_URL=https://gitea.omv.${CLUSTER_DOMAIN}
          GITEA_USER=vpogu
          GITEA_PR_REVIEW_REPOS=vpogu/ivan-plugin vpogu/agent-platform-custom
          GOG_KEYRING_BACKEND=file
          MEM0_API_KEY={{ .MEM0_API_KEY }}
          IVAN_PERSONAL_SERVICE_URL=http://ivan-personal-service.ai.svc.cluster.local:8080
          IVAN_PERSONAL_API_KEY={{ .IVAN_PERSONAL_API_KEY }}
          SONOS_SPEAKER_IPS={{ .SONOS_SPEAKER_IPS }}
          HERMES_SPOTIFY_CLIENT_ID={{ .SPOTIFY_CLIENT_ID }}
  dataFrom:
    - extract:
        key: inference-hub
    - extract:
        key: ivan
    - extract:
        key: hermes
    - extract:
        key: mem0
    - extract:
        key: Github
    - extract:
        key: gitea
