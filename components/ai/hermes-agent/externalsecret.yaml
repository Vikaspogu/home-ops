---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-agent-secret
    template:
      engineVersion: v2
      data:
        HERMES_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        HERMES_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        API_SERVER_KEY: "{{ .HERMES_API_SERVER_KEY }}"
        HERMES_DASHBOARD_BASIC_AUTH_USERNAME: "{{ .HERMES_DASHBOARD_USERNAME }}"
        HERMES_DASHBOARD_BASIC_AUTH_PASSWORD: "{{ .HERMES_DASHBOARD_PASSWORD }}"
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_BOT_TOKEN }}"
        TELEGRAM_ALLOWED_USERS: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        TELEGRAM_HOME_CHANNEL: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        GH_TOKEN: "{{ .K8S_TOKEN }}"
        GITEA_TOKEN: "{{ .IVAN_TOKEN }}"
        GITEA_URL: "https://gitea.${CLUSTER_DOMAIN}"
        GITEA_USER: "vpogu"
        GITEA_WEBHOOK_SECRET: "{{ .GITEA_WEBHOOK_SECRET }}"
        GOG_KEYRING_BACKEND: "file"
        GOG_KEYRING_PASSWORD: "{{ .GOG_KEYRING_PASSWORD }}"
        GOG_ACCOUNT: "{{ .GOG_DEFAULT_ACCOUNT }}"
        GOG_BUNDLE: "{{ .GOG_BUNDLE }}"
        TAVILY_API_KEY: "{{ .TAVILY_API_KEY }}"
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
        IVAN_PERSONAL_SERVICE_URL: http://ivan-personal-service.ai.svc.cluster.local:8080
        IVAN_PERSONAL_API_KEY: "{{ .IVAN_PERSONAL_API_KEY }}"
        SONOS_SPEAKER_IPS: "{{ .SONOS_SPEAKER_IPS }}"
        HERMES_SPOTIFY_CLIENT_ID: "{{ .SPOTIFY_CLIENT_ID }}"
        FORGE_SERVICE_URL: "http://forge-orchestrator.ai.svc.cluster.local:8080"
        FORGE_INTAKE_TOKEN: "{{.FORGE_INTAKE_TOKEN}}"
        TREK_OAUTH_CLIENT_ID: "{{ .TREK_OAUTH_CLIENT_ID }}"
        TREK_OAUTH_CLIENT_SECRET: "{{ .TREK_OAUTH_CLIENT_SECRET }}"
        COROOT_EMAIL: "{{ .COROOT_EMAIL }}"
        COROOT_PASSWORD: "{{ .COROOT_PASSWORD }}"
        .env: |-
          API_SERVER_KEY={{ .HERMES_API_SERVER_KEY }}
          HERMES_API_KEY={{ .INFERENCE_HUB_API_KEY }}
          HERMES_BASE_URL={{ .INFERENCE_HUB_BASE_URL }}
          TELEGRAM_BOT_TOKEN={{ .TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALLOWED_USERS={{ .TELEGRAM_ALLOWED_USER_ID }}
          TELEGRAM_HOME_CHANNEL={{ .TELEGRAM_ALLOWED_USER_ID }}
          GITEA_TOKEN={{ .IVAN_TOKEN }}
          GITEA_URL=https://gitea.${CLUSTER_DOMAIN}
          GITEA_USER=vpogu
          GITEA_WEBHOOK_SECRET={{ .GITEA_WEBHOOK_SECRET }}
          GOG_KEYRING_BACKEND=file
          AGENTMEMORY_SECRET={{ .AGENTMEMORY_SECRET }}
          IVAN_PERSONAL_SERVICE_URL=http://ivan-personal-service.ai.svc.cluster.local:8080
          IVAN_PERSONAL_API_KEY={{ .IVAN_PERSONAL_API_KEY }}
          SONOS_SPEAKER_IPS={{ .SONOS_SPEAKER_IPS }}
          HERMES_SPOTIFY_CLIENT_ID={{ .SPOTIFY_CLIENT_ID }}
  # Targeted refs instead of a trek dataFrom extract: the trek item's generic
  # key names (CLIENT_ID, ADMIN_PASSWORD, ...) would collide with other extracts.
  data:
    - secretKey: TREK_OAUTH_CLIENT_ID
      remoteRef:
        key: trek
        property: OAUTH_CLIENT_ID
    - secretKey: TREK_OAUTH_CLIENT_SECRET
      remoteRef:
        key: trek
        property: OAUTH_CLIENT_SECRET
    - secretKey: COROOT_EMAIL
      remoteRef:
        key: coroot
        property: COROOT_ADMIN
    - secretKey: COROOT_PASSWORD
      remoteRef:
        key: coroot
        property: COROOT_PASSWORD
  dataFrom:
    - extract:
        key: inference-hub
    - extract:
        key: ivan
    - extract:
        key: hermes
    - extract:
        key: agentmemory
    - extract:
        key: Github
    - extract:
        key: gitea
    - extract:
        key: forge
