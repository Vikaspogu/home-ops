---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-agent
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: hermes-agent-secret
    template:
      engineVersion: v2
      data:
        HERMES_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        HERMES_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
        TELEGRAM_BOT_TOKEN: "{{ .TELEGRAM_BOT_TOKEN_HERMES }}"
        TELEGRAM_ALLOWED_USERS: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        TELEGRAM_HOME_CHANNEL: "{{ .TELEGRAM_ALLOWED_USER_ID }}"
        GH_TOKEN: "{{ .K8S_TOKEN }}"
        GITHUB_PR_REVIEW_REPOS: "Vikaspogu/home-ops"
        GITHUB_AUTOMERGE_REPOS: "Vikaspogu/home-ops"
        GITEA_TOKEN: "{{ .IVAN_TOKEN }}"
        GITEA_URL: "https://gitea.omv.${CLUSTER_DOMAIN}"
        GOG_KEYRING_BACKEND: "file"
        GOG_KEYRING_PASSWORD: "{{ .GOG_KEYRING_PASSWORD }}"
        GOG_ACCOUNT: "{{ .GOG_DEFAULT_ACCOUNT }}"
        GOG_BUNDLE: "{{ .GOG_BUNDLE }}"
        TAVILY_API_KEY: "{{ .TAVILY_API_KEY }}"
        IVAN_PERSONAL_SERVICE_URL: http://ivan-personal-service.ai.svc.cluster.local:8080
        IVAN_PERSONAL_API_KEY: "{{ .IVAN_PERSONAL_API_KEY }}"
        SONOS_SPEAKER_IPS: "{{ .SONOS_SPEAKER_IPS }}"
        .env: |-
          HERMES_API_KEY={{ .INFERENCE_HUB_API_KEY }}
          HERMES_BASE_URL={{ .INFERENCE_HUB_BASE_URL }}
          AGENTMEMORY_SECRET={{ .AGENTMEMORY_SECRET }}
          TELEGRAM_BOT_TOKEN={{ .TELEGRAM_BOT_TOKEN_HERMES }}
          TELEGRAM_ALLOWED_USERS={{ .TELEGRAM_ALLOWED_USER_ID }}
          TELEGRAM_HOME_CHANNEL={{ .TELEGRAM_ALLOWED_USER_ID }}
          GITHUB_PR_REVIEW_REPOS=Vikaspogu/home-ops
          GITHUB_AUTOMERGE_REPOS=Vikaspogu/home-ops
          GOG_KEYRING_BACKEND=file
          IVAN_PERSONAL_SERVICE_URL=http://ivan-personal-service.ai.svc.cluster.local:8080
          IVAN_PERSONAL_API_KEY={{ .IVAN_PERSONAL_API_KEY }}
          SONOS_SPEAKER_IPS={{ .SONOS_SPEAKER_IPS }}
  dataFrom:
    - extract:
        key: inference-hub
    - extract:
        key: ivan
    - extract:
        key: hermes
    - extract:
        key: Github
    - extract:
        key: gitea
