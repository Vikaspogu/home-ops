---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
data:
  config.yaml: |-
    model:
      default: "aws/anthropic/bedrock-claude-opus-4-8"
      provider: "custom"
      api_key: "${HERMES_API_KEY}"
      base_url: "${HERMES_BASE_URL}"
    providers:
      spark:
        base_url: http://spark.a113.internal:11434/v1
        api_mode: chat_completions
        models:
          qwen3-coder:30b:
            context_length: 262144
    auxiliary:
      vision:
        provider: main
        model: gcp/google/gemini-3.1-pro-preview
        timeout: 180
      image_gen:
        provider: main
        model: azure/openai/gpt-image-2
        timeout: 180
      approval:
        provider: auto
      mcp:
        provider: auto
      goal_judge:
        provider: main
        model: openai/openai/gpt-5-mini
        timeout: 60
      triage_specifier:
        provider: spark
        model: qwen3-coder:30b
        timeout: 120
      title_generation:
        provider: spark
        model: qwen3-coder:30b
        timeout: 60
      skills_hub:
        provider: spark
        model: qwen3-coder:30b
        timeout: 90
      session_search:
        provider: spark
        model: qwen3-coder:30b
        timeout: 120
        max_concurrency: 1
      compression:
        provider: spark
        model: qwen3-coder:30b
        timeout: 300
      web_extract:
        provider: spark
        model: qwen3-coder:30b
        timeout: 600
      curator:
        provider: spark
        model: qwen3-coder:30b
        timeout: 900
    compression:
      enabled: true
      threshold: 0.75
      target_ratio: 0.30
      protect_last_n: 30
      protect_first_n: 0
      hygiene_hard_message_limit: 500
    stt:
      enabled: true
      provider: openai
      openai:
        model: Systran/faster-whisper-large-v3
        base_url: http://spark.a113.internal:8300/v1
        api_key: no-key-required
    tts:
      provider: openai
      speed: 1.0
      openai:
        model: openai/openai/gpt-4o-mini-tts
        voice: alloy
        speed: 1.0
        base_url: "${HERMES_BASE_URL}"
        api_key: "${HERMES_API_KEY}"
      edge:
        voice: en-US-AriaNeural
        speed: 1.0
    voice:
      record_key: ctrl+b
      max_recording_seconds: 120
      auto_tts: false
      beep_enabled: true
      silence_threshold: 200
      silence_duration: 3.0
    browser:
      inactivity_timeout: 120
      command_timeout: 60
    dashboard:
      theme: mono
    goals:
      max_turns: 20
    agent:
      max_turns: 90
      api_max_retries: 3
    code_execution:
      mode: project
      timeout: 300
      max_tool_calls: 50
    file_read_max_chars: 100000
    tool_output:
      max_bytes: 50000
      max_lines: 2000
      max_line_length: 2000
    checkpoints:
      enabled: true
      max_snapshots: 20
      max_total_size_mb: 500
      max_file_size_mb: 10
      auto_prune: true
      retention_days: 7
      delete_orphans: true
      min_interval_hours: 24
    security:
      redact_secrets: true
    updates:
      pre_update_backup: false
      backup_keep: 5
      non_interactive_local_changes: stash
    kanban:
      enabled: false
      dispatch_in_gateway: false
      dispatch_interval_seconds: 60
    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 2200
      provider: agentmemory
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      env_passthrough:
        - "*"
    skills:
      disabled:
        - architecture-diagram
        - arxiv
        - ascii-art
        - ascii-video
        - airtable
        - audiocraft-audio-generation
        - axolotl
        - baoyu-article-illustrator
        - baoyu-comic
        - baoyu-infographic
        - claude-code
        - claude-design
        - codex
        - coder-kanban-workflow
        - comfyui
        - debugging-hermes-tui-commands
        - design-md
        - dogfood
        - dspy
        - evaluating-llms-harness
        - excalidraw
        - fine-tuning-with-trl
        - godmode
        - google-workspace
        - heartmula
        - himalaya
        - huggingface-hub
        - jupyter-live-kernel
        - kanban-codex-lane
        - kanban-orchestrator
        - kanban-worker
        - linear
        - llama-cpp
        - manim-video
        - minecraft-modpack-server
        - notion
        - obliteratus
        - openhue
        - outlines
        - p5js
        - pixel-art
        - pokemon-player
        - popular-web-designs
        - powerpoint
        - pretext
        - research-paper-writing
        - segment-anything-model
        - serving-llms-vllm
        - sketch
        - songsee
        - songwriting-and-ai-music
        - teams-meeting-pipeline
        - touchdesigner-mcp
        - unsloth
        - weights-and-biases
        - xurl
        - youtube-content
        - yuanbao
      guard_agent_created: true
      creation_nudge_interval: 15
      config: {}
    plugins:
      enabled:
        - ivan-personal
        - disk-cleanup
        - rtk-rewrite
        - forge
        - web/ddgs
        - security-guidance
        - observability/nemo_relay
    # TREK MCP: auth is client_credentials tokens kept fresh on disk by the
    # trek-token-refresher sidecar; hermes reloads them via mtime watch.
    # client_id/secret are only used for storage bootstrap, never a browser flow.
    mcp_servers:
      trek:
        url: "https://trek.${CLUSTER_DOMAIN}/mcp"
        auth: oauth
        oauth:
          client_id: "${TREK_OAUTH_CLIENT_ID}"
          client_secret: "${TREK_OAUTH_CLIENT_SECRET}"
      # Coroot MCP only supports the authorization_code grant, but the sidecar
      # bootstraps it headlessly (login + consent POST with admin credentials).
      # Hermes then rotates the 30-day refresh token on its own; the sidecar
      # only re-bootstraps if the stored refresh token nears expiry.
      coroot:
        url: "https://coroot.${CLUSTER_DOMAIN}/mcp"
        auth: oauth
        oauth:
          redirect_port: 8899
    web:
      search_backend: searxng
    platforms:
      telegram:
        extra:
          drop_pending_updates: true
    platform_toolsets:
      cli:
        - browser
        - clarify
        - code_execution
        - computer_use
        - cronjob
        - delegation
        - file
        - image_gen
        - ivan_bartender
        - ivan_budget
        - ivan_dining
        - ivan_documents
        - ivan_fitness
        - ivan_holmesgpt
        - ivan_home_assistant
        - ivan_household
        - ivan_journal_images
        - ivan_obsidian
        - ivan_paperless
        - ivan_synology
        - ivan_travel
        - mcp-coroot
        - mcp-trek
        - memory
        - messaging
        - session_search
        - skills
        - terminal
        - todo
        - tts
        - vision
        - web
      telegram:
        - browser
        - clarify
        - code_execution
        - computer_use
        - cronjob
        - delegation
        - file
        - image_gen
        - ivan_bartender
        - ivan_budget
        - ivan_dining
        - ivan_documents
        - ivan_fitness
        - ivan_holmesgpt
        - ivan_home_assistant
        - ivan_household
        - ivan_journal_images
        - ivan_obsidian
        - ivan_paperless
        - ivan_synology
        - ivan_travel
        - mcp-coroot
        - mcp-trek
        - memory
        - messaging
        - session_search
        - skills
        - terminal
        - todo
        - tts
        - vision
        - web
    known_plugin_toolsets:
      cli:
        - ivan_bartender
        - ivan_budget
        - ivan_dining
        - ivan_documents
        - ivan_fitness
        - ivan_home_assistant
        - ivan_household
        - ivan_obsidian
        - ivan_paperless
        - ivan_synology
      telegram:
        - ivan_bartender
        - ivan_budget
        - ivan_dining
        - ivan_documents
        - ivan_fitness
        - ivan_home_assistant
        - ivan_household
        - ivan_obsidian
        - ivan_paperless
        - ivan_synology
  nemo-relay-plugins.toml: |-
    version = 1

    [[components]]
    kind = "observability"
    enabled = true

    [components.config]
    version = 1

    [components.config.openinference]
    enabled = true
    transport = "http_binary"
    endpoint = "http://alloy.observability.svc.cluster.local:4318/v1/traces"
    service_name = "hermes-agent"
    service_namespace = "ai"
    instrumentation_scope = "hermes-nemo-relay"
    timeout_millis = 3000

    [components.config.openinference.resource_attributes]
    "deployment.environment" = "talos"
