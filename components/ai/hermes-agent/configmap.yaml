---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
data:
  config.yaml: |-
    model:
      default: "openai/openai/gpt-5.5"
      provider: "custom"
      api_key: "${HERMES_API_KEY}"
      base_url: "${HERMES_BASE_URL}"
    providers:
      spark:
        base_url: http://spark.a113.internal:11434/v1
        api_mode: chat_completions
        models:
          qwen3-coder:30b:
            context_length: 262144
    auxiliary:
      vision:
        provider: main
        model: openai/openai/gpt-5.5
        timeout: 180
      approval:
        provider: auto
      mcp:
        provider: auto
      goal_judge:
        provider: main
        model: openai/openai/gpt-5.4-mini
        timeout: 60
      triage_specifier:
        provider: spark
        model: qwen3-coder:30b
        timeout: 120
      title_generation:
        provider: spark
        model: qwen3-coder:30b
        timeout: 60
      skills_hub:
        provider: spark
        model: qwen3-coder:30b
        timeout: 90
      session_search:
        provider: spark
        model: qwen3-coder:30b
        timeout: 120
        max_concurrency: 1
      compression:
        provider: spark
        model: qwen3-coder:30b
        timeout: 300
      web_extract:
        provider: spark
        model: qwen3-coder:30b
        timeout: 600
      curator:
        provider: spark
        model: qwen3-coder:30b
        timeout: 900
    compression:
      enabled: true
      threshold: 0.75
      target_ratio: 0.30
      protect_last_n: 30
      protect_first_n: 0
      hygiene_hard_message_limit: 500
    stt:
      enabled: true
      provider: openai
      openai:
        model: Systran/faster-whisper-large-v3
        base_url: http://spark.a113.internal:8300/v1
        api_key: no-key-required
    tts:
      provider: edge
      speed: 1.0
      edge:
        voice: en-US-AriaNeural
        speed: 1.0
    voice:
      record_key: ctrl+b
      max_recording_seconds: 120
      auto_tts: false
      beep_enabled: true
      silence_threshold: 200
      silence_duration: 3.0
    browser:
      inactivity_timeout: 120
      command_timeout: 60
    dashboard:
      theme: frosted-glass-dark
    goals:
      max_turns: 20
    code_execution:
      mode: project
      timeout: 300
      max_tool_calls: 50
    checkpoints:
      enabled: true
      max_snapshots: 20
      max_total_size_mb: 500
      max_file_size_mb: 10
      auto_prune: true
      retention_days: 7
      delete_orphans: true
    security:
      redact_secrets: true
    kanban:
      dispatch_in_gateway: true
      dispatch_interval_seconds: 60
    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: mem0_selfhosted
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      env_passthrough:
        - "*"
        - GITEA_PR_REVIEW_REPOS
        - GH_TOKEN
        - GITHUB_PR_REVIEW_REPOS
    skills:
      disabled:
        - architecture-diagram
        - arxiv
        - ascii-art
        - ascii-video
        - airtable
        - audiocraft-audio-generation
        - axolotl
        - baoyu-comic
        - baoyu-infographic
        - claude-code
        - claude-design
        - codex
        - comfyui
        - dashboard-usability-review
        - debugging-hermes-tui-commands
        - design-md
        - dogfood
        - dspy
        - evaluating-llms-harness
        - excalidraw
        - fine-tuning-with-trl
        - godmode
        - google-workspace
        - heartmula
        - himalaya
        - huggingface-hub
        - humanizer
        - ideation
        - jupyter-live-kernel
        - llama-cpp
        - manim-video
        - minecraft-modpack-server
        - notion
        - obliteratus
        - openhue
        - outlines
        - p5js
        - pixel-art
        - pokemon-player
        - popular-web-designs
        - powerpoint
        - pretext
        - research-paper-writing
        - segment-anything-model
        - serving-llms-vllm
        - sketch
        - songsee
        - songwriting-and-ai-music
        - touchdesigner-mcp
        - unsloth
        - weights-and-biases
        - xurl
        - youtube-content
        - yuanbao
    plugins:
      enabled:
        - ivan-personal
        - disk-cleanup
        - rtk-rewrite
        - spotify
    platforms:
      telegram:
        extra:
          dm_topics:
            - chat_id: 8658000242
              topics:
                - name: General
                  thread_id: 1430
                - name: Coding
                  skill: coder-kanban-workflow
                  thread_id: 1432
  pricing-overrides.yaml: |-
    pricing:
      overrides:
        - provider: custom
          model: openai/openai/gpt-5.5
          input_per_million: "5.00"
          cached_input_per_million: "0.50"
          output_per_million: "30.00"
          source_url: https://openai.com/api/pricing/
          pricing_version: openai-pricing-2026-05-11
        - provider: openai
          model: gpt-5.5
          input_per_million: "5.00"
          cached_input_per_million: "0.50"
          output_per_million: "30.00"
          source_url: https://openai.com/api/pricing/
          pricing_version: openai-pricing-2026-05-11
