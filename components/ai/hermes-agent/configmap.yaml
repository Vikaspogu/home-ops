---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
data:
  config.yaml: |-
    model:
      default: "openai/openai/gpt-5.5"
      provider: "custom"
      api_key: "${HERMES_API_KEY}"
      base_url: "${HERMES_BASE_URL}"
    providers:
      spark:
        base_url: http://spark.a113.internal:11434/v1
        api_mode: chat_completions
        models:
          gpt-oss:20b:
            context_length: 131072
    auxiliary:
      vision:
        provider: main
        model: openai/openai/gpt-5.5
        timeout: 180
      approval:
        provider: auto
      mcp:
        provider: auto
      title_generation:
        provider: spark
        model: gpt-oss:20b
        timeout: 60
      skills_hub:
        provider: spark
        model: gpt-oss:20b
        timeout: 90
      session_search:
        provider: spark
        model: gpt-oss:20b
        timeout: 120
        max_concurrency: 1
      compression:
        provider: spark
        model: gpt-oss:20b
        timeout: 300
      web_extract:
        provider: spark
        model: gpt-oss:20b
        timeout: 600
      curator:
        provider: spark
        model: gpt-oss:20b
        timeout: 900
    stt:
      enabled: true
      provider: openai
      openai:
        model: Systran/faster-whisper-large-v3
        base_url: http://spark.a113.internal:8300/v1
        api_key: no-key-required
    tts:
      provider: edge
      speed: 1.0
      edge:
        voice: en-US-AriaNeural
        speed: 1.0
    voice:
      record_key: ctrl+b
      max_recording_seconds: 120
      auto_tts: false
      beep_enabled: true
      silence_threshold: 200
      silence_duration: 3.0
    browser:
      inactivity_timeout: 120
      command_timeout: 60
    kanban:
      dispatch_in_gateway: true
      dispatch_interval_seconds: 60
    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: honcho
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
      env_passthrough:
        - "*"
    skills:
      disabled:
        - architecture-diagram
        - arxiv
        - ascii-art
        - ascii-video
        - airtable
        - audiocraft-audio-generation
        - axolotl
        - baoyu-comic
        - baoyu-infographic
        - claude-design
        - comfyui
        - design-md
        - dogfood
        - dspy
        - evaluating-llms-harness
        - excalidraw
        - fine-tuning-with-trl
        - godmode
        - heartmula
        - himalaya
        - huggingface-hub
        - humanizer
        - ideation
        - jupyter-live-kernel
        - llama-cpp
        - manim-video
        - minecraft-modpack-server
        - notion
        - obliteratus
        - openhue
        - outlines
        - p5js
        - pixel-art
        - pokemon-player
        - popular-web-designs
        - powerpoint
        - pretext
        - segment-anything-model
        - serving-llms-vllm
        - sketch
        - songsee
        - songwriting-and-ai-music
        - touchdesigner-mcp
        - unsloth
        - weights-and-biases
        - yuanbao
    plugins:
      enabled:
        - ivan-personal
  pricing-overrides.yaml: |-
    pricing:
      overrides:
        - provider: custom
          model: openai/openai/gpt-5.5
          input_per_million: "5.00"
          cached_input_per_million: "0.50"
          output_per_million: "30.00"
          source_url: https://openai.com/api/pricing/
          pricing_version: openai-pricing-2026-05-11
        - provider: openai
          model: gpt-5.5
          input_per_million: "5.00"
          cached_input_per_million: "0.50"
          output_per_million: "30.00"
          source_url: https://openai.com/api/pricing/
          pricing_version: openai-pricing-2026-05-11
  honcho.json: |-
    {
      "baseUrl": "http://honcho.ai.svc.cluster.local:8000",
      "workspace": "hermes",
      "peerName": "vikas",
      "pinPeerName": true,
      "timeout": 20,
      "hosts": {
        "hermes": {
          "enabled": true,
          "aiPeer": "hermes",
          "recallMode": "hybrid",
          "sessionStrategy": "per-session",
          "contextTokens": 1200,
          "contextCadence": 1,
          "dialecticCadence": 5,
          "dialecticDepth": 1,
          "dialecticReasoningLevel": "low",
          "writeFrequency": "async",
          "observationMode": "directional"
        }
      }
    }
