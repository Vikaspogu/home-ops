---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
data:
  config.yaml: |-
    model:
      default: "openai/openai/gpt-5.5"
      provider: "custom"
      api_key: "${HERMES_API_KEY}"
      base_url: "${HERMES_BASE_URL}"
    providers:
      spark:
        base_url: http://spark.a113.internal:11434/v1
        api_mode: chat_completions
        models:
          gpt-oss:20b:
            context_length: 131072
    auxiliary:
      vision:
        provider: main
        model: openai/openai/gpt-5.5
        timeout: 180
      approval:
        provider: auto
      mcp:
        provider: auto
      title_generation:
        provider: spark
        model: gpt-oss:20b
        timeout: 60
      skills_hub:
        provider: spark
        model: gpt-oss:20b
        timeout: 90
      session_search:
        provider: spark
        model: gpt-oss:20b
        timeout: 120
        max_concurrency: 1
      compression:
        provider: spark
        model: gpt-oss:20b
        timeout: 300
      web_extract:
        provider: spark
        model: gpt-oss:20b
        timeout: 600
      curator:
        provider: spark
        model: gpt-oss:20b
        timeout: 900
    stt:
      enabled: true
      provider: openai
      openai:
        model: Systran/faster-whisper-large-v3
        base_url: http://spark.a113.internal:8300/v1
        api_key: no-key-required
    memory:
      memory_enabled: true
      user_profile_enabled: true
      memory_char_limit: 2200
      user_char_limit: 1375
      provider: honcho
    terminal:
      backend: local
      cwd: /opt/data/workspace
      timeout: 180
  honcho.json: |-
    {
      "baseUrl": "http://honcho.ai.svc.cluster.local:8000",
      "workspace": "hermes",
      "peerName": "vikas",
      "pinPeerName": true,
      "timeout": 20,
      "hosts": {
        "hermes": {
          "enabled": true,
          "aiPeer": "hermes",
          "recallMode": "hybrid",
          "sessionStrategy": "per-session",
          "contextTokens": 1200,
          "contextCadence": 1,
          "dialecticCadence": 5,
          "dialecticDepth": 1,
          "dialecticReasoningLevel": "low",
          "writeFrequency": "async",
          "observationMode": "directional"
        }
      }
    }
