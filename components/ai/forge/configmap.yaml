---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
data:
  repos.yaml: |-
    instances:
      gitea-home:
        dialect: gitea
        base_url: https://gitea.a113.casa
        token_env: GITEA_TOKEN
        provider_ref: gitea
      github:
        dialect: github
        base_url: https://github.com
        token_env: GH_TOKEN
        provider_ref: github
    repos:
      ivan-plugin:
        full_name: vpogu/ivan-plugin
        instance: gitea-home
        default_branch: main
        project_type: python-service
        default_workflow: implement
        test_command: "cd service && uv run pytest && uv run ruff check ."
        format_command: "cd service && uv run ruff format --check ."
        description: "Ivan personal data service — fitness, bar, drink/dining/travel journals"
      home-ops:
        full_name: Vikaspogu/home-ops
        instance: github
        default_branch: main
        project_type: gitops-flux
        default_workflow: gitops-update
        test_command: "./scripts/kubeconform.sh"
        format_command: null
        description: "Home lab GitOps repo — Flux, Helm charts, K8s manifests"

  implement.yaml: |-
    name: implement
    description: Plan -> implement -> AI review -> fix -> open PR (autonomous)
    # Structure only: node behavior comes from role profiles (bundled in the
    # forge image; override via FORGE_AGENTS_DIR). depends_on selects which
    # upstream outputs each node's message includes.
    nodes:
      - id: plan
        type: agent
        role: planner
        # Pick the model per node. Omit to use FORGE_DEFAULT_MODEL.
        model: aws/anthropic/bedrock-claude-opus-4-8
        timeout_minutes: 10
      - id: implement
        type: loop
        depends_on: [plan]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: aws/anthropic/bedrock-claude-sonnet-4-6
        timeout_minutes: 30
        body:
          type: agent
          role: implementer
      - id: ai-review
        type: agent
        role: reviewer
        depends_on: [implement]
        # Deliberately a different model than the implementer for fresh eyes.
        model: aws/anthropic/bedrock-claude-opus-4-8
        timeout_minutes: 20
      - id: fix-loop
        type: loop
        depends_on: [ai-review]
        until: TESTS_PASS
        max_attempts: 3
        on_max_attempts: blocked
        model: aws/anthropic/bedrock-claude-sonnet-4-6
        timeout_minutes: 30
        body:
          type: agent
          role: implementer
      - id: open-pr
        type: agent
        role: pr-opener
        # implement + ai-review are already ancestors via fix-loop; the extra
        # edges pull their notes into this node's message for the PR body.
        depends_on: [implement, ai-review, fix-loop]
        model: aws/anthropic/bedrock-claude-sonnet-4-6
        timeout_minutes: 10

  gitops-update.yaml: |-
    name: gitops-update
    description: GitOps workflow — no planner, no AI review. Tooling validates.
    nodes:
      - id: implement
        type: loop
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        timeout_minutes: 30
        model: aws/anthropic/bedrock-claude-sonnet-4-6
        body:
          type: agent
          role: implementer

  conflict-resolution.yaml: |-
    name: conflict-resolution
    description: Rebase conflict -> analyze -> auto-resolve or escalate
    nodes:
      - id: analyze
        type: agent
        role: implementer
        description: Read conflict diff. Classify AUTO-RESOLVABLE or NEEDS_HUMAN.
        on_needs_input: pause
        model: aws/anthropic/bedrock-claude-opus-4-8
      - id: resolve
        type: loop
        role: implementer
        depends_on: [analyze]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: aws/anthropic/bedrock-claude-sonnet-4-6
      - id: resume
        type: bash
        depends_on: [resolve]
        model: aws/anthropic/claude-haiku-4-5-v1
        run: echo resume_parent
