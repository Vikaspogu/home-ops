---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
data:
  repos.yaml: |-
    instances:
      gitea-home:
        dialect: gitea
        base_url: https://gitea.a113.casa
        token_env: GITEA_TOKEN
        provider_ref: gitea
      github:
        dialect: github
        base_url: https://github.com
        token_env: GH_TOKEN
        provider_ref: github
    repos:
      ivan-plugin:
        full_name: vpogu/ivan-plugin
        instance: gitea-home
        default_branch: main
        project_type: python-service
        test_command: "cd service && uv run pytest && uv run ruff check ."
        format_command: "cd service && uv run ruff format --check ."
        description: "Ivan personal data service — fitness, bar, drink/dining/travel journals"
      home-ops:
        full_name: Vikaspogu/home-ops
        instance: github
        default_branch: main
        project_type: gitops-flux
        default_workflow: gitops-update
        test_command: "./scripts/kubeconform.sh"
        format_command: null
        description: "Home lab GitOps repo — Flux, Helm charts, K8s manifests"

  implement.yaml: |-
    name: implement
    description: Plan -> implement -> review loop
    nodes:
      - id: plan
        type: agent
        role: planner
        # Pick the model per node. Omit to use FORGE_DEFAULT_MODEL.
        model: azure/anthropic/claude-opus-4-8
      - id: implement
        type: loop
        depends_on: [plan]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: azure/anthropic/claude-sonnet-4-6
        body:
          type: agent
          role: implementer
      - id: review
        type: approval
        depends_on: [implement]
        message: "Implementation complete. Review the PR and approve or reject."
        timeout_minutes: 1440
      - id: fix-loop
        type: loop
        depends_on: [review]
        until: TESTS_PASS
        max_attempts: 3
        on_max_attempts: blocked
        model: azure/anthropic/claude-sonnet-4-6
        body:
          type: agent
          role: implementer

  gitops-update.yaml: |-
    name: gitops-update
    description: GitOps workflow — no planner, no AI review. Tooling validates.
    nodes:
      - id: implement
        type: loop
        # TESTS_PASS is the agent contract's success outcome (checks green +
        # PR opened); VALIDATION_PASS here made the loop ignore success (task 69).
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: azure/anthropic/claude-sonnet-4-6
        body:
          type: agent
          role: implementer
      - id: validate
        type: bash
        depends_on: [implement]
        model: aws/anthropic/claude-haiku-4-5-v1
        run: ./scripts/kubeconform.sh

  conflict-resolution.yaml: |-
    name: conflict-resolution
    description: Rebase conflict -> analyze -> auto-resolve or escalate
    nodes:
      - id: analyze
        type: agent
        role: implementer
        description: Read conflict diff. Classify AUTO-RESOLVABLE or NEEDS_HUMAN.
        on_needs_input: pause
        model: azure/anthropic/claude-opus-4-8
      - id: resolve
        type: loop
        role: implementer
        depends_on: [analyze]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: azure/anthropic/claude-sonnet-4-6
      - id: resume
        type: bash
        depends_on: [resolve]
        model: aws/anthropic/claude-haiku-4-5-v1
        run: echo resume_parent
