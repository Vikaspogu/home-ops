---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
data:
  repos.yaml: |-
    instances:
      gitea-home:
        dialect: gitea
        base_url: https://gitea.a113.casa
        token_env: GITEA_TOKEN
        # Read-only token for reviewer sandboxes (staged review gate).
        # Gated workflows refuse to run when this is unset.
        read_token_env: GITEA_TOKEN_RO
        provider_ref: gitea
      github:
        dialect: github
        base_url: https://github.com
        token_env: GH_TOKEN
        provider_ref: github
    repos:
      ivan-plugin:
        full_name: vpogu/ivan-plugin
        instance: gitea-home
        default_branch: main
        project_type: python-service
        default_workflow: feature
        # Runner-executed in the sandbox after the agent; real exit codes gate
        # the loop (staged review gate M1/M2.3). Applies to loop nodes only.
        verify_commands:
          - "cd service && uv run pytest"
          - "cd service && uv run ruff check ."
        test_command: "cd service && uv run pytest && uv run ruff check ."
        format_command: "cd service && uv run ruff format --check ."
        description: "Ivan personal data service — fitness, bar, drink/dining/travel journals"
      forge:
        full_name: vpogu/forge
        instance: gitea-home
        default_branch: main
        project_type: python-service
        default_workflow: feature
        verify_commands:
          - "uv run pytest"
          - "uv run ruff check src/forge"
      agent-platform-custom:
        # Stays on the legacy implement workflow: container-images repo has no
        # test command, and a gated workflow without verify commands is
        # refused at walk start by design.
        full_name: vpogu/agent-platform-custom
        instance: gitea-home
        default_branch: main
        project_type: container-images
        default_workflow: implement
      home-ops:
        full_name: Vikaspogu/home-ops
        instance: github
        default_branch: main
        project_type: gitops-flux
        default_workflow: gitops-update
        verify_commands:
          - "./scripts/kubeconform.sh"
        test_command: "./scripts/kubeconform.sh"
        format_command: null
        description: "Home lab GitOps repo — Flux, Helm charts, K8s manifests"

  feature.yaml: |-
    # Deployment override of the bundled gated workflow: same structure, plus
    # model pins (FORGE_WORKFLOWS_DIR wins over the image-bundled copy).
    # verify commands come from repos.yaml per repo — never set verify here.
    name: feature
    nodes:
      - id: plan
        type: agent
        role: planner
        skills: [explore-first]
        model: aws/anthropic/bedrock-claude-opus-4-8
        timeout_minutes: 10
      - id: implement
        type: loop
        until: APPROVED
        max_attempts: 3
        on_max_attempts: escalate
        depends_on: [plan]
        timeout_minutes: 30
        body:
          steps:
            - role: implementer
              model: openai/openai/gpt-5.6-terra
              rules: [ponytail, codebase-design]
              skills: [verify-loop, defensive-coding, secret-scan]
            # Deliberately a different model family than the implementer:
            # cross-model review catches shared blind spots.
            - role: reviewer
              model: aws/anthropic/bedrock-claude-sonnet-4-6
              rules: [codebase-design]
              skills: [security, impact-analysis]
      - id: approval
        type: approval
        depends_on: [implement]
      - id: open-pr
        type: agent
        role: pr-opener
        skills: [secret-scan]
        depends_on: [approval]
        model: nvidia/nvidia/Nemotron-3-Nano-30B-A3B
        timeout_minutes: 10

  implement.yaml: |-
    name: implement
    description: Legacy pre-gate workflow. Only agent-platform-custom uses it.
    # Structure only: node behavior comes from role profiles (bundled in the
    # forge image; override via FORGE_AGENTS_DIR). depends_on selects which
    # upstream outputs each node's message includes.
    nodes:
      - id: plan
        type: agent
        role: planner
        skills: [explore-first]
        # Pick the model per node. Omit to use FORGE_DEFAULT_MODEL.
        model: aws/anthropic/bedrock-claude-opus-4-8
        timeout_minutes: 10
      - id: implement
        type: loop
        depends_on: [plan]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: openai/openai/gpt-5.6-terra
        timeout_minutes: 30
        body:
          type: agent
          role: implementer
          rules: [ponytail, codebase-design]
          skills: [verify-loop, defensive-coding, secret-scan]
      - id: ai-review
        type: agent
        role: reviewer
        rules: [codebase-design]
        skills: [security, impact-analysis]
        depends_on: [implement]
        # Deliberately a different model than the implementer for fresh eyes.
        model: aws/anthropic/bedrock-claude-sonnet-4-6
        timeout_minutes: 40
      - id: fix-loop
        type: loop
        depends_on: [ai-review]
        until: TESTS_PASS
        max_attempts: 3
        on_max_attempts: blocked
        model: openai/openai/gpt-5.6-terra
        timeout_minutes: 30
        body:
          type: agent
          role: implementer
          rules: [ponytail, codebase-design]
          skills: [verify-loop, secret-scan]
      - id: open-pr
        type: agent
        role: pr-opener
        skills: [secret-scan]
        # implement + ai-review are already ancestors via fix-loop; the extra
        # edges pull their notes into this node's message for the PR body.
        depends_on: [implement, ai-review, fix-loop]
        model: nvidia/nvidia/Nemotron-3-Nano-30B-A3B
        timeout_minutes: 10

  gitops-update.yaml: |-
    name: gitops-update
    description: GitOps workflow — no planner, no AI review. Tooling validates.
    nodes:
      - id: implement
        type: loop
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        timeout_minutes: 30
        model: nvidia/nvidia/Nemotron-3-Nano-30B-A3B
        body:
          type: agent
          role: implementer
          rules: [ponytail, codebase-design]

  conflict-resolution.yaml: |-
    name: conflict-resolution
    description: Rebase conflict -> analyze -> auto-resolve or escalate
    nodes:
      - id: analyze
        type: agent
        role: implementer
        rules: [ponytail, codebase-design]
        description: Read conflict diff. Classify AUTO-RESOLVABLE or NEEDS_HUMAN.
        on_needs_input: pause
        model: aws/anthropic/bedrock-claude-opus-4-8
      - id: resolve
        type: loop
        role: implementer
        rules: [ponytail, codebase-design]
        depends_on: [analyze]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        model: openai/openai/gpt-5.6-terra
  skills.yaml: |-
    skills:

      ponytail:
        description: "Write the minimum code that solves the problem. One concern per commit."
        content: |
          Before writing code, stop at the first rung that holds:
          1. Does this need to exist? No → skip it (YAGNI)
          2. Already in this codebase? → reuse it, don't rewrite
          3. Stdlib or platform does it? → use it
          4. One line? → one line
          5. Only then: the minimum that works

          Never cut: validation, error handling, security, accessibility.
          Never touch files the task doesn't require.
          One logical concern per commit. Imperative subject line, 50 chars max.

      codebase-design:
        description: "Design deep modules: large behaviour behind a small interface at a clean seam."
        content: |
          Design deep modules — a lot of behaviour behind a small interface.

          Before adding a new abstraction, ask:
          - Can I reduce the number of methods?
          - Can I hide more complexity inside?
          - Does deleting this module make complexity disappear (pass-through) or reappear across callers (earning its keep)?

          The interface is the test surface — callers and tests cross the same seam.
          One adapter = hypothetical seam. Two adapters = real seam. Don't add a seam unless two adapters are justified.
          Accept dependencies, don't create them. Return values, not side effects.

      explore-first:
        description: "Read → reproduce → root-cause → plan. No coding until root cause is confirmed."
        content: |
          Before writing a plan or proposing changes:
          1. Read the task fully. Identify the symptom vs. the root cause.
          2. Search the codebase for every caller/owner of the affected function or module.
          3. Create a reproduction script or failing test to confirm the problem is real.
          4. Identify the single correct layer where the behavior is defined — fix there,
             not in all callers.
          5. Output a short bullet plan: files to touch, approach, edge cases.
             Do NOT start coding until the plan is written.

      verify-loop:
        description: "Rerun reproduction after every change. Never mark done until original failure is gone and no tests broke."
        content: |
          After every code change:
          - Rerun the reproduction script or failing test. Never assume a fix worked.
          - Do not suppress errors with try/except to make tests pass. Fix the root cause.
          - Confirm: (a) original failure gone, (b) no existing tests newly broken,
            (c) at least one edge case checked.
          - Run targeted tests during iteration. Run full suite before final commit only.

      defensive-coding:
        description: "Validate at boundaries, implement __hash__ with __eq__, log silenced exceptions, normalize iterables before serialization."
        content: |
          - Validate and normalize inputs at the entry point, not deep in helpers.
          - When implementing __eq__, always implement __hash__. Equal objects must hash equal.
          - Normalize dict_keys/dict_values to list/tuple before deep-copy or serialization.
          - Never bare except without logging the exception with exc_info=True.
          - Provide clear error messages that include the offending value.
          - Never assume an attribute or config value is present — check explicitly.

      secret-scan:
        description: "Scan the diff for hardcoded secrets before any commit or push."
        content: |
          Before committing or pushing, scan the full diff for:
          - API keys, tokens, passwords, private keys (any string matching key/token/secret/password
            patterns assigned a string literal)
          - Credentials echoed into logs, result.json, or test fixtures
          If found: remove the secret, use an environment variable or secret store instead.
          Never commit a secret even in a test file.

      impact-analysis:
        description: "Trace all callers of modified functions — are sibling call sites also broken?"
        content: |
          For every function, method, or module changed in this diff:
          1. Find all call sites in the codebase (grep/search).
          2. Confirm the fix applies to ALL of them, not just the one the ticket named.
          3. Flag any sibling call site where the same bug still exists after the patch.
          A patch that fixes one caller and leaves all others broken is worse than no patch.

      security:
        description: "Review changes for security regressions before approval."
        content: |
          Review every change for security impact:
          - Validate untrusted input at boundaries and reject unsafe values clearly.
          - Do not log secrets, credentials, tokens, private data, or authorization headers.
          - Preserve least privilege for filesystem, network, Kubernetes RBAC, and cloud access.
          - Avoid injection vulnerabilities in shell commands, SQL, templates, YAML, and URLs.
          - Fail closed on authorization, authentication, and policy checks.
          - If a risk remains, call it out explicitly with the affected file and mitigation.
  rules.yaml: |-
    rules:
      ponytail:
        description: "Write the minimum code that solves the problem. One concern per commit."
        content: |
          Before writing code, stop at the first rung that holds:
          1. Does this need to exist? No → skip it (YAGNI)
          2. Already in this codebase? → reuse it, don't rewrite
          3. Stdlib or platform does it? → use it
          4. One line? → one line
          5. Only then: the minimum that works

          Never cut: validation, error handling, security, accessibility.
          Never touch files the task doesn't require.
          One logical concern per commit. Imperative subject line, 50 chars max.

      codebase-design:
        description: "Design deep modules: large behaviour behind a small interface at a clean seam."
        content: |
          Design deep modules — a lot of behaviour behind a small interface.

          Before adding a new abstraction, ask:
          - Can I reduce the number of methods?
          - Can I hide more complexity inside?
          - Does deleting this module make complexity disappear (pass-through) or reappear across callers (earning its keep)?

          The interface is the test surface — callers and tests cross the same seam.
          One adapter = hypothetical seam. Two adapters = real seam. Don't add a seam unless two adapters are justified.
          Accept dependencies, don't create them. Return values, not side effects.
