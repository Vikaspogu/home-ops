---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-config
data:
  repos.yaml: |-
    repos:
      ivan-plugin:
        full_name: vpogu/ivan-plugin
        host: gitea
        default_branch: main
        project_type: python-service
        test_command: "cd service && uv run pytest && uv run ruff check ."
        format_command: "cd service && uv run ruff format --check ."
        description: "Ivan personal data service — fitness, bar, drink/dining/travel journals"
      home-ops:
        full_name: Vikaspogu/home-ops
        host: github
        default_branch: main
        project_type: gitops-flux
        default_workflow: gitops-update
        test_command: "kubeconform -strict -ignore-missing-schemas kubernetes/"
        format_command: null
        description: "Home lab GitOps repo — Flux, Helm charts, K8s manifests"

  implement.yaml: |-
    name: implement
    description: Plan -> implement -> review loop
    nodes:
      - id: plan
        type: agent
        role: planner
      - id: implement
        type: loop
        depends_on: [plan]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
        body:
          type: agent
          role: implementer
      - id: review
        type: approval
        depends_on: [implement]
        message: "Implementation complete. Review the PR and approve or reject."
        timeout_minutes: 1440
      - id: fix-loop
        type: loop
        depends_on: [review]
        until: TESTS_PASS
        max_attempts: 3
        on_max_attempts: blocked
        body:
          type: agent
          role: implementer

  gitops-update.yaml: |-
    name: gitops-update
    description: GitOps workflow — no planner, no AI review. Tooling validates.
    nodes:
      - id: implement
        type: loop
        until: VALIDATION_PASS
        max_attempts: 2
        on_max_attempts: blocked
        body:
          type: agent
          role: implementer
      - id: validate
        type: bash
        depends_on: [implement]
        run: kubeconform -strict -ignore-missing-schemas kubernetes/
      - id: open-pr
        type: bash
        depends_on: [validate]
        run: echo "PR opened by agent during implement phase"

  conflict-resolution.yaml: |-
    name: conflict-resolution
    description: Rebase conflict -> analyze -> auto-resolve or escalate
    nodes:
      - id: analyze
        type: agent
        role: implementer
        description: Read conflict diff. Classify AUTO-RESOLVABLE or NEEDS_HUMAN.
        on_needs_input: pause
      - id: resolve
        type: loop
        role: implementer
        depends_on: [analyze]
        until: TESTS_PASS
        max_attempts: 2
        on_max_attempts: blocked
      - id: resume
        type: bash
        depends_on: [resolve]
        run: echo resume_parent
