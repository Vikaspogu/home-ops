controllers:
  app:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      configmap.reloader.stakater.com/reload: forge-config
      secret.reloader.stakater.com/reload: forge-secret,openshell-client-tls
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        envFrom: &envFrom
        - secretRef:
            name: forge-secret
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/forge-backend
          tag: 20260723133002-69e05c1-oci
          pullPolicy: Always
        env:
          TZ: America/New_York
          FORGE_API_PORT: &httpPort 8080
          # OIDC authentication is active.
          # OIDC fields below populated in forge-secret.
          FORGE_AUTH_MODE: oidc
          FORGE_PUBLIC_URL: https://forge.${CLUSTER_DOMAIN}
          FORGE_OIDC_DISCOVERY_URL: https://id.${CLUSTER_DOMAIN}/application/o/forge/.well-known/openid-configuration
          OPENSHELL_GATEWAY_URL: https://openshell:8080
          OPENSHELL_CLIENT_CA_PATH: /etc/openshell-tls/client/ca.crt
          OPENSHELL_CLIENT_CERT_PATH: /etc/openshell-tls/client/tls.crt
          OPENSHELL_CLIENT_KEY_PATH: /etc/openshell-tls/client/tls.key
          FORGE_RUNNER: openshell
          FORGE_WORKFLOWS_DIR: /app/config
          FORGE_REPOS_CONFIG: /app/config/repos.yaml
          FORGE_DEFAULT_MODEL: openai/openai/gpt-5.6-terra
          FORGE_SANDBOX_IMAGE: gitea.a113.casa/vpogu/openshell-sandbox:latest-oci@sha256:6c145ae6d21db610fe84dba32bffd4d357aa654106aabf6eec45321e4a8a65b3
          FORGE_TOOL_ALLOWLIST: node,python,go,kubectl,kustomize,kubeconform,helm,uv
          FORGE_TOOL_MIRROR_HOSTS: github.com,api.github.com,objects.githubusercontent.com,release-assets.githubusercontent.com,nodejs.org,dl.k8s.io,tuf-repo-cdn.sigstore.dev,pypi.org,files.pythonhosted.org,mise-versions.jdx.dev,registry.npmjs.org
          FORGE_OTEL_SANDBOX_ENDPOINT: alloy.observability.svc.cluster.local:4318
          FORGE_OTEL_ENDPOINT: http://alloy.observability.svc.cluster.local:4318
          FORGE_NPM_REGISTRY_NODE_PATH: /opt/mise/installs/node/22.22.1/bin/node
          FORGE_PYPI_REGISTRY_HOSTS: pypi.org,files.pythonhosted.org
          FORGE_SKILLS_CONFIG: /app/config/skills.yaml
          FORGE_RULES_CONFIG: /app/config/rules.yaml
          FORGE_COPILOT_MODEL: aws/anthropic/bedrock-claude-sonnet-4-6
          FORGE_REVIEWER_MODEL: aws/anthropic/bedrock-claude-sonnet-4-6
          FORGE_REVIEW_MIN_CONFIDENCE: "7"
        envFrom: *envFrom
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *httpPort
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
service:
  app:
    controller: app
    ports:
      http:
        port: *httpPort
persistence:
  config:
    type: configMap
    name: forge-config
    advancedMounts:
      app:
        app:
        - path: /app/config
          readOnly: true
  openshell-client-tls:
    type: secret
    name: openshell-client-tls
    advancedMounts:
      app:
        app:
        - path: /etc/openshell-tls/client
          readOnly: true
