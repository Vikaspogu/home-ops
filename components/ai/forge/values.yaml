controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      configmap.reloader.stakater.com/reload: forge-config
      secret.reloader.stakater.com/reload: forge-secret,openshell-client-tls
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        envFrom: &envFrom
        - secretRef:
            name: forge-secret
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/forge
          tag: 20260626222339-206490d-oci
        env:
          TZ: America/New_York
          FORGE_API_PORT: &httpPort 8080
          OPENSHELL_GATEWAY_URL: https://openshell.ai.svc.cluster.local:8080
          OPENSHELL_CLIENT_CA_PATH: /etc/openshell-tls/client/ca.crt
          OPENSHELL_CLIENT_CERT_PATH: /etc/openshell-tls/client/tls.crt
          OPENSHELL_CLIENT_KEY_PATH: /etc/openshell-tls/client/tls.key
          FORGE_RUNNER: openshell
          FORGE_WORKFLOWS_DIR: /app/config
          FORGE_REPOS_CONFIG: /app/config/repos.yaml
        envFrom: *envFrom
        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            memory: 512Mi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /healthz
                port: *httpPort
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /readyz
                port: *httpPort
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
        securityContext:
          allowPrivilegeEscalation: false
service:
  app:
    controller: app
    ports:
      http:
        port: *httpPort
persistence:
  config:
    type: configMap
    name: forge-config
    advancedMounts:
      app:
        app:
        - path: /app/config
          readOnly: true
  openshell-client-tls:
    type: secret
    name: openshell-client-tls
    advancedMounts:
      app:
        app:
        - path: /etc/openshell-tls/client
          readOnly: true
