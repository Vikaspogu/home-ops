controllers:
  beadboard:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
      securityContext:
        fsGroup: 10020
        fsGroupChangePolicy: OnRootMismatch
    containers:
      app:
        image:
          repository: gitea.omv.a113.casa/vpogu/agent-platform-beadboard
          tag: 20260527200318-9077a27-oci
          pullPolicy: IfNotPresent
        env:
          TZ: America/New_York
          HOST: 0.0.0.0
          PORT: &beadboardPort 3000
          BEADBOARD_PROJECT_ROOT: /workspace
          BEADBOARD_PROJECT_REGISTRY: /etc/beadboard/project-registry/projects.json
          BEADS_DOLT_SERVER_HOST: beadboard-dolt.ai.svc.cluster.local
          BEADS_DOLT_SERVER_PORT: "3307"
          BEADS_DOLT_SERVER_USER: root
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *beadboardPort
              initialDelaySeconds: 10
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *beadboardPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /
                port: *beadboardPort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          runAsNonRoot: true
          runAsUser: 10020
          runAsGroup: 10020
          capabilities: {drop: ["ALL"]}
  dolt:
    replicas: 1
    strategy: Recreate
    pod:
      securityContext:
        fsGroup: 10020
        fsGroupChangePolicy: OnRootMismatch
    containers:
      app:
        image:
          repository: docker.io/dolthub/dolt
          tag: 2.0.7
          pullPolicy: IfNotPresent
        args:
        - sql-server
        - --host=0.0.0.0
        - --port=3307
        - --data-dir=/var/lib/dolt
        - --loglevel=info
        env:
          TZ: America/New_York
          HOME: /var/lib/dolt
          XDG_CONFIG_HOME: /var/lib/dolt/.config
          XDG_CACHE_HOME: /var/lib/dolt/.cache
          XDG_DATA_HOME: /var/lib/dolt/.local/share
        resources:
          requests:
            cpu: 50m
            memory: 256Mi
          limits:
            memory: 2Gi
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: &doltPort 3307
              initialDelaySeconds: 5
              periodSeconds: 5
              failureThreshold: 30
          readiness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *doltPort
              periodSeconds: 10
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *doltPort
              periodSeconds: 30
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
          runAsUser: 10020
          runAsGroup: 10020
          capabilities: {drop: ["ALL"]}
service:
  app:
    forceRename: beadboard
    primary: true
    controller: beadboard
    ports:
      http:
        port: *beadboardPort
  dolt:
    forceRename: beadboard-dolt
    controller: dolt
    ports:
      mysql:
        port: *doltPort
persistence:
  data:
    existingClaim: beadboard
    advancedMounts:
      beadboard:
        app:
        - path: /home/beadboard
          subPath: beadboard-home
  workspace:
    enabled: true
    type: nfs
    server: synology.a113.internal
    path: /volume1/media/k8s-data/hermes-workspace
    advancedMounts:
      beadboard:
        app:
        - path: /workspace
  project-registry:
    type: configMap
    name: beads-project-registry
    advancedMounts:
      beadboard:
        app:
        - path: /etc/beadboard/project-registry/projects.json
          subPath: projects.json
          readOnly: true
  dolt-data:
    existingClaim: beadboard-dolt
    advancedMounts:
      dolt:
        app:
        - path: /var/lib/dolt
  tmp:
    type: emptyDir
    medium: Memory
    sizeLimit: 512Mi
    advancedMounts:
      beadboard:
        app:
        - path: /tmp
      dolt:
        app:
        - path: /tmp
