---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: ai
resources:
  - ./http-route.yaml
  - ./pvc-dolt.yaml
  - ./tcp-route.yaml
components:
  - ../../volsync-system/volsync-replication

helmCharts:
  - name: app-template
    releaseName: beadboard
    namespace: ai
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: "5.0.1"
    valuesFile: values.yaml
