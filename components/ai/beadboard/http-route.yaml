---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app beadboard
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
  annotations:
    gethomepage.dev/href: "https://beadboard.${CLUSTER_DOMAIN}"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: AI
    gethomepage.dev/icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/kubernetes-dashboard.png
    gethomepage.dev/name: BeadBoard
    gethomepage.dev/description: Beads coordination dashboard
    gethomepage.dev/app: beadboard
    gethomepage.dev/pod-selector: app.kubernetes.io/instance=beadboard
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["beadboard.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: *app
          port: 3000
