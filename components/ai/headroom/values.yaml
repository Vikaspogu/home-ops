controllers:
  headroom:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    containers:
      app:
        image:
          repository: ghcr.io/chopratejas/headroom
          tag: nonroot
        # Image ENTRYPOINT is already `headroom proxy`; pass only flags here.
        # (Repeating `proxy` yields "unexpected extra argument (proxy)".)
        args:
          - --host
          - 0.0.0.0
          - --port
          - "8787"
        env:
          TZ: America/New_York
          HEADROOM_HOST: "0.0.0.0"
          HEADROOM_PORT: "8787"
          # DEBUG temporarily: diagnosing 400s on /backend-api/codex/responses
          # for omp's OAuth codex traffic. Revert to INFO once confirmed working.
          HEADROOM_LOG_LEVEL: DEBUG
          HEADROOM_DEFAULT_MODE: optimize
          HEADROOM_TELEMETRY: "off"
          HEADROOM_MODEL_LIMITS: /config/models.json
          HEADROOM_SAVINGS_PATH: /data/.headroom/proxy_savings.json
          HEADROOM_STORE_URL: sqlite:////data/.headroom/headroom.db
          HOME: /data
          HEADROOM_EXCLUDE_TOOLS: "read_file,headroom_retrieve"
          # Kompress ML text compression. Image lacks torch, but onnxruntime +
          # the int8 model are present on the PVC; pin the ONNX/CPU backend so it
          # never looks for torch. Validated working in-pod (onnx_cpu, no torch).
          HEADROOM_FORCE_KOMPRESS: "1"
          HEADROOM_KOMPRESS_BACKEND: onnx_cpu
          # Output-token reduction: trims model's response (Opus output is 5x
          # input cost). Effort router dials thinking down on tool-result resumes.
          # 10% holdout keeps a control group so savings are measured, not estimated.
          HEADROOM_OUTPUT_SHAPER: "1"
          HEADROOM_EFFORT_ROUTER: "1"
          HEADROOM_OUTPUT_HOLDOUT: "0.1"
        envFrom:
          - secretRef:
              name: headroom-secret
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8787
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8787
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: 8787
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            # Kompress int8 ONNX model (~261MB) + onnxruntime session loads into
            # the proxy process, which already sits ~1Gi without it. Bumped from
            # 1Gi/2Gi to give the model load headroom under the limit.
            memory: 1536Mi
          limits:
            memory: 3Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
service:
  app:
    controller: headroom
    ports:
      http:
        port: 8787
persistence:
  data:
    existingClaim: headroom
    globalMounts:
      - path: /data
  config:
    type: configMap
    name: headroom-model-limits
    globalMounts:
      - path: /config
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
