controllers:
  headroom:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    containers:
      app:
        image:
          repository: ghcr.io/chopratejas/headroom
          tag: nonroot
        args:
          - proxy
          - --host
          - 0.0.0.0
          - --port
          - "8787"
        env:
          TZ: America/New_York
          HEADROOM_HOST: "0.0.0.0"
          HEADROOM_PORT: &apiPort "8787"
          HEADROOM_LOG_LEVEL: INFO
          HEADROOM_DEFAULT_MODE: optimize
          # Anonymous telemetry off for a self-hosted deployment.
          HEADROOM_TELEMETRY: "off"
          # OPENAI_TARGET_API_URL (upstream aggregator) and OPENAI_API_KEY are
          # injected from the headroom-secret via envFrom below. The proxy forwards
          # all OpenAI-compatible traffic there; inference-hub fans out to the real
          # vendors (Anthropic/OpenAI/Google) per model, model field untouched.
          # Per-model context limits for the model IDs opencode + Hermes use, so
          # compression budgets are exact instead of pattern-inferred.
          HEADROOM_MODEL_LIMITS: /config/models.json
          # Durable savings + CCR store live on the volsync-backed /data PVC.
          HEADROOM_SAVINGS_PATH: /data/.headroom/proxy_savings.json
          HEADROOM_STORE_URL: sqlite:////data/.headroom/headroom.db
          HOME: /data
        envFrom:
          - secretRef:
              name: headroom-secret
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              failureThreshold: 30
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: *apiPort
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            memory: 1Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
service:
  app:
    controller: headroom
    ports:
      http:
        port: 8787
persistence:
  # CCR reversibility: the compression store (originals) + durable savings live
  # here. Backed by a volsync-replicated PVC (see kustomization.yaml component)
  # so the CCR cache and stats survive pod restarts/reschedules. Single replica
  # because the CCR store is local SQLite/LRU and retrieval must hit the same pod.
  data:
    existingClaim: headroom
    globalMounts:
      - path: /data
  config:
    type: configMap
    name: headroom-model-limits
    globalMounts:
      - path: /config
        readOnly: true
  tmp:
    type: emptyDir
    globalMounts:
      - path: /tmp
