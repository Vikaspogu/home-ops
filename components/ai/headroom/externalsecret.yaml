---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headroom
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: headroom-secret
    template:
      engineVersion: v2
      data:
        # Upstream OpenAI-compatible aggregator Headroom forwards to. This is the
        # exact env var the proxy reads; injected into the container via envFrom.
        OPENAI_TARGET_API_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        # API key Headroom uses when forwarding to the upstream.
        OPENAI_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
  dataFrom:
    - extract:
        key: inference-hub
