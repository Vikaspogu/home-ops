---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: headroom
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: headroom-secret
    template:
      engineVersion: v2
      data:
        OPENAI_TARGET_API_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        OPENAI_API_KEY: "{{ .INFERENCE_HUB_CODING_KEY }}"
  dataFrom:
    - extract:
        key: inference-hub
