---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-dashboard-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        DATABASE_URL: |-
          postgres://{{ .IVAN_POSTGRES_USER }}:{{ .IVAN_POSTGRES_PASS }}@postgres17-rw.default.svc.cluster.local/ivan
  dataFrom:
    - extract:
        key: ivan
