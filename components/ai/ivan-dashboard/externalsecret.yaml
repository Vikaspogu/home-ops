---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-dashboard-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        IVAN_PERSONAL_DASHBOARD_API_KEY: "{{ .IVAN_PERSONAL_DASHBOARD_API_KEY }}"
        COPILOT_LLM_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        COPILOT_LLM_API_KEY: "{{ .INFERENCE_HUB_CODING_KEY }}"
        COPILOT_LLM_MODEL: "{{ .INFERENCE_HUB_MODEL }}"
  dataFrom:
    - extract:
        key: ivan
