---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-dashboard-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        YOUTUBE_API_KEY: "{{ .IVAN_YOUTUBE_API_KEY }}"
        LLM_PROMPT_MODEL: "{{ .INFERENCE_HUB_MODEL }}"
        LITELLM_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        LITELLM_MASTER_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        DATABASE_URL: |-
          postgres://{{ .IVAN_POSTGRES_USER }}:{{ .IVAN_POSTGRES_PASS }}@postgres17-rw.default.svc.cluster.local/ivan
  dataFrom:
    - extract:
        key: ivan
    - extract:
        key: inference-hub
