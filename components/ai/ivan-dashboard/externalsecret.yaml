---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-dashboard-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        YOUTUBE_API_KEY: "{{ .YOUTUBE_API_KEY }}"
        # Light model (Gemma 4 via LiteLLM) — video matching, care plans, prompt generation
        LLM_PROMPT_MODEL: "fast"
        LITELLM_BASE_URL: "{{ .LITELLM_BASE_URL }}:4000"
        LITELLM_MASTER_KEY: "{{ .LITELLM_MASTER_KEY }}"
        # Heavy model (Claude via NVIDIA Inference Hub) — workout plans, itineraries
        INFERENCE_HUB_MODEL: "{{ .INFERENCE_HUB_MODEL }}"
        INFERENCE_HUB_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}"
        API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        GOOGLE_CLIENT_ID: "{{ .GOOGLE_CLIENT_ID }}"
        GOOGLE_CLIENT_SECRET: "{{ .GOOGLE_CLIENT_SECRET }}"
        GOOGLE_REFRESH_TOKEN: "{{ .GOOGLE_REFRESH_TOKEN }}"
        GOOGLE_PLACES_API_KEY: "{{ .GOOGLE_PLACES_API_KEY }}"
        TAVILY_API_KEY: "{{.TAVILY_API_KEY}}"
        AGENT_API_KEY: "{{.AGENT_API_KEY}}"
        DATABASE_URL: |-
          postgres://{{ .IVAN_POSTGRES_USER }}:{{ .IVAN_POSTGRES_PASS }}@postgres17-rw.default.svc.cluster.local/ivan
  dataFrom:
    - extract:
        key: ivan
    - extract:
        key: inference-hub
