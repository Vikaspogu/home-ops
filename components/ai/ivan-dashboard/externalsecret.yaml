---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ivan-dashboard
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ivan-dashboard-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        LLM_PROMPT_MODEL: "cloud"
        LLM_BASE_URL: "{{ .LITELLM_BASE_URL }}:4000"
        LLM_API_KEY: "{{ .LITELLM_MASTER_KEY }}"
        DATABASE_URL: |-
          postgres://{{ .IVAN_POSTGRES_USER }}:{{ .IVAN_POSTGRES_PASS }}@postgres17-rw.default.svc.cluster.local/ivan
  dataFrom:
    - extract:
        key: ivan
    - extract:
        key: inference-hub
