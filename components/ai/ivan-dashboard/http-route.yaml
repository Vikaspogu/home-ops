---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app ivan-dashboard
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
  annotations:
    gethomepage.dev/href: "https://dashboard.${CLUSTER_DOMAIN}"
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Ingress
    gethomepage.dev/icon: https://cdn.jsdelivr.net/gh/selfhst/icons/png/homer.png
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["ivan.${CLUSTER_DOMAIN}"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /api/
      backendRefs:
        - name: ivan-dashboard-api
          port: 8001
    - matches:
        - path:
            type: PathPrefix
            value: /mcp
      backendRefs:
        - name: ivan-dashboard-api
          port: 8001
    - backendRefs:
        - name: ivan-dashboard-ui
          port: 80
