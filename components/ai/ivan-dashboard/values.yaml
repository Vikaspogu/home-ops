controllers:
  app:
    replicas: 1
    strategy: RollingUpdate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/ivan-personal-dashboard-v2
          tag: 20260723022333-245858f-oci
          pullPolicy: Always
        env:
          TZ: America/New_York
          IVAN_SERVICE_URL: "http://ivan-personal-service.ai.svc.cluster.local:8080"
        envFrom:
        - secretRef:
            name: ivan-dashboard-secret
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 1Gi
        probes:
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: &httpPort 8080
              periodSeconds: 30
              failureThreshold: 3
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: *httpPort
              periodSeconds: 10
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /api/healthz
                port: *httpPort
              initialDelaySeconds: 3
              periodSeconds: 3
              failureThreshold: 10
        securityContext:
          allowPrivilegeEscalation: false
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
service:
  app:
    controller: app
    ports:
      http:
        port: *httpPort
