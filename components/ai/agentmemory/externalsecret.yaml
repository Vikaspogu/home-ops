---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentmemory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: agentmemory-secret
    template:
      engineVersion: v2
      data:
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
  dataFrom:
    - extract:
        key: agentmemory
