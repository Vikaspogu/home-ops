---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentmemory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: agentmemory-secret
    template:
      engineVersion: v2
      data:
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
        # LLM for consolidation/compression, routed through in-cluster headroom.
        OPENAI_API_KEY: "{{ .INFERENCE_HUB_CODING_KEY }}"
  dataFrom:
    - extract:
        key: agentmemory
    - extract:
        key: inference-hub
