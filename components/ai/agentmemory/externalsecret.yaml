---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: agentmemory
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: agentmemory-secret
    template:
      engineVersion: v2
      data:
        AGENTMEMORY_SECRET: "{{ .AGENTMEMORY_SECRET }}"
        OPENAI_API_KEY: "{{ .INFERENCE_HUB_API_KEY }}"
        OPENAI_BASE_URL: "{{ .INFERENCE_HUB_BASE_URL }}/v1"
  dataFrom:
    - extract:
        key: agentmemory
    - extract:
        key: inference-hub
