controllers:
  agentmemory:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      imagePullSecrets:
      - name: gitea-registry-secret
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: OnRootMismatch
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
    containers:
      app:
        image:
          repository: gitea.a113.casa/vpogu/agentmemory
          tag: 20260718011651-354ef88-oci
        command:
        - /usr/bin/catatonit
        - --
        - /bin/sh
        - -c
        - |
          PREFS_HOME="${HOME:-/home/node}"
          mkdir -p "$PREFS_HOME/.agentmemory"
          if [ ! -s "$PREFS_HOME/.agentmemory/preferences.json" ]; then
            printf '%s\n' '{"schemaVersion":1,"lastAgent":null,"lastAgents":[],"lastProvider":null,"skipSplash":true,"skipNpxHint":true,"skipGlobalInstall":true,"skipConsoleInstall":true,"firstRunAt":"1970-01-01T00:00:00.000Z"}' > "$PREFS_HOME/.agentmemory/preferences.json"
          fi
          exec /entrypoint.sh
        env:
          TZ: America/New_York
          III_REST_PORT: "3111"
          RUST_LOG: warn
          AGENTMEMORY_DROP_STALE_INDEX: "true"
          # Consolidation LLM via in-cluster headroom; OPENAI_API_KEY comes from
          # the secret. Consolidation activates when a key is present.
          OPENAI_BASE_URL: http://headroom.ai.svc.cluster.local:8787/v1
          # Not nemotron-3-super-v3: agentmemory sends `tools: []` on every chat
          # call and super's vLLM backend 400s on empty tools arrays; nano's
          # backend accepts them (verified via in-pod probe against headroom).
          OPENAI_MODEL: nvidia/nvidia/Nemotron-3-Nano-30B-A3B
          # Embeddings for semantic recall. Model is not in agentmemory's
          # known-models table, so dimensions must be set explicitly.
          OPENAI_EMBEDDING_MODEL: nvidia/qwen/qwen3-embedding-0.6b
          OPENAI_EMBEDDING_DIMENSIONS: "1024"
          # Entity/relation extraction into the knowledge graph at consolidation.
          GRAPH_EXTRACTION_ENABLED: "true"
          # Per-observation LLM compression: distills raw tool I/O into summaries.
          # Costs one LLM call per captured tool result — watch headroom volume.
          AGENTMEMORY_AUTO_COMPRESS: "true"
          # Surface recalled memories mid-conversation, not only at session start.
          AGENTMEMORY_INJECT_CONTEXT: "true"
          # Print boot diagnostics (embedding provider, loaded index counts) to
          # pod logs; without it they buffer invisibly.
          AGENTMEMORY_VERBOSE: "true"
          # Bigger rebuild batches = fewer embed requests against the ~40 RPM
          # NVIDIA quota (429s are skipped, not retried, by the rebuild).
          REBUILD_EMBED_BATCH_SIZE: "64"
          AGENTMEMORY_VIEWER_HOST: "0.0.0.0"
          VIEWER_ALLOWED_HOSTS: "agentmemory.${CLUSTER_DOMAIN}"
          VIEWER_ALLOWED_ORIGINS: "https://agentmemory.${CLUSTER_DOMAIN}"
        envFrom:
        - secretRef:
            name: agentmemory-secret
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /agentmemory/livez
                port: &apiPort 3111
              failureThreshold: 60
              periodSeconds: 5
              timeoutSeconds: 5
          readiness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /agentmemory/livez
                port: *apiPort
              failureThreshold: 3
              periodSeconds: 10
              timeoutSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /agentmemory/livez
                port: *apiPort
              failureThreshold: 3
              periodSeconds: 30
              timeoutSeconds: 5
        resources:
          requests:
            cpu: 200m
            memory: 2Gi
          limits:
            memory: 6Gi
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop:
            - ALL
service:
  app:
    controller: agentmemory
    ports:
      api:
        port: 3111
      stream:
        port: 3112
      viewer:
        port: 3113
persistence:
  data:
    existingClaim: agentmemory
    globalMounts:
    - path: /data
  tmp:
    type: emptyDir
    globalMounts:
    - path: /tmp
