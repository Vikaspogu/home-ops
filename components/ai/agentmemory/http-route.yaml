---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: &app agentmemory
  labels:
    app.kubernetes.io/instance: *app
    app.kubernetes.io/name: *app
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["agentmemory.${CLUSTER_DOMAIN}"]
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /stream
      backendRefs:
        - name: *app
          port: 3112
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: *app
          port: 3113
