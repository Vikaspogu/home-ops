---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: kube-system
helmCharts:
  - name: gpu-operator
    repo: https://helm.ngc.nvidia.com/nvidia
    version: v26.3.3
    releaseName: gpu-operator
    namespace: kube-system
    valuesFile: values.yaml
# Strip the default ClusterPolicy CR from the chart output. The CR is
# delivered by a separate Application (nvidia-gpu-cluster-policy) at a later
# sync wave so its CRD is registered before ArgoCD dry-runs it.
patches:
  - patch: |
      $patch: delete
      apiVersion: nvidia.com/v1
      kind: ClusterPolicy
      metadata:
        name: cluster-policy
