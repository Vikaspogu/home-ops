---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ivan-reader
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ivan-reader
rules:
  # ── Read: core resources (autonomous — no approval needed) ──
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
      - events
      - nodes
      - services
      - endpoints
      - persistentvolumeclaims
      - persistentvolumes
      - namespaces
      - configmaps
      - resourcequotas
      - limitranges
      - replicationcontrollers
    verbs: ["get", "list", "watch"]
  # ── Read: workloads (autonomous) ──
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
      - replicasets
    verbs: ["get", "list", "watch"]
  # ── Read: batch jobs and cron (autonomous) ──
  - apiGroups: ["batch"]
    resources:
      - jobs
      - cronjobs
    verbs: ["get", "list", "watch"]
  # ── Read: networking (autonomous) ──
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
      - networkpolicies
    verbs: ["get", "list"]
  - apiGroups: ["gateway.networking.k8s.io"]
    resources:
      - httproutes
      - gateways
    verbs: ["get", "list"]
  # ── Read: storage (autonomous) ──
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
      - volumeattachments
    verbs: ["get", "list"]
  # ── Read: monitoring (autonomous — Alertmanager, Prometheus, ServiceMonitors) ──
  - apiGroups: ["monitoring.coreos.com"]
    resources:
      - prometheusrules
      - servicemonitors
      - podmonitors
      - alertmanagers
      - prometheuses
    verbs: ["get", "list"]
  # ── Read: certificates (autonomous) ──
  - apiGroups: ["cert-manager.io"]
    resources:
      - certificates
      - certificaterequests
      - issuers
      - clusterissuers
    verbs: ["get", "list"]
  # ── Read: Argo CD (autonomous) ──
  - apiGroups: ["argoproj.io"]
    resources:
      - applications
      - applicationsets
      - appprojects
    verbs: ["get", "list"]
  # ── Read: Volsync / backups (autonomous) ──
  - apiGroups: ["volsync.backube"]
    resources:
      - replicationsources
      - replicationdestinations
    verbs: ["get", "list"]
  # ── Read: metrics (autonomous — kubectl top) ──
  - apiGroups: ["metrics.k8s.io"]
    resources:
      - nodes
      - pods
    verbs: ["get", "list"]
  # ── Read: CRDs (autonomous — understand what's installed) ──
  - apiGroups: ["apiextensions.k8s.io"]
    resources:
      - customresourcedefinitions
    verbs: ["get", "list"]
  # ── Read: Rook-Ceph (autonomous) ──
  - apiGroups: ["ceph.rook.io"]
    resources:
      - cephclusters
      - cephblockpools
      - cephfilesystems
      - cephobjectstores
    verbs: ["get", "list"]
  # ── Write: safe remediation (ivan's tiered confirmation handles approval) ──
  # Rollout restart — safest remediation action
  - apiGroups: ["apps"]
    resources:
      - deployments
      - statefulsets
      - daemonsets
    verbs: ["patch"]
  # Delete pods/PVCs — for stuck pod remediation and CNPG replica recovery
  - apiGroups: [""]
    resources:
      - pods
      - persistentvolumeclaims
    verbs: ["delete"]
  # Scale workloads — for emergency scale-down/up
  - apiGroups: ["apps"]
    resources:
      - deployments/scale
      - statefulsets/scale
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ivan-reader
subjects:
  - kind: ServiceAccount
    name: ivan-reader
    namespace: kube-system
roleRef:
  kind: ClusterRole
  name: ivan-reader
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ivan-repo-worker-manager
  namespace: ai
rules:
  - apiGroups: ["batch"]
    resources:
      - jobs
    verbs: ["get", "list", "watch", "create", "delete"]
  - apiGroups: [""]
    resources:
      - pods
      - pods/log
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ivan-repo-worker-manager
  namespace: ai
subjects:
  - kind: ServiceAccount
    name: ivan-reader
    namespace: kube-system
roleRef:
  kind: Role
  name: ivan-repo-worker-manager
  apiGroup: rbac.authorization.k8s.io
---
# Namespace-scoped: pods/exec only in rook-ceph for ceph diagnostics
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ivan-reader-ceph-exec
  namespace: rook-ceph
rules:
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ivan-reader-ceph-exec
  namespace: rook-ceph
subjects:
  - kind: ServiceAccount
    name: ivan-reader
    namespace: kube-system
roleRef:
  kind: Role
  name: ivan-reader-ceph-exec
  apiGroup: rbac.authorization.k8s.io
