---
# NVIDIA Device Plugin for Kubernetes
# Exposes nvidia.com/gpu resources to enable GPU scheduling

# Use NFD label from node-feature-discovery-rules/nvidia.yaml
# Label: nvidia.feature.node.kubernetes.io/gpu=true
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.feature.node.kubernetes.io/gpu
          operator: In
          values:
          - "true"

# RuntimeClass for NVIDIA Container Runtime (uses containerd default runtime on Talos)
runtimeClassName: ""

# Device discovery strategy - use legacy mode for Talos
config:
  name: nvidia-device-plugin-config
  default: |-
    version: v1
    flags:
      migStrategy: none
      failOnInitError: false
      deviceDiscoveryStrategy: legacy
      nvidiaDriverRoot: /
      plugin:
        passDeviceSpecs: true
        deviceListStrategy: ["envvar"]
        deviceIDStrategy: uuid

# Resource limits for the plugin itself
resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    memory: 100Mi

# Update strategy
updateStrategy:
  type: RollingUpdate
