---
# NVIDIA Device Plugin for Kubernetes
# Exposes nvidia.com/gpu resources to enable GPU scheduling

# Override default affinity rules - just use simple node selector
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: kubernetes.io/hostname
          operator: In
          values:
          - k8s-4-dell

# Resource limits for the plugin itself
resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    memory: 100Mi

# Update strategy
updateStrategy:
  type: RollingUpdate
