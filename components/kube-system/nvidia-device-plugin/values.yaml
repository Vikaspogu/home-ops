---
# NVIDIA Device Plugin for Kubernetes
# Exposes nvidia.com/gpu resources to enable GPU scheduling

nodeSelector:
  kubernetes.io/hostname: k8s-4-dell

# Resource limits for the plugin itself
resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    memory: 100Mi

# Update strategy
updateStrategy:
  type: RollingUpdate
