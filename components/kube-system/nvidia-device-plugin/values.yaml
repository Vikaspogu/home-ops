---
# NVIDIA Device Plugin for Kubernetes
# Exposes nvidia.com/gpu resources to enable GPU scheduling

# Use NFD label from node-feature-discovery-rules/nvidia.yaml
# Label: nvidia.feature.node.kubernetes.io/gpu=true
affinity:
  nodeAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      nodeSelectorTerms:
      - matchExpressions:
        - key: nvidia.feature.node.kubernetes.io/gpu
          operator: In
          values:
          - "true"

# RuntimeClass for NVIDIA Container Runtime (uses containerd default runtime on Talos)
runtimeClassName: ""

# Use environment variables to configure device plugin for Talos
env:
  - name: DEVICE_DISCOVERY_STRATEGY
    value: "legacy"
  - name: PASS_DEVICE_SPECS
    value: "true"
  - name: FAIL_ON_INIT_ERROR
    value: "false"

# Resource limits for the plugin itself
resources:
  requests:
    cpu: 50m
    memory: 50Mi
  limits:
    memory: 100Mi

# Update strategy
updateStrategy:
  type: RollingUpdate
