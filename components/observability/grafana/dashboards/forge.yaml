---
apiVersion: v1
kind: ConfigMap
metadata:
  name: forge-dashboard
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  forge.json: |
    {
      "schemaVersion": 39,
      "uid": "forge-observability",
      "title": "Forge Orchestrator",
      "tags": ["forge"],
      "timezone": "browser",
      "refresh": "30s",
      "time": { "from": "now-1h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "type": "stat",
          "title": "Tasks by State",
          "gridPos": { "h": 6, "w": 12, "x": 0, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (state) (forge_tasks_by_state)",
              "legendFormat": "{{state}}",
              "refId": "A"
            }
          ],
          "options": {
            "reduceOptions": {
              "calcs": ["lastNotNull"]
            },
            "orientation": "auto",
            "textMode": "auto",
            "colorMode": "background",
            "graphMode": "none"
          }
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Node Failures Rate",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "sum by (node_id) (rate(forge_node_failures_total[1h]))",
              "legendFormat": "{{node_id}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "ops",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10
              }
            }
          }
        },
        {
          "id": 3,
          "type": "timeseries",
          "title": "Node Duration p95",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 6 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "histogram_quantile(0.95, sum(rate(forge_node_duration_seconds_bucket[1h])) by (le, node_id))",
              "legendFormat": "p95 {{node_id}}",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "s",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10
              }
            }
          }
        },
        {
          "id": 4,
          "type": "timeseries",
          "title": "Queue Depth",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "datasource": { "type": "prometheus", "uid": "PBFA97CFB590B2093" },
          "targets": [
            {
              "expr": "forge_queue_depth",
              "legendFormat": "queue depth",
              "refId": "A"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": {
                "drawStyle": "line",
                "lineInterpolation": "linear",
                "fillOpacity": 10
              }
            }
          }
        },
        {
          "id": 5,
          "type": "traces",
          "title": "Recent forge task traces",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 16 },
          "datasource": { "type": "tempo", "uid": "tempo" },
          "targets": [
            {
              "refId": "A",
              "queryType": "traceql",
              "query": "{resource.service.name=\"forge-orchestrator\"}",
              "limit": 20
            }
          ]
        },
        {
          "id": 6,
          "type": "traces",
          "title": "Recent sandbox agent traces",
          "gridPos": { "h": 10, "w": 24, "x": 0, "y": 26 },
          "datasource": { "type": "tempo", "uid": "tempo" },
          "targets": [
            {
              "refId": "A",
              "queryType": "traceql",
              "query": "{resource.service.name=\"forge-sandbox-agent\"}",
              "limit": 20
            }
          ]
        }
      ]
    }
