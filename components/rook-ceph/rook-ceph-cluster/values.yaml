---
monitoring:
  enabled: true
  createPrometheusRules: true
  prometheusRuleOverrides:
    CephNodeNetworkPacketDrops:
      disabled: true
    CephNodeDiskspaceWarning:
      # The upstream predictive rule is noisy for new Talos nodes because
      # bootstrap image churn can look like a sustained 48h fill rate.
      expr: |
        (
          predict_linear(
            node_filesystem_free_bytes{device=~"/.*", mountpoint!="/etc/nfsmount.conf"}[2d],
            3600 * 24 * 5
          ) < 0
          and
          (
            node_filesystem_free_bytes{device=~"/.*", mountpoint!="/etc/nfsmount.conf"}
            / node_filesystem_size_bytes{device=~"/.*", mountpoint!="/etc/nfsmount.conf"}
            < 0.50
          )
        ) * on(instance) group_left(nodename) node_uname_info
toolbox:
  enabled: true
cephImage:
  imagePullPolicy: IfNotPresent
cephClusterSpec:
  cephConfig:
    global:
      bdev_enable_discard: "true" # quote
      bdev_async_discard_threads: "1" # quote
      osd_class_update_on_start: "false" # quote
      device_failure_prediction_mode: local # requires mgr module
  cleanupPolicy:
    wipeDevicesFromOtherClusters: true
  crashCollector:
    disable: false
  csi:
    readAffinity:
      enabled: true
  dashboard:
    enabled: true
    urlPrefix: /
    ssl: false
    prometheusEndpoint: http://prometheus-operated.observability.svc.cluster.local:9090
  mgr:
    resources:
      requests:
        memory: 512Mi
        cpu: 250m
      limits:
        memory: 1Gi
        cpu: 500m
    modules:
      - name: diskprediction_local
        enabled: true
      - name: insights
        enabled: true
      - name: pg_autoscaler
        enabled: true
      - name: rook
        enabled: true
  placement:
    mon:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: In
                  values:
                    - k8s-1-nab9
                    - k8s-2-ser
                    - k8s-3-4u
  network:
    provider: host
    connections:
      requireMsgr2: true
  storage:
    useAllNodes: false
    useAllDevices: false
    config:
      osdsPerDevice: "1"
    nodes:
      - name: "k8s-1-nab9"
        devices:
          - name: "nvme0n1"
      - name: "k8s-2-ser"
        devices:
          - name: "nvme0n1"
      - name: "k8s-3-4u"
        devices:
          - name: "nvme0n1"
cephBlockPools:
  - name: ceph-blockpool
    spec:
      failureDomain: host
      replicated:
        size: 3
    storageClass:
      enabled: true
      name: ceph-block
      isDefault: true
      reclaimPolicy: Delete
      allowVolumeExpansion: true
      volumeBindingMode: Immediate
      mountOptions:
        - discard
      parameters:
        compression_mode: aggressive
        compression_algorithm: zstd
        imageFormat: "2"
        imageFeatures: layering,fast-diff,object-map,deep-flatten,exclusive-lock
        csi.storage.k8s.io/provisioner-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/provisioner-secret-namespace: rook-ceph
        csi.storage.k8s.io/controller-expand-secret-name: rook-csi-rbd-provisioner
        csi.storage.k8s.io/controller-expand-secret-namespace: rook-ceph
        csi.storage.k8s.io/node-stage-secret-name: rook-csi-rbd-node
        csi.storage.k8s.io/node-stage-secret-namespace: rook-ceph
        csi.storage.k8s.io/fstype: ext4
cephBlockPoolsVolumeSnapshotClass:
  enabled: true
  name: csi-ceph-blockpool
  isDefault: false
  deletionPolicy: Delete
cephFileSystems: []
cephObjectStores: []
