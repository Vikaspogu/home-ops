metadata_dir = "/meta"

# Multi-HDD configuration - 4x 4TB drives on k8s-3-4u
data_dir = [
  { path = "/data1", capacity = "3.5TB" },
  { path = "/data2", capacity = "3.5TB" },
  { path = "/data3", capacity = "3.5TB" },
  { path = "/data4", capacity = "3.5TB" },
]

db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

replication_factor = 1

compression_level = 2

rpc_bind_addr = "[::]:3901"
# Important: This must be reachable by other Garage nodes
# Using pod IP substituted by envsubst initContainer
rpc_public_addr = "${POD_IP}:3901"
rpc_secret = "${GARAGE_RPC_SECRET}"

# Bootstrap from existing node1 (Service DNS for discovery)
bootstrap_peers = ["garage-s3.default.svc.cluster.local:3901"]

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "${GARAGE_ADMIN_TOKEN}"
