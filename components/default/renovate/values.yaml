---
controllers:
  app:
    type: cronjob
    cronjob:
      schedule: "0 3 * * *"
      timeZone: America/New_York
      concurrencyPolicy: Forbid
      suspend: true
      successfulJobsHistory: 3
      failedJobsHistory: 3
      backoffLimit: 1
      ttlSecondsAfterFinished: 604800
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      restartPolicy: Never
    containers:
      app:
        image:
          repository: ghcr.io/renovatebot/renovate
          tag: "43.185.1@sha256:6bcd209d6a3e87769376430c24c853f1eefb770c9c0ed273dc985785158223c5"
        env:
          RENOVATE_CONFIG_FILE: /config/config.js
          LOG_LEVEL: info
        envFrom:
          - secretRef:
              name: renovate-secret
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities: { drop: ["ALL"] }
        probes:
          liveness:
            enabled: false
          readiness:
            enabled: false
          startup:
            enabled: false

persistence:
  config:
    enabled: true
    type: configMap
    name: renovate-config
    globalMounts:
      - path: /config
        readOnly: true
  cache:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp/renovate
  tmp:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /tmp
