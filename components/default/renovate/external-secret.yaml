---
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: renovate
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: renovate-secret
    template:
      engineVersion: v2
      data:
        RENOVATE_TOKEN: "{{ .RENOVATE_TOKEN }}"
        RENOVATE_GITHUB_COM_TOKEN: '{{ index . "RENOVATE_GITHUB_COM_TOKEN" | default "" }}'
  dataFrom:
    - extract:
        key: renovate
