---
controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      runner:
        image:
          repository: gitea/act_runner
          tag: 0.6.1@sha256:b5c35d6bdbb9bb25e531230bfc7cc663cb751406cbec90a2a891b85fea54de86
        command:
          - sh
          - -c
          - |
            while ! nc -z localhost 2375 </dev/null; do
              echo 'waiting for docker daemon...'
              sleep 5
            done
            /sbin/tini -- run.sh
        env:
          DOCKER_HOST: tcp://localhost:2375
          GITEA_INSTANCE_URL: "https://gitea.${CLUSTER_DOMAIN}"
          GITEA_RUNNER_LABELS: "ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-24.04,ubuntu-24.04:docker://docker.gitea.com/runner-images:ubuntu-24.04,ubuntu-22.04:docker://docker.gitea.com/runner-images:ubuntu-22.04"
          CONFIG_FILE: /config/config.yaml
        envFrom:
          - secretRef:
              name: gitea-runner-secret
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
      daemon:
        image:
          repository: docker
          tag: dind-rootless
        command:
          - sh
          - -c
          - |
            mkdir -p /etc/docker
            cat > /etc/docker/daemon.json <<'DAEMONJSON'
            {
              "max-concurrent-downloads": 3,
              "max-concurrent-uploads": 3,
              "default-address-pools": [
                {"base": "172.30.0.0/16", "size": 24}
              ]
            }
            DAEMONJSON
            dockerd-entrypoint.sh &
            while ! docker info >/dev/null 2>&1; do sleep 2; done

            pre_pull_runner_images() {
              docker pull docker.gitea.com/runner-images:ubuntu-24.04 || true
              docker pull docker.gitea.com/runner-images:ubuntu-22.04 || true
            }

            cleanup_docker() {
              docker container prune -f --filter "until=24h" || true
              docker network prune -f --filter "until=24h" || true
              docker image prune -f || true
              docker builder prune -af --filter "until=24h" || true
            }

            cleanup_docker
            pre_pull_runner_images
            echo "Docker cleanup complete, runner images cached, daemon running."
            while true; do
              sleep 3600
              cleanup_docker
              pre_pull_runner_images
            done &
            wait
        env:
          DOCKER_TLS_CERTDIR: ""
        securityContext:
          runAsNonRoot: true
          runAsUser: 1000
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
              - ALL
        resources:
          requests:
            cpu: 500m
            memory: 512Mi
          limits:
            memory: 2Gi

persistence:
  docker-certs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /certs
  docker-data:
    enabled: true
    existingClaim: gitea-runner-docker
    advancedMounts:
      app:
        daemon:
          - path: /var/lib/docker
  config:
    enabled: true
    type: configMap
    name: gitea-runner-config
    globalMounts:
      - path: /config
        readOnly: true
  data:
    enabled: true
    existingClaim: gitea-runner
    globalMounts:
      - path: /data
