---
controllers:
  app:
    replicas: 1
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      runner:
        image:
          repository: gitea/act_runner
          tag: nightly
        command:
          - sh
          - -c
          - |
            while ! nc -z localhost 2375 </dev/null; do
              echo 'waiting for docker daemon...'
              sleep 5
            done
            /sbin/tini -- run.sh
        env:
          DOCKER_HOST: tcp://localhost:2375
          GITEA_INSTANCE_URL: "https://gitea.${CLUSTER_DOMAIN}"
          GITEA_RUNNER_LABELS: "ubuntu-latest:docker://docker.gitea.com/runner-images:ubuntu-24.04,ubuntu-24.04:docker://docker.gitea.com/runner-images:ubuntu-24.04,ubuntu-22.04:docker://docker.gitea.com/runner-images:ubuntu-22.04"
          CONFIG_FILE: /config/config.yaml
        envFrom:
          - secretRef:
              name: gitea-runner-secret
        resources:
          requests:
            cpu: 100m
            memory: 512Mi
          limits:
            memory: 2Gi
      daemon:
        image:
          repository: docker
          tag: 29-dind
        command:
          - sh
          - -c
          - |
            mkdir -p /etc/docker
            cat > /etc/docker/daemon.json <<'DAEMONJSON'
            {
              "default-address-pools": [
                {"base": "172.30.0.0/16", "size": 24}
              ]
            }
            DAEMONJSON
            dockerd-entrypoint.sh &
            while ! docker info >/dev/null 2>&1; do sleep 2; done
            docker system prune -af --volumes || true
            docker network prune -f || true
            echo "Docker prune complete, daemon running."
            while true; do
              sleep 1800
              docker network prune -f || true
              docker image prune -f || true
            done &
            wait
        env:
          DOCKER_TLS_CERTDIR: ""
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 1000m
            memory: 1Gi
          limits:
            memory: 8Gi

persistence:
  docker-certs:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /certs
  docker-data:
    enabled: true
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 50Gi
    storageClass: longhorn
    advancedMounts:
      app:
        daemon:
          - path: /var/lib/docker
  config:
    enabled: true
    type: configMap
    name: gitea-runner-config
    globalMounts:
      - path: /config
        readOnly: true
  data:
    enabled: true
    existingClaim: gitea-runner
    globalMounts:
      - path: /data
