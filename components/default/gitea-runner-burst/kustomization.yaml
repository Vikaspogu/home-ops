---
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
components:
  - ../../volsync-system/volsync-replication
resources:
  - ./external-secret.yaml
  - ./configmap.yaml
  - ./pvc-docker.yaml

helmCharts:
  - name: app-template
    releaseName: gitea-runner-burst
    namespace: default
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: "5.0.1"
    valuesFile: values.yaml
