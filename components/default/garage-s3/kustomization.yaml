---
# yaml-language-server: $schema=https://json.schemastore.org/kustomization
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ./externalsecret.yaml
  - ./http-route.yaml
configMapGenerator:
  - name: garage-s3-configmap
    files:
      - resources/configuration.toml
generatorOptions:
  disableNameSuffixHash: true
helmCharts:
  - name: app-template
    releaseName: garage-s3
    namespace: default
    repo: oci://ghcr.io/bjw-s-labs/helm
    version: "5.0.1"
    valuesFile: values.yaml
