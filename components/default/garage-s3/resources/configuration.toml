metadata_dir = "/meta"

# Multi-HDD configuration - 8x 900GB SAS drives
data_dir = [
  { path = "/data1", capacity = "800GB" },
  { path = "/data2", capacity = "800GB" },
  { path = "/data3", capacity = "800GB" },
  { path = "/data4", capacity = "800GB" },
  { path = "/data5", capacity = "800GB" },
  { path = "/data6", capacity = "800GB" },
  { path = "/data7", capacity = "800GB" },
  { path = "/data8", capacity = "800GB" },
]

db_engine = "lmdb"
metadata_auto_snapshot_interval = "6h"

replication_factor = 2

compression_level = 2

rpc_bind_addr = "[::]:3901"
# Public address must be reachable by other Garage nodes
rpc_public_addr = "garage-s3.default.svc.cluster.local:3901"
rpc_secret = "${GARAGE_RPC_SECRET}"

[s3_api]
s3_region = "garage"
api_bind_addr = "[::]:3900"

[admin]
api_bind_addr = "[::]:3903"
admin_token = "${GARAGE_ADMIN_TOKEN}"
