---
controllers:
  garage-s3:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: In
                    values:
                      - k8s-3-4u
    containers:
      app:
        image:
          repository: dxflrs/garage
          tag: v2.3.0@sha256:866bd13ed2038ba7e7190e840482bc27234c4afaf77be8cfa439ae088c1e4690
        env:
          TZ: "America/New_York"
          GARAGE_ADMIN_TOKEN:
            valueFrom:
              secretKeyRef:
                name: garage-s3-secret
                key: GARAGE_ADMIN_TOKEN
          GARAGE_RPC_SECRET:
            valueFrom:
              secretKeyRef:
                name: garage-s3-secret
                key: GARAGE_RPC_SECRET
          GARAGE_METRICS_TOKEN:
            valueFrom:
              secretKeyRef:
                name: garage-s3-secret
                key: GARAGE_METRICS_TOKEN
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 200m
            memory: 512Mi
          limits:
            memory: 2Gi
      webui:
        image:
          repository: khairul169/garage-webui
          tag: 1.1.0@sha256:17c793551873155065bf9a022dabcde874de808a1f26e648d4b82e168806439c
        env:
          API_BASE_URL: "http://garage-s3.default.svc.cluster.local:3903"
          S3_ENDPOINT_URL: "http://garage-s3.default.svc.cluster.local:3900"
          API_ADMIN_KEY:
            valueFrom:
              secretKeyRef:
                name: garage-s3-secret
                key: GARAGE_ADMIN_TOKEN
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: ["ALL"]
        resources:
          requests:
            cpu: 10m
            memory: 128Mi
          limits:
            memory: 256Mi

service:
  app:
    controller: garage-s3
    ports:
      rpc:
        port: 3901
      s3:
        port: 3900
      api:
        port: 3903
      webui:
        port: 3909

persistence:
  storage:
    type: hostPath
    hostPath: /var/mnt/backup-garage/garage-single
    hostPathType: DirectoryOrCreate
    globalMounts:
      - path: /storage

  # Configuration from ConfigMap
  config:
    type: configMap
    name: garage-s3-configmap
    globalMounts:
      - path: /etc/garage.toml
        subPath: configuration.toml
