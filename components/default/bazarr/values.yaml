---
defaultPodOptions:
  nodeSelector:
    kubernetes.io/hostname: k8s-4-dell
controllers:
  app:
    annotations:
      reloader.stakater.com/auto: "true"
    pod:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 100
    containers:
      subcleaner:
        image:
          repository: registry.k8s.io/git-sync/git-sync
          tag: v4.7.0
          pullPolicy: IfNotPresent
        args:
          - --repo=https://github.com/KBlixt/subcleaner.git
          - --branch=master
          - --wait=86400 # 1 day
          - --root=/add-ons/
      app:
        image:
          repository: ghcr.io/home-operations/bazarr
          tag: 1.5.6@sha256:80cb090162b47ea1bfb499d742b45a460b282f17ffefa4c01d518a5c8d52a5a4
        env:
          TZ: "America/New_York"
        resources:
          requests:
            cpu: 50m
            memory: 250Mi
          limits:
            memory: 4Gi
service:
  app:
    ports:
      http:
        port: 6767

persistence:
  config:
    enabled: true
    existingClaim: bazarr
    globalMounts:
      - path: /config
  media:
    type: hostPath
    hostPath: /var/mnt/media
    globalMounts:
      - path: /nfs-nas-pvc
  add-ons:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /add-ons
  scripts:
    enabled: true
    type: configMap
    name: bazarr-scripts # overriden by kustomizeconfig
    defaultMode: 0775
