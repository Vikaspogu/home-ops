---
defaultPodOptions:
  enableServiceLinks: false
  nodeSelector:
    kubernetes.io/hostname: k8s-4-dell
controllers:
  jellyfin:
    strategy: Recreate
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: jellyfin/jellyfin
          tag: 10.11.11@sha256:aefb67e6a7ff1debdd154a78a7bbb780fd0c873d8639210a7f6a2016ad2b35db
        env:
          DOTNET_SYSTEM_IO_DISABLEFILELOCKING: "true"
          JELLYFIN_FFmpeg__probesize: 50000000
          JELLYFIN_FFmpeg__analyzeduration: 50000000
          TZ: America/New_York
          # Expose both GPUs to the container — the device plugin runs in CDI
          # mode and overrides any UUID/index here with "void", breaking access.
          NVIDIA_VISIBLE_DEVICES: all
          NVIDIA_DRIVER_CAPABILITIES: all
          # Pin ffmpeg/CUDA to the RTX 3060 by UUID. Index "1" is unreliable
          # because CUDA's default order is FASTEST_FIRST, not PCI bus order
          # — under FASTEST_FIRST index 1 is the slower GT 1030, which has
          # no NVENC support at all (Pascal GP108) and fails with
          # "OpenEncodeSessionEx failed: unsupported device". UUID survives
          # both driver reorderings and CUDA_DEVICE_ORDER changes.
          CUDA_VISIBLE_DEVICES: GPU-dbe22ad2-8707-a394-a7dd-5d865fc290f6
        securityContext:
          privileged: true
        resources:
          requests:
            cpu: 100m
            memory: 2Gi
            nvidia.com/gpu: 1
          limits:
            memory: 6Gi
            nvidia.com/gpu: 1
        probes:
          liveness: &probes
            enabled: true
            custom: true
            spec:
              httpGet:
                path: /health
                port: &port 8096
              initialDelaySeconds: 0
              periodSeconds: 30
              timeoutSeconds: 1
              failureThreshold: 3
          readiness: *probes
          startup:
            enabled: false

service:
  app:
    ports:
      http:
        port: *port

persistence:
  config:
    enabled: true
    existingClaim: jellyfin
    globalMounts:
      - path: /config
  transcode:
    enabled: true
    type: emptyDir
    globalMounts:
      - path: /transcode
  media:
    type: hostPath
    hostPath: /var/mnt/media
    globalMounts:
      - path: /nfs-nas-pvc
