fullnameOverride: &name gitea
controllers:
  gitea:
    annotations:
      reloader.stakater.com/auto: "true"
    initContainers:
      init-db:
        image:
          repository: ghcr.io/home-operations/postgres-init
          tag: 18.4.0@sha256:ebd9d30add17acdf935d73eb004758c7dfd9388aaa605fda70ad74378ab92aec
        envFrom: &envFrom
          - secretRef:
              name: gitea-secret
    containers:
      gitea:
        image:
          repository: ghcr.io/go-gitea/gitea
          tag: 1.26.4-rootless
        env:
          TZ: "America/New_York"
          USER_UID: 1000
          USER_GID: 1000
          GITEA__ACTIONS__ENABLED: "true"
          GITEA__ACTIONS__DEFAULT_ACTIONS_URL: "https://gitea.com"
          GITEA__PACKAGES__ENABLED: "true"
          # Native garbage collection removes unreferenced blobs; version retention stays in the custom CronJob.
          GITEA__cron.cleanup_packages__ENABLED: "true"
          GITEA__cron.cleanup_packages__RUN_AT_START: "true"
          GITEA__cron.cleanup_packages__SCHEDULE: "@midnight"
          GITEA__cron.cleanup_packages__OLDER_THAN: "24h"
          GITEA__database__DB_TYPE: "postgres"
          GITEA__REPOSITORY__ENABLE_PUSH_CREATE_USER: "True"
          GITEA__REPOSITORY__DEFAULT_BRANCH: "main"
          GITEA__SECURITY__INSTALL_LOCK: "True"
          GITEA__SERVER__DOMAIN: "gitea.${CLUSTER_DOMAIN}"
          GITEA__SERVER__ROOT_URL: "https://gitea.${CLUSTER_DOMAIN}"
          GITEA__SERVER__SSH_DOMAIN: "ssh.${CLUSTER_DOMAIN}"
          GITEA__SERVER__SSH_PORT: 2222
        securityContext:
          allowPrivilegeEscalation: false
          # mkdir: can't create directory '/tmp/gitea': Read-only file system
          readOnlyRootFilesystem: false
          capabilities: { drop: ["ALL"] }
        envFrom: *envFrom
        resources:
          requests:
            cpu: 10m
            memory: 500Mi
          limits:
            memory: 2Gi
service:
  gitea:
    controller: *name
    ports:
      http:
        port: 3000
  ssh:
    enabled: true
    # Phase 1 (DGX coding bot): expose Gitea's built-in SSH server externally
    # via Klipper svclb on port 2222 (port 22 is taken by host OpenSSH).
    type: LoadBalancer
    controller: *name
    ports:
      ssh:
        enabled: true
        port: 2222
        targetPort: 2222
        protocol: TCP

persistence:
  config:
    enabled: true
    existingClaim: gitea
    globalMounts:
      - path: /var/lib/gitea
