---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gitea-pages
  labels:
    app.kubernetes.io/instance: gitea
    app.kubernetes.io/name: gitea
spec:
  parentRefs:
    - name: ${GATEWAY_NAME}
      namespace: ${GATEWAY_NAMESPACE}
      sectionName: https
  hostnames: ["pages.${CLUSTER_DOMAIN}"]
  rules:
    - backendRefs:
        - name: gitea
          port: 3000
