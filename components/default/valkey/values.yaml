---
controllers:
  valkey:
    annotations:
      reloader.stakater.com/auto: "true"
    containers:
      app:
        image:
          repository: valkey/valkey
          tag: 9.0.3-alpine@sha256:e1095c6c76ee982cb2d1e07edbb7fb2a53606630a1d810d5a47c9f646b708bf5
        command:
          - sh
          - -c
          - |
            valkey-server \
              --port 6379 \
              --dir /data \
              --save "300 1" \
              --save "60 100"
        env:
          VALKEY_PORT: &port 6379
        probes:
          startup:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              initialDelaySeconds: 5
              periodSeconds: 5
          liveness:
            enabled: true
            custom: true
            spec:
              tcpSocket:
                port: *port
              periodSeconds: 30
service:
  app:
    ports:
      http:
        port: *port

persistence:
  data:
    type: persistentVolumeClaim
    accessMode: ReadWriteOnce
    size: 1Gi
    globalMounts:
      - path: /data
  secret:
    type: secret
    name: valkey-secret
    advancedMounts:
      valkey:
        app:
          - path: /secret/valkey-password
            subPath: valkey-password
            readOnly: true
