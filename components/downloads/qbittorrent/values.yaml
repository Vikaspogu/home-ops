---
defaultPodOptions:
  enableServiceLinks: false
  nodeSelector:
    kubernetes.io/hostname: k8s-4-dell

controllers:
  qbittorrent:
    annotations:
      configmap.reloader.stakater.com/reload: qbittorrent-scripts,qbittorrent-dnsdist
      secret.reloader.stakater.com/reload: qbittorrent-secret
    pod:
      securityContext:
        fsGroup: 1000
        fsGroupChangePolicy: "OnRootMismatch"
        supplementalGroups:
          - 100
      terminationGracePeriodSeconds: 120

    initContainers:
      # One-time ownership migration: qbittorrent previously ran as UID 2000, so
      # its config PVC and completed downloads are owned by 2000. Re-own them to
      # 1000 (the shared *arr UID) so imports work without group-write
      # workarounds. Idempotent once ownership matches; safe to leave in place.
      chown-data:
        image:
          repository: public.ecr.aws/docker/library/busybox
          tag: "1.38.0"
        command:
          - sh
          - -c
          - |
            chown -R 1000:1000 /config
            chown -R 1000:1000 /nfs-nas-pvc/downloads/qbittorrent /nfs-nas-pvc/downloads/incomplete 2>/dev/null || true
        securityContext:
          runAsUser: 0
          runAsGroup: 0
          runAsNonRoot: false
      dnsdist:
        image:
          repository: docker.io/powerdns/dnsdist-20
          tag: 2.0.7@sha256:cb8186790513a7f49cda0c48fc86ad652a6430fb070047e9fb87274ca66db9f4
        restartPolicy: Always
      gluetun:
        dependsOn:
          - dnsdist
        image:
          repository: ghcr.io/qdm12/gluetun
          tag: v3.41.1@sha256:1a5bf4b4820a879cdf8d93d7ef0d2d963af56670c9ebff8981860b6804ebc8ab
        env:
          DOT: "off"
          DNS_ADDRESS: 127.0.0.2
          VPN_SERVICE_PROVIDER: custom
          VPN_TYPE: wireguard
          VPN_INTERFACE: wg0
          WIREGUARD_ENDPOINT_PORT: 51820
          VPN_PORT_FORWARDING: on
          VPN_PORT_FORWARDING_PROVIDER: protonvpn
          FIREWALL_INPUT_PORTS: &port 8080
          FIREWALL_OUTBOUND_SUBNETS: 10.96.0.0/16,10.69.0.0/16
        envFrom:
          - secretRef:
              name: qbittorrent-secret
        resources:
          limits:
            squat.ai/tun: "1"
        restartPolicy: Always
        securityContext:
          capabilities:
            add:
              - NET_ADMIN
          allowPrivilegeEscalation: false
    containers:
      vuetorrent:
        image:
          repository: registry.k8s.io/git-sync/git-sync
          tag: v4.7.0
        args:
          - --repo=https://github.com/VueTorrent/VueTorrent
          - --ref=latest-release
          - --period=86400s
          - --root=/addons
        resources:
          requests:
            cpu: 10m
            memory: 25Mi
          limits:
            memory: 50Mi
      app:
        image:
          repository: ghcr.io/home-operations/qbittorrent
          tag: 5.2.2@sha256:24f2d793cb7f7a93e755e5d22e533be818e62eadc864f4a82315b901b6ffe807
        nameOverride: qbittorrent
        env:
          UMASK: "002"
          QBT_WEBUI_PORT: 8080
          QBT_BitTorrent__Session__Interface: wg0
          QBT_BitTorrent__Session__InterfaceAddress: 0.0.0.0
          QBT_BitTorrent__Session__InterfaceName: wg0
          QBT_Preferences__WebUI__AlternativeUIEnabled: true
          QBT_Preferences__WebUI__RootFolder: /addons/VueTorrent
        probes:
          liveness:
            enabled: true
          readiness:
            enabled: true
          startup:
            enabled: true
            spec:
              failureThreshold: 30
              periodSeconds: 5
        resources:
          requests:
            cpu: 150m
            memory: 2048Mi
          limits:
            memory: 10Gi
        securityContext:
          runAsUser: 1000
          runAsGroup: 1000
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
              - ALL
      port-forward:
        image:
          repository: docker.io/snoringdragon/gluetun-qbittorrent-port-manager
          tag: "1.3"
        env:
          QBITTORRENT_SERVER: localhost
          QBITTORRENT_PORT: *port
          PORT_FORWARDED: "/tmp/gluetun/forwarded_port"

service:
  app:
    ports:
      http:
        port: *port

persistence:
  config:
    enabled: true
    existingClaim: qbittorrent
    advancedMounts:
      qbittorrent:
        app:
          - path: /config
        chown-data:
          - path: /config
  addons:
    type: emptyDir
    globalMounts:
      - path: /addons
  empty-config:
    type: emptyDir
    advancedMounts:
      qbittorrent:
        port-forward:
          - path: /config
  media:
    type: hostPath
    hostPath: /var/mnt/media
    advancedMounts:
      qbittorrent:
        app:
          - path: /nfs-nas-pvc
        chown-data:
          - path: /nfs-nas-pvc
  gluetun-data:
    type: emptyDir
    advancedMounts:
      qbittorrent:
        gluetun:
          - path: /tmp/gluetun
        port-forward:
          - path: /tmp/gluetun
            readOnly: true
  dnsdist:
    type: configMap
    name: qbittorrent-dnsdist
    advancedMounts:
      qbittorrent:
        dnsdist:
          - path: /etc/dnsdist/dnsdist.conf
            subPath: dnsdist.conf
            readOnly: true
