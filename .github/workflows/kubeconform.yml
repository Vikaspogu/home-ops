---
name: "Kubeconform"

on:
  workflow_dispatch:
  pull_request:
    branches: ["main"]
    paths:
      - "components/**"
      - "clusters/**"
      - "scripts/**"
      - ".github/workflows/kubeconform.yml"
  issue_comment:
    types: [created]

jobs:
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    if: >-
      github.event_name == 'pull_request' ||
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       github.event.comment.body == '/recheck')
    steps:
      - name: Get PR head SHA (comment trigger)
        if: github.event_name == 'issue_comment'
        id: pr
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('sha', pr.data.head.sha);
            core.setOutput('ref', pr.data.head.ref);
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.pr.outputs.sha || '' }}
      - name: Setup Homebrew
        uses: Homebrew/actions/setup-homebrew@master

      - name: Setup Workflow Tools
        shell: bash
        run: brew install kubernetes-cli kustomize gettext helm yq

      - name: Setup kubeconform
        shell: bash
        run: |
          curl -L https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz | tar xz
          sudo mv kubeconform /usr/local/bin

      - name: Run kubeconform
        shell: bash
        run: bash ./scripts/kubeconform.sh

      - name: Run Gitea runner pool contract test
        shell: bash
        run: bash ./scripts/test-gitea-runner-pool-rendered-manifest.sh
